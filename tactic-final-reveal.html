<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Footys - Anotasi Animasi Reveal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0f0a; color: white; font-family: system-ui; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
        .topbar { width: 100%; max-width: 680px; border-left: 3px solid #4ade80; padding: 12px 20px; background: #0f1a0f; letter-spacing: 2px; font-size: 10px; color: #6b7280; font-weight: 600; margin-bottom: 24px; text-transform: uppercase; }
        #uploadScreen { display: flex; align-items: center; justify-content: center; min-height: 60vh; width: 100%; max-width: 680px; }
        .upload-box { border: 2px dashed #1f2d1f; border-radius: 16px; padding: 48px 32px; text-align: center; max-width: 400px; width: 100%; cursor: pointer; }
        .upload-box p { color: #4b5563; letter-spacing: 1px; font-size: 12px; text-transform: uppercase; margin-bottom: 16px; }
        #mainScreen { display: none; width: 100%; max-width: 680px; }
        .card { background: #0f1a0f; border-radius: 20px; padding: 20px; width: 100%; margin-bottom: 20px; }
        .stage-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #0f2d1f; border-radius: 16px; overflow: hidden; margin: 16px 0; border: 1px solid #2d4a2d; }
        .stage { position: relative; width: 100%; height: 100%; }
        .pitch-bg { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.15; pointer-events: none; z-index: 1; display: none; }
        #drawCanvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; touch-action: none; }
        
        .toolbar-container { display: flex; flex-direction: column; gap: 14px; margin: 16px 0; }
        .toolbar-group { 
            display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; 
            background: #111827; padding: 12px 10px 10px; border-radius: 12px; 
            border: 1px solid #1f2937; position: relative;
        }
        .toolbar-group::before {
            content: attr(data-label); position: absolute; top: -8px; left: 12px;
            background: #0f1a0f; padding: 0 6px; font-size: 9px; color: #9ca3af;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }

        .btn { 
            background: #1e293b; border: 1px solid #334155; color: #cbd5e1; 
            font-weight: 500; font-size: 11px; padding: 8px 12px; border-radius: 8px; 
            cursor: pointer; text-align: center; white-space: nowrap; transition: all 0.2s;
        }
        .btn:active { transform: scale(0.96); }
        .btn.active  { background: #064e3b; border-color: #10b981; color: #34d399; }
        .btn.danger  { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
        .btn.purple  { background: #2e1065; border-color: #8b5cf6; color: #c4b5fd; }
        .btn.purple:disabled { opacity: 0.4; cursor: default; }
        
        #selectBar { display: none; align-items: center; justify-content: center; gap: 8px; margin: 6px 0; background: #0f1a1f; border: 1px solid #1e3a4a; border-radius: 999px; padding: 6px 14px; }
        #selectBar.visible { display: flex; }
        .palette { display: flex; justify-content: center; gap: 10px; margin: 12px 0; }
        .swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); cursor: pointer; }
        .swatch.active { border-color: #facc15; transform: scale(1.2); }
        .status { text-align: center; font-size: 11px; background: #111827; border-radius: 999px; padding: 6px 12px; margin: 8px 0; color: #9ca3af; transition: all 0.3s; }
        .status.recording { background: #7f1d1d; color: #fca5a5; animation: pulseRed 1s infinite; font-weight: bold; }
        
        @keyframes pulseRed {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .btn-export { flex: 1; background: #161f16; color: #4ade80; border: 1px solid #4ade80; border-radius: 8px; padding: 12px 8px; font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-export:hover { background: #1c2b1c; }
        .btn-export:active { transform: scale(0.98); }
        .btn-export.secondary { background: #1e293b; color: #cbd5e1; border-color: #334155; }
        
        .watermark { text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 4px; color: #ffffff; text-transform: uppercase; margin-top: 20px; padding-top: 12px; border-top: 1px solid #1a2e1a; }
    </style>
</head>
<body>

<div class="topbar">⚽ THE FOOTYS TACTICS</div>

<div id="uploadScreen">
    <div class="upload-box" id="uploadBox">
        <p>📁 ADD IMAGE</p>
        <div style="font-size:10px;color:#6b7280;">Tap untuk pilih gambar base</div>
    </div>
</div>

<div id="mainScreen">
    <div class="card">
        <div class="stage-wrapper">
            <div class="stage" id="stage">
                <canvas id="drawCanvas"></canvas>
            </div>
        </div>

        <div class="toolbar-container">
            <div class="toolbar-group" data-label="Mode">
                <button class="btn active" id="btnSelect">🖱️ Pilih / Edit</button>
            </div>
            <div class="toolbar-group" data-label="Gambar Animasi">
                <button class="btn" id="btnLine">📏 Garis</button>
                <button class="btn" id="btnTriangle">🔺 Segitiga</button>
                <button class="btn" id="btnQuad">⬛ Segiempat</button>
                <button class="btn" id="btnCircle">⭕ Elips</button>
                <button class="btn" id="btnArrow">➡️ Panah</button>
                <button class="btn" id="btnName">🏷️ Teks</button>
            </div>
            <div class="toolbar-group" data-label="History">
                <button class="btn purple" id="btnUndo" disabled>↩️ Undo</button>
                <button class="btn purple" id="btnRedo" disabled>↪️ Redo</button>
                <button class="btn danger" id="btnClear">🗑️ Hapus</button>
            </div>
        </div>

        <div id="selectBar">
            <button class="btn" id="btnCopy">📋 Copy</button>
            <button class="btn" id="btnPaste" disabled>📌 Paste</button>
            <button class="btn danger" id="btnDeleteSel">🗑️ Hapus</button>
        </div>

        <div class="palette" id="palette">
            <div class="swatch active" style="background:#ef4444" data-color="#ef4444"></div>
            <div class="swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
            <div class="swatch" style="background:#facc15" data-color="#facc15"></div>
            <div class="swatch" style="background:#10b981" data-color="#10b981"></div>
            <div class="swatch" style="background:#ffffff" data-color="#ffffff"></div>
        </div>

        <div class="status" id="status">Mode: Pilih / Edit</div>

        <div class="action-buttons">
            <div class="btn-export" id="exportVideoBtn">🎥 RECORD & SAVE HD VIDEO (1280×720)</div>
            <div class="btn-export secondary" id="exportImageBtn">📸 SAVE AS STATIC IMAGE</div>
        </div>
    </div>
    <div class="watermark">⚡ THE FOOTYS ⚡</div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none;">

<script>
(function(){
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d'), stage = document.getElementById('stage');
    const statusEl = document.getElementById('status'), paletteEl = document.getElementById('palette');
    const selectBar = document.getElementById('selectBar'), fileInput = document.getElementById('fileInput');
    const btnSelect = document.getElementById('btnSelect');
    const btnUndo = document.getElementById('btnUndo'), btnRedo = document.getElementById('btnRedo');
    const btnPaste = document.getElementById('btnPaste');

    let mode = 'select', currentColor = '#ef4444', tempPts = [], shapes = [];
    let selectedIdx = -1, clipboard = null, undoStack = [], redoStack = [];
    let isDragging = false, isPointerDown = false, dragOffX = 0, dragOffY = 0, globalTime = 0;
    
    const bgImage = new Image();

    function resizeCanvas() {
        canvas.width = stage.offsetWidth; canvas.height = stage.offsetHeight;
        redrawAll();
    }
    new ResizeObserver(resizeCanvas).observe(stage);

    function getPoint(e) {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width, sy = canvas.height / r.height;
        const src = e.touches ? e.touches[0] : (e.changedTouches ? e.changedTouches[0] : e);
        return {
            x: Math.min(Math.max(0, (src.clientX - r.left) * sx), canvas.width),
            y: Math.min(Math.max(0, (src.clientY - r.top) * sy), canvas.height)
        };
    }

    function snapshot() {
        undoStack.push(JSON.parse(JSON.stringify(shapes)));
        redoStack = []; syncUndoBtn();
    }
    function syncUndoBtn() { btnUndo.disabled = !undoStack.length; btnRedo.disabled = !redoStack.length; }

    function shapeAnchor(s) {
        if (s.type === 'circle') return { x: s.cx, y: s.cy };
        if (s.type === 'name') return { x: s.x, y: s.y };
        return { x: s.pts[0].x, y: s.pts[0].y };
    }

    function moveShape(s, dx, dy) {
        if (s.type === 'circle') { s.cx += dx; s.cy += dy; }
        else if (s.type === 'name') { s.x += dx; s.y += dy; }
        else s.pts = s.pts.map(p => ({ x: p.x + dx, y: p.y + dy }));
    }

    function flash(msg, isAlert = false) {
        statusEl.innerHTML = msg;
        if(isAlert) statusEl.classList.add('recording');
        else statusEl.classList.remove('recording');
        
        if(!isAlert) {
            setTimeout(() => {
                if(statusEl.innerHTML === msg) statusEl.innerHTML = `Mode: ${mode.toUpperCase()}`;
            }, 2000);
        }
    }

    // --- DRAWING FUNCTIONS ---
    function drawLine(pts, color, sel) {
        if (pts.length < 2) return;
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(pts[1].x, pts[1].y);
        ctx.stroke();
    }

    function drawPolygon(pts, color, sel) {
        if (pts.length < 2) return;
        ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
        pts.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.fillStyle = color + '33'; ctx.fill();
        ctx.stroke();
    }

    function drawEllipse(s, sel) {
        ctx.beginPath(); ctx.ellipse(s.cx, s.cy, s.rx, s.ry, 0, 0, Math.PI * 2);
        ctx.stroke();
    }

    function drawArrow(pts, color, sel) {
        if (pts.length < 3) return;
        const [s, c, e] = pts;
        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.quadraticCurveTo(c.x, c.y, e.x, e.y);
        ctx.stroke();
        
        const ang = Math.atan2(e.y - c.y, e.x - c.x);
        ctx.setLineDash([]); ctx.beginPath();
        ctx.moveTo(e.x, e.y);
        ctx.lineTo(e.x - 15 * Math.cos(ang - 0.5), e.y - 15 * Math.sin(ang - 0.5));
        ctx.lineTo(e.x - 15 * Math.cos(ang + 0.5), e.y - 15 * Math.sin(ang + 0.5));
        ctx.closePath(); ctx.fillStyle = color; ctx.fill();
    }

    function drawNameTag(item, sel) {
        ctx.font = 'bold 13px system-ui';
        if(sel) { ctx.shadowColor = '#4ade80'; ctx.shadowBlur = 15; }
        const tw = ctx.measureText(item.text).width, bw = tw + 20, bh = 26;
        ctx.fillStyle = item.color;
        ctx.beginPath(); ctx.roundRect(item.x - bw/2, item.y - bh - 10, bw, bh, 8); ctx.fill();
        ctx.fillStyle = 'white'; ctx.textAlign = 'center';
        ctx.fillText(item.text, item.x, item.y - bh/2 - 6);
    }

    function applyAnim(color, sel) {
        const pulse = 8 + Math.sin(globalTime * 0.005) * 6;
        ctx.shadowColor = color; ctx.shadowBlur = sel ? pulse + 10 : pulse;
        ctx.strokeStyle = color; ctx.lineWidth = 3;
        ctx.setLineDash([10, 8]); ctx.lineDashOffset = -globalTime * 0.02;
    }

    function drawBackground() {
        if (bgImage.src) {
            const canvasAspect = canvas.width / canvas.height;
            const imgAspect = bgImage.width / bgImage.height;
            let drawX = 0, drawY = 0, drawW = canvas.width, drawH = canvas.height;
            
            if (canvasAspect > imgAspect) {
                drawW = canvas.width; drawH = canvas.width / imgAspect; drawY = (canvas.height - drawH) / 2;
            } else {
                drawH = canvas.height; drawW = canvas.height * imgAspect; drawX = (canvas.width - drawW) / 2;
            }
            ctx.drawImage(bgImage, drawX, drawY, drawW, drawH);
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = '#14532d'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    function redrawAll() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        
        shapes.forEach((s, i) => {
            const sel = i === selectedIdx;
            
            // --- Reveal Animation Logic ---
            const age = globalTime - (s.createdAt || 0);
            const revealProgress = Math.min(1, age / 600); // 600ms reveal duration
            const easeOutCubic = 1 - Math.pow(1 - revealProgress, 3);
            
            ctx.save();
            applyAnim(s.color, sel);

            // Terapkan scale dan fade untuk efek reveal/pop up
            if (easeOutCubic < 1) {
                const a = shapeAnchor(s);
                ctx.translate(a.x, a.y);
                ctx.scale(easeOutCubic, easeOutCubic);
                ctx.globalAlpha = revealProgress;
                ctx.translate(-a.x, -a.y);
            }

            if (s.type === 'line') drawLine(s.pts, s.color, sel);
            else if (s.type === 'triangle' || s.type === 'quad') drawPolygon(s.pts, s.color, sel);
            else if (s.type === 'circle') drawEllipse(s, sel);
            else if (s.type === 'arrow') drawArrow(s.pts, s.color, sel);
            else if (s.type === 'name') drawNameTag(s, sel);
            
            ctx.restore();
        });
        
        if (tempPts.length > 0) {
            ctx.fillStyle = currentColor; tempPts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill(); });
        }
    }

    function animate(t) { globalTime = t; redrawAll(); requestAnimationFrame(animate); }
    requestAnimationFrame(animate);

    // --- HIT TEST IMPROVED ---
    function hitTest(p) {
        for (let i = shapes.length - 1; i >= 0; i--) {
            const s = shapes[i];
            if (s.type === 'circle') {
                if (Math.hypot(p.x - s.cx, p.y - s.cy) <= Math.max(s.rx, s.ry) + 15) return i;
            } else if (s.type === 'name') {
                if (Math.hypot(p.x - s.x, p.y - s.y) < 40) return i;
            } else if (s.pts) {
                if (s.pts.some(pt => Math.hypot(p.x - pt.x, p.y - pt.y) < 30)) return i;
                if (s.type === 'line' && s.pts.length === 2) {
                    const mx = (s.pts[0].x + s.pts[1].x) / 2, my = (s.pts[0].y + s.pts[1].y) / 2;
                    if (Math.hypot(p.x - mx, p.y - my) < 30) return i;
                }
                if (s.type === 'arrow' && s.pts.length === 3) {
                    if (Math.hypot(p.x - s.pts[1].x, p.y - s.pts[1].y) < 30) return i;
                }
                if (['triangle', 'quad'].includes(s.type)) {
                    const minX = Math.min(...s.pts.map(pt=>pt.x)), maxX = Math.max(...s.pts.map(pt=>pt.x));
                    const minY = Math.min(...s.pts.map(pt=>pt.y)), maxY = Math.max(...s.pts.map(pt=>pt.y));
                    if (p.x >= minX && p.x <= maxX && p.y >= minY && p.y <= maxY) return i;
                }
            }
        }
        return -1;
    }

    // --- UNIFIED POINTER EVENTS (Fix Copy-Paste Dragging) ---
    canvas.addEventListener('touchstart', onPointerDown, {passive:false});
    canvas.addEventListener('mousedown',  onPointerDown);
    window.addEventListener('touchmove',  onPointerMove, {passive:false});
    window.addEventListener('mousemove',  onPointerMove);
    window.addEventListener('touchend',   onPointerUp,   {passive:false});
    window.addEventListener('mouseup',    onPointerUp);

    function onPointerDown(e) {
        if(e.touches && e.touches.length > 1) return; // Ignore multi-touch
        if(e.target === canvas && e.cancelable) e.preventDefault(); // Stop mobile scroll when touching canvas
        
        isPointerDown = true;
        const p = getPoint(e);

        if(mode === 'select') {
            selectedIdx = hitTest(p);
            if(selectedIdx !== -1) {
                const a = shapeAnchor(shapes[selectedIdx]);
                dragOffX = p.x - a.x;
                dragOffY = p.y - a.y;
                isDragging = false;
            }
            selectBar.style.display = selectedIdx !== -1 ? 'flex' : 'none';
        } else {
            tempPts.push(p);
            const limits = {line:2, triangle:3, quad:4, arrow:3, circle:3, name:1};
            if(tempPts.length === limits[mode]) {
                snapshot();
                const now = performance.now();
                if(mode==='circle') shapes.push({type:'circle', cx:tempPts[0].x, cy:tempPts[0].y, rx:Math.abs(tempPts[1].x-tempPts[0].x), ry:Math.abs(tempPts[2].y-tempPts[0].y), color:currentColor, createdAt: now});
                else if(mode==='name') { const t = prompt('Teks:'); if(t) shapes.push({type:'name', text:t, x:tempPts[0].x, y:tempPts[0].y, color:currentColor, createdAt: now}); }
                else shapes.push({type:mode, pts:[...tempPts], color:currentColor, createdAt: now});
                tempPts = [];
                flash(`✅ ${mode.toUpperCase()} ditambahkan!`);
            }
        }
    }

    function onPointerMove(e) {
        if(!isPointerDown || selectedIdx === -1 || mode !== 'select') return;
        if(e.cancelable) e.preventDefault(); // Prevent scroll while dragging
        
        const p = getPoint(e);
        const a = shapeAnchor(shapes[selectedIdx]);
        const dx = (p.x - dragOffX) - a.x;
        const dy = (p.y - dragOffY) - a.y;
        
        if(!isDragging && Math.hypot(dx, dy) > 4) isDragging = true;
        if(isDragging) moveShape(shapes[selectedIdx], dx, dy);
    }

    function onPointerUp() { 
        if(isDragging && selectedIdx >= 0) snapshot(); 
        isDragging = false; 
        isPointerDown = false; 
    }

    // --- TOOLBAR CONTROLS ---
    document.querySelectorAll('.toolbar-group .btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if(btn.id.startsWith('btnUndo') || btn.id.startsWith('btnRedo') || btn.id === 'btnClear') return;
            mode = btn.id.replace('btn', '').toLowerCase();
            document.querySelectorAll('.toolbar-group .btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedIdx = -1; selectBar.style.display = 'none'; tempPts = [];
            flash(`Mode: ${mode.toUpperCase()}`);
        });
    });

    btnUndo.addEventListener('click', () => { redoStack.push(JSON.parse(JSON.stringify(shapes))); shapes = undoStack.pop(); syncUndoBtn(); flash('↩️ Undo'); });
    btnRedo.addEventListener('click', () => { undoStack.push(JSON.parse(JSON.stringify(shapes))); shapes = redoStack.pop(); syncUndoBtn(); flash('↪️ Redo'); });
    document.getElementById('btnClear').addEventListener('click', () => { snapshot(); shapes = []; flash('🗑️ Bersih!'); });
    
    // Select Bar Actions
    document.getElementById('btnCopy').addEventListener('click', () => { if(selectedIdx>=0){ clipboard = JSON.parse(JSON.stringify(shapes[selectedIdx])); btnPaste.disabled = false; flash('📋 Dicopy'); } });
    document.getElementById('btnPaste').addEventListener('click', () => { 
        if(clipboard){ 
            const c = JSON.parse(JSON.stringify(clipboard)); 
            moveShape(c, 20, 20); 
            c.createdAt = performance.now(); // SET WAKTU BARU AGAR DI-REVEAL LAGI
            snapshot(); 
            shapes.push(c); 
            selectedIdx = shapes.length-1; 
            flash('📌 Dipaste'); 
        } 
    });
    document.getElementById('btnDeleteSel').addEventListener('click', () => { if(selectedIdx>=0){ snapshot(); shapes.splice(selectedIdx, 1); selectedIdx = -1; selectBar.style.display = 'none'; flash('🗑️ Dihapus'); } });

    // Palette
    paletteEl.addEventListener('click', e => {
        if(!e.target.dataset.color) return;
        currentColor = e.target.dataset.color;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        e.target.classList.add('active');
    });

    // --- UPLOAD IMAGE ---
    document.getElementById('uploadBox').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if(!file) return;
        bgImage.onload = () => {
            document.getElementById('uploadScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            resizeCanvas();
        };
        bgImage.src = URL.createObjectURL(file);
    });

    // --- EXPORT AS VIDEO HD (MediaRecorder) ---
    let isRecording = false;
    document.getElementById('exportVideoBtn').addEventListener('click', () => {
        if (isRecording) return;
        isRecording = true;

        selectedIdx = -1; selectBar.style.display = 'none';
        flash('🔴 MEREKAM HD (4 DETIK)...', true);

        // Buat offscreen canvas HD 1280x720
        const HD_W = 1280, HD_H = 720;
        const hdCanvas = document.createElement('canvas');
        hdCanvas.width = HD_W; hdCanvas.height = HD_H;
        const hdCtx = hdCanvas.getContext('2d');

        // Fungsi render frame ke HD canvas (scale dari canvas utama)
        function renderHDFrame() {
            hdCtx.clearRect(0, 0, HD_W, HD_H);
            hdCtx.drawImage(canvas, 0, 0, HD_W, HD_H);
        }

        // Pilih mimeType terbaik yang didukung browser
        const mimeTypes = [
            'video/mp4;codecs=avc1',
            'video/webm;codecs=vp9',
            'video/webm;codecs=vp8',
            'video/webm'
        ];
        const mimeType = mimeTypes.find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
        const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';

        const stream = hdCanvas.captureStream(60);
        const recorder = new MediaRecorder(stream, {
            mimeType,
            videoBitsPerSecond: 8_000_000 // 8 Mbps HD
        });
        const chunks = [];

        // Loop render frame HD selama recording
        let rafId;
        function hdLoop() {
            renderHDFrame();
            rafId = requestAnimationFrame(hdLoop);
        }
        hdLoop();

        recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = () => {
            cancelAnimationFrame(rafId);
            const blob = new Blob(chunks, { type: mimeType.split(';')[0] });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `TheFootys_Taktik_HD_${Date.now()}.${ext}`; a.click();
            isRecording = false; flash('✅ VIDEO HD TERSIMPAN!');
        };

        recorder.start(100); // collect data setiap 100ms
        setTimeout(() => recorder.stop(), 4000);
    });

    // --- EXPORT AS STATIC IMAGE ---
    document.getElementById('exportImageBtn').addEventListener('click', () => {
        selectedIdx = -1; selectBar.style.display = 'none';
        redrawAll();
        setTimeout(() => {
            const link = document.createElement('a');
            link.download = `TheFootys_Taktik_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            flash('💾 GAMBAR TERSIMPAN!');
        }, 100);
    });

})();
</script>
</body>
</html>
