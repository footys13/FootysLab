<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactical Board — The Footys</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #header .brand {
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 2px;
    color: #58a6ff;
    text-transform: uppercase;
  }
  .sep { width: 1px; height: 24px; background: #30363d; }

  /* ── TOOLGROUPS ── */
  .toolgroup { display: flex; gap: 4px; align-items: center; }
  .tool-label {
    font-size: 10px; color: #8b949e;
    text-transform: uppercase; letter-spacing: 1px; padding-right: 4px;
  }

  /* ── BUTTONS ── */
  .btn {
    background: #21262d; border: 1px solid #30363d;
    color: #c9d1d9; border-radius: 6px; padding: 5px 10px;
    font-size: 12px; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .btn:hover { background: #30363d; border-color: #58a6ff; }
  .btn.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
  .btn svg { width: 14px; height: 14px; }

  /* ── COLOR PICKER ── */
  .color-swatch {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #30363d; cursor: pointer;
    transition: transform .15s, border-color .15s;
  }
  .color-swatch:hover, .color-swatch.active { transform: scale(1.2); border-color: #fff; }

  input[type=color] {
    width: 28px; height: 28px; border: 1px solid #30363d;
    border-radius: 6px; background: #21262d; cursor: pointer; padding: 2px;
  }
  input[type=range] {
    -webkit-appearance: none; width: 70px; height: 4px;
    border-radius: 2px; background: #30363d; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: #58a6ff;
  }

  /* ── PITCH ── */
  #pitch-wrap {
    flex: 1; display: flex; justify-content: center;
    align-items: center; overflow: hidden; padding: 16px;
  }
  #pitch-container { position: relative; touch-action: none; }
  #pitch-svg { display: block; border-radius: 4px; box-shadow: 0 0 40px rgba(0,0,0,.6); }
  #annotation-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
  #annotation-canvas.drawing { pointer-events: all; }
  #player-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #player-layer.editable { pointer-events: all; }

  /* ── PLAYER TOKEN ── */
  .player-token {
    position: absolute; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; pointer-events: all;
  }
  .player-token.dragging { opacity: .85; z-index: 999; cursor: grabbing; }

  /* ── BALL TOKEN ── */
  #ball-token {
    position: absolute; transform: translate(-50%, -50%);
    width: 26px; height: 26px; cursor: grab; pointer-events: all;
    z-index: 50; filter: drop-shadow(0 2px 6px rgba(0,0,0,.7));
    transition: filter .1s;
  }
  #ball-token:hover { filter: drop-shadow(0 0 8px rgba(255,255,255,.6)); }
  #ball-token.dragging { cursor: grabbing; filter: drop-shadow(0 0 10px rgba(255,255,255,.8)); z-index: 999; }
  .player-circle {
    width: 34px; height: 34px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.9);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.5); position: relative; z-index: 1;
  }
  .player-circle.selected { box-shadow: 0 0 0 3px #fff, 0 2px 8px rgba(0,0,0,.5); }
  .player-label {
    margin-top: 3px; background: rgba(0,0,0,.75); color: #fff;
    font-size: 9px; font-weight: 700; letter-spacing: .5px;
    padding: 1px 5px; border-radius: 3px; white-space: nowrap;
    text-transform: uppercase; pointer-events: none;
  }
  .player-label:empty { display: none; }

  /* ── PLAYER EDITOR ── */
  #player-editor {
    position: fixed; right: 16px; top: 60px;
    background: #161b22; border: 1px solid #30363d;
    border-radius: 10px; padding: 14px; width: 200px;
    z-index: 500; display: none; flex-direction: column; gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  #player-editor.visible { display: flex; }
  #player-editor h3 { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
  #player-editor input[type=text] {
    width: 100%; background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; color: #e6edf3; padding: 6px 8px; font-size: 12px;
  }
  #player-editor input[type=text]:focus { outline: none; border-color: #58a6ff; }
  .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
  .color-grid .color-swatch { width: 24px; height: 24px; }

  /* ── CONTEXT MENU ── */
  #ctx-menu {
    position: fixed; background: #21262d; border: 1px solid #30363d;
    border-radius: 8px; padding: 4px; z-index: 1000; display: none;
    flex-direction: column; gap: 2px; box-shadow: 0 8px 24px rgba(0,0,0,.6); min-width: 140px;
  }
  #ctx-menu.visible { display: flex; }
  #ctx-menu button {
    background: none; border: none; color: #c9d1d9;
    padding: 7px 12px; font-size: 12px; border-radius: 5px;
    cursor: pointer; text-align: left;
  }
  #ctx-menu button:hover { background: #30363d; }
  #ctx-menu button.danger { color: #f85149; }

  /* ── TEMPLATE MODAL ── */
  #tpl-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 2000; display: none; align-items: center; justify-content: center;
  }
  #tpl-modal.visible { display: flex; }
  #tpl-box {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 12px; padding: 20px; width: 340px;
    max-height: 80vh; display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 16px 48px rgba(0,0,0,.8);
  }
  #tpl-box h2 { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
  #tpl-name-input {
    width: 100%; background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; color: #e6edf3; padding: 8px 10px; font-size: 13px;
  }
  #tpl-name-input:focus { outline: none; border-color: #58a6ff; }
  #tpl-list {
    overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 6px;
    max-height: 300px;
  }
  .tpl-item {
    display: flex; align-items: center; gap: 8px;
    background: #21262d; border: 1px solid #30363d;
    border-radius: 8px; padding: 8px 10px; cursor: pointer;
    transition: border-color .15s;
  }
  .tpl-item:hover { border-color: #58a6ff; }
  .tpl-item-name { flex: 1; font-size: 13px; font-weight: 600; }
  .tpl-item-meta { font-size: 10px; color: #8b949e; }
  .tpl-item-del {
    background: none; border: none; color: #f85149;
    cursor: pointer; padding: 2px 6px; font-size: 14px; border-radius: 4px;
  }
  .tpl-item-del:hover { background: rgba(248,81,73,.15); }
  .tpl-actions { display: flex; gap: 8px; }
  .tpl-actions .btn { flex: 1; justify-content: center; }
  .tpl-empty { color: #6b7280; font-size: 12px; text-align: center; padding: 16px 0; }

  /* ── STATUS ── */
  #status {
    font-size: 11px; color: #8b949e;
    padding: 4px 16px; background: #161b22;
    border-top: 1px solid #30363d; flex-shrink: 0;
  }

  /* cursor styles per tool mode */
  #annotation-canvas.drawing.mode-crosshair { cursor: crosshair; }
  #annotation-canvas.drawing.mode-pen       { cursor: cell; }
  #annotation-canvas.mode-select-ann { cursor: default; }
  #annotation-canvas.mode-select-ann.hovering { cursor: move; }
</style>
</head>
<body>

<!-- ── HEADER TOOLBAR ── -->
<div id="header">
  <span class="brand">The Footys</span>
  <div class="sep"></div>

  <div class="toolgroup">
    <span class="tool-label">Mode</span>
    <button class="btn active" id="tool-select" onclick="setTool('select')" title="Select & Move">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l10 6-5 1-2 5z"/></svg>
      Select
    </button>
    <button class="btn" id="tool-player" onclick="setTool('player')" title="Add Player">
      <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
      Player
    </button>
    <button class="btn" id="tool-ball" onclick="setTool('ball')" title="Toggle Ball Visibility">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="8" cy="8" r="6"/><path d="M8 2 Q10 5 8 8 Q6 11 8 14M2 6h12M2 10h12"/></svg>
      Ball
    </button>
  </div>

  <div class="sep"></div>

  <!-- ANNOTATION TOOLS — all pin-point based -->
  <div class="toolgroup">
    <span class="tool-label">Draw</span>
    <button class="btn" id="tool-arrow" onclick="setTool('arrow')" title="Arrow: click start → click end">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><line x1="2" y1="14" x2="12" y2="4"/><polyline points="7,4 12,4 12,9"/></svg>
      Arrow
    </button>
    <button class="btn" id="tool-line" onclick="setTool('line')" title="Line: click start → click end">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><line x1="2" y1="14" x2="14" y2="2"/></svg>
      Line
    </button>
    <button class="btn" id="tool-curve" onclick="setTool('curve')" title="Curve: click start → click end → click control">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M2 14 Q8 2 14 8"/><polyline points="10,5 14,8 11,11"/></svg>
      Curve
    </button>
    <button class="btn" id="tool-ellipse" onclick="setTool('ellipse')" title="Ellipse: click center → click edge">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><ellipse cx="8" cy="8" rx="6" ry="4"/></svg>
      Ellipse
    </button>
    <button class="btn" id="tool-rect" onclick="setTool('rect')" title="Rect: click corner → click opposite corner">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><rect x="2" y="4" width="12" height="8" rx="1"/></svg>
      Rect
    </button>
    <button class="btn" id="tool-polygon" onclick="setTool('polygon')" title="Polygon: click points, click first or double-click to close">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><polygon points="8,2 14,6 12,13 4,13 2,6"/></svg>
      Polygon
    </button>
  </div>

  <div class="sep"></div>

  <!-- STYLE -->
  <div class="toolgroup">
    <span class="tool-label">Color</span>
    <div class="color-swatch active" style="background:#ffffff" data-color="#ffffff" onclick="setColor(this)" title="White"></div>
    <div class="color-swatch" style="background:#f85149" data-color="#f85149" onclick="setColor(this)" title="Red"></div>
    <div class="color-swatch" style="background:#ffa657" data-color="#ffa657" onclick="setColor(this)" title="Orange"></div>
    <div class="color-swatch" style="background:#3fb950" data-color="#3fb950" onclick="setColor(this)" title="Green"></div>
    <div class="color-swatch" style="background:#58a6ff" data-color="#58a6ff" onclick="setColor(this)" title="Blue"></div>
    <div class="color-swatch" style="background:#d2a8ff" data-color="#d2a8ff" onclick="setColor(this)" title="Purple"></div>
    <div class="color-swatch" style="background:#f9e157" data-color="#f9e157" onclick="setColor(this)" title="Yellow"></div>
    <input type="color" id="custom-color" value="#ffffff" onchange="setColorFromPicker(this.value)" title="Custom color">
  </div>

  <div class="toolgroup">
    <span class="tool-label">Size</span>
    <input type="range" id="stroke-size" min="1" max="8" value="2" oninput="strokeSize=+this.value">
  </div>

  <div class="toolgroup">
    <span class="tool-label">Style</span>
    <button class="btn active" id="stroke-solid" onclick="setDash('solid')" title="Solid">—</button>
    <button class="btn" id="stroke-dash" onclick="setDash('dash')" title="Dashed">- -</button>
  </div>

  <div class="sep"></div>

  <!-- ACTIONS -->
  <div class="toolgroup">
    <button class="btn" onclick="undo()" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4H10a4 4 0 010 8H4"/><polyline points="7,1 4,4 7,7"/></svg>
      Undo
    </button>
    <button class="btn" onclick="clearAnnotations()" title="Clear drawings">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
      Clear
    </button>
    <button class="btn" onclick="exportPNG()" title="Export PNG">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 11v3h10v-3M8 2v8M5 7l3 3 3-3"/></svg>
      Export
    </button>
    <button class="btn" onclick="openTemplateModal()" title="Save / Load template">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 2v5h6V2M5 10h6"/></svg>
      Templates
    </button>
  </div>

  <!-- FORMATION -->
  <div class="toolgroup">
    <span class="tool-label">Formation</span>
    <select id="formation-select" onchange="loadFormation(this.value)" style="background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer">
      <option value="">— Load —</option>
      <option value="433">4-3-3</option>
      <option value="442">4-4-2</option>
      <option value="352">3-5-2</option>
      <option value="4231">4-2-3-1</option>
      <option value="325">3-2-5 (Box3)</option>
    </select>
  </div>
</div>

<!-- ── PITCH ── -->
<div id="pitch-wrap">
  <div id="pitch-container">
    <svg id="pitch-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <canvas id="annotation-canvas"></canvas>
    <!-- BALL -->
    <svg id="ball-token" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="48" fill="white" stroke="#222" stroke-width="3"/>
      <!-- Pentagon patches -->
      <polygon points="50,14 62,23 57,37 43,37 38,23" fill="#111" stroke="#333" stroke-width="1.5"/>
      <polygon points="82,33 88,48 76,58 64,52 64,36" fill="#111" stroke="#333" stroke-width="1.5"/>
      <polygon points="74,72 62,80 50,72 50,58 64,52" fill="#111" stroke="#333" stroke-width="1.5"/>
      <polygon points="26,72 14,64 18,50 30,46 38,58" fill="#111" stroke="#333" stroke-width="1.5"/>
      <polygon points="18,35 30,28 43,37 38,52 24,52" fill="#111" stroke="#333" stroke-width="1.5"/>
      <!-- Shine -->
      <ellipse cx="35" cy="30" rx="10" ry="6" fill="rgba(255,255,255,0.4)" transform="rotate(-30,35,30)"/>
    </svg>
    <div id="player-layer"></div>
  </div>
</div>

<!-- ── STATUS ── -->
<div id="status"></div>

<!-- ── PLAYER EDITOR ── -->
<div id="player-editor">
  <h3>Player</h3>
  <input type="text" id="pe-number" placeholder="Number (optional)" maxlength="2" oninput="updateSelectedPlayer()">
  <input type="text" id="pe-name" placeholder="Name" oninput="updateSelectedPlayer()">
  <div class="color-grid" id="pe-colors"></div>
  <button class="btn" style="font-size:11px;color:#f85149" onclick="deleteSelectedPlayer()">🗑 Remove Player</button>
</div>

<!-- ── CONTEXT MENU ── -->
<div id="ctx-menu">
  <button onclick="ctxEdit()">✏️ Edit Player</button>
  <button onclick="ctxDuplicate()">⧉ Duplicate</button>
  <button class="danger" onclick="ctxDelete()">🗑 Delete</button>
</div>

<!-- ── TEMPLATE MODAL ── -->
<div id="tpl-modal" onclick="e => { if(e.target===this) closeTemplateModal(); }">
  <div id="tpl-box">
    <h2>📋 Templates</h2>
    <div style="display:flex;gap:8px">
      <input type="text" id="tpl-name-input" placeholder="Template name…" style="flex:1">
      <button class="btn" onclick="saveTemplate()" style="white-space:nowrap">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:13px;height:13px"><path d="M13 5l-8 8-4-4"/></svg>
        Save
      </button>
    </div>
    <div id="tpl-list"></div>
    <div class="tpl-actions">
      <button class="btn" onclick="closeTemplateModal()">Close</button>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
//  CONSTANTS & STATE
// ──────────────────────────────────────────────
const PITCH_W = 800, PITCH_H = 520;

const PLAYER_COLORS = [
  '#1f6feb','#238636','#da3633','#f0883e',
  '#8957e5','#db61a2','#2ea043','#58a6ff',
  '#ffffff','#0d1117','#f9e157','#ffa657',
];

let currentTool = 'select';
let currentColor = '#ffffff';
let strokeSize = 2;
let dashStyle = 'solid';

// Ball state
let ball = { x: 400, y: 260, visible: true };

// Annotation interaction state
let hoveredAnnIdx = -1;
let draggingAnnIdx = -1;
let annDragOffX = 0, annDragOffY = 0;

// ── UNIFIED PIN-POINT DRAWING STATE ──
// Every tool works by collecting pin-points (clicks), then committing.
// pinPts: array of {x,y} clicks placed so far
// pinPhase: how many points we need / which phase we're in
// mouseX/Y: live cursor for rubber-band preview
let pinPts  = [];
let mouseX  = 0, mouseY = 0;
let inDraw  = false; // true while a tool is in progress

// Annotations
let annotations = [];
let undoStack   = [];

// Players
let players = [];
let nextPlayerId = 1;
let selectedPlayerId = null;
let draggingPlayer = null;
let dragOffX = 0, dragOffY = 0;

let ctxTargetId = null;

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
const pitchSVG   = document.getElementById('pitch-svg');
const canvas     = document.getElementById('annotation-canvas');
const ctx        = canvas.getContext('2d');
const playerLayer = document.getElementById('player-layer');

function init() {
  pitchSVG.setAttribute('width', PITCH_W);
  pitchSVG.setAttribute('height', PITCH_H);
  pitchSVG.innerHTML = buildPitchSVG();
  canvas.width  = PITCH_W;
  canvas.height = PITCH_H;
  buildColorGrid();
  updateStatus();
  initBall();

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.key === 'Escape') cancelDraw();
    if (e.key === 'Enter') commitShape();
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (selectedPlayerId !== null) deleteSelectedPlayer();
    }
  });
  document.addEventListener('click', () => hideCtxMenu(), true);
}

// ──────────────────────────────────────────────
//  PITCH SVG
// ──────────────────────────────────────────────
function buildPitchSVG() {
  const W = PITCH_W, H = PITCH_H;
  const CX = W/2, CY = H/2;
  const M = 22;
  const TL=M, TR=W-M, TT=M, TB=H-M;
  const TW=TR-TL, TH=TB-TT;
  const PA_W=Math.round(TW*.165), PA_H=Math.round(TH*.58);
  const SA_W=Math.round(TW*.057), SA_H=Math.round(TH*.26);
  const PSPOT=Math.round(TW*.137), PARC_R=Math.round(TH*.195);
  const GOAL_H=Math.round(TH*.19), GOAL_D=16, CR=Math.round(TH*.025);
  const arcDist=PA_W-PSPOT;
  const arcDY=arcDist<PARC_R?Math.sqrt(PARC_R**2-arcDist**2):0;
  const STRIPE_N=8, stripeW=TW/STRIPE_N;
  const stripes=Array.from({length:STRIPE_N},(_,i)=>{
    const x=TL+i*stripeW, shade=i%2===0?'#3d8c3d':'#3f9040';
    return `<rect x="${x}" y="${TT}" width="${stripeW}" height="${TH}" fill="${shade}"/>`;
  }).join('');
  const L='#ffffff', sw=1.8;
  const p=`stroke="${L}" stroke-width="${sw}" fill="none"`;
  return `
    <rect x="0" y="0" width="${W}" height="${H}" fill="#3a8c3a"/>
    ${stripes}
    <rect x="${TL}" y="${TT}" width="${TW}" height="${TH}" ${p}/>
    <line x1="${CX}" y1="${TT}" x2="${CX}" y2="${TB}" ${p}/>
    <circle cx="${CX}" cy="${CY}" r="${PARC_R}" ${p}/>
    <circle cx="${CX}" cy="${CY}" r="3.5" fill="${L}"/>
    <rect x="${TL}" y="${CY-PA_H/2}" width="${PA_W}" height="${PA_H}" ${p}/>
    <rect x="${TL}" y="${CY-SA_H/2}" width="${SA_W}" height="${SA_H}" ${p}/>
    <circle cx="${TL+PSPOT}" cy="${CY}" r="3" fill="${L}"/>
    <path d="M ${TL+PA_W} ${CY-arcDY} A ${PARC_R} ${PARC_R} 0 0 1 ${TL+PA_W} ${CY+arcDY}" ${p}/>
    <rect x="${TL-GOAL_D}" y="${CY-GOAL_H/2}" width="${GOAL_D}" height="${GOAL_H}" ${p}/>
    <rect x="${TR-PA_W}" y="${CY-PA_H/2}" width="${PA_W}" height="${PA_H}" ${p}/>
    <rect x="${TR-SA_W}" y="${CY-SA_H/2}" width="${SA_W}" height="${SA_H}" ${p}/>
    <circle cx="${TR-PSPOT}" cy="${CY}" r="3" fill="${L}"/>
    <path d="M ${TR-PA_W} ${CY-arcDY} A ${PARC_R} ${PARC_R} 0 0 0 ${TR-PA_W} ${CY+arcDY}" ${p}/>
    <rect x="${TR}" y="${CY-GOAL_H/2}" width="${GOAL_D}" height="${GOAL_H}" ${p}/>
    <path d="M ${TL} ${TT+CR} A ${CR} ${CR} 0 0 0 ${TL+CR} ${TT}" ${p}/>
    <path d="M ${TR-CR} ${TT} A ${CR} ${CR} 0 0 0 ${TR} ${TT+CR}" ${p}/>
    <path d="M ${TL} ${TB-CR} A ${CR} ${CR} 0 0 1 ${TL+CR} ${TB}" ${p}/>
    <path d="M ${TR-CR} ${TB} A ${CR} ${CR} 0 0 1 ${TR} ${TB-CR}" ${p}/>
  `;
}

// ──────────────────────────────────────────────
//  TOOL MANAGEMENT
// ──────────────────────────────────────────────
// Required pin-point counts per tool:
// arrow, line: 2 pts (start, end)
// curve: 3 pts (start, end, control)
// ellipse, rect: 2 pts (corner/center, corner/edge)
// polygon: N pts — committed on first-point click or dblclick

const TOOL_PINS = { arrow:2, line:2, curve:3, ellipse:2, rect:2, polygon:Infinity };
const isDrawTool = t => t in TOOL_PINS;

function setTool(t) {
  cancelDraw();
  currentTool = t;
  document.querySelectorAll('.btn[id^="tool-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool-' + t);
  if (btn) btn.classList.add('active');

  if (t === 'ball') {
    // toggle ball visibility
    ball.visible = !ball.visible;
    const ballEl = document.getElementById('ball-token');
    ballEl.style.display = ball.visible ? 'block' : 'none';
    // Don't actually change mode — stay in select
    currentTool = 'select';
    document.getElementById('tool-select').classList.add('active');
    if (btn) btn.classList.remove('active');
    updateStatus();
    return;
  }

  const drawMode = isDrawTool(t);
  canvas.classList.toggle('drawing', drawMode || t === 'select' || t === 'player');
  canvas.classList.toggle('mode-crosshair', drawMode || t === 'player');
  canvas.classList.toggle('mode-select-ann', t === 'select');
  playerLayer.classList.toggle('editable', t === 'select' || t === 'player');

  deselectPlayer(); closeEditor();
  updateStatus();
}

function cancelDraw() {
  pinPts = []; inDraw = false;
  redraw();
}

function setColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  currentColor = el.dataset.color;
  document.getElementById('custom-color').value = currentColor;
  updateSelectedPlayerColor(currentColor);
}
function setColorFromPicker(val) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  currentColor = val;
  updateSelectedPlayerColor(currentColor);
}
function setDash(d) {
  dashStyle = d;
  document.getElementById('stroke-solid').classList.toggle('active', d==='solid');
  document.getElementById('stroke-dash').classList.toggle('active', d==='dash');
}

// ──────────────────────────────────────────────
//  CANVAS EVENTS
// ──────────────────────────────────────────────
function getXY(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener('click', e => {
  if (!isDrawTool(currentTool)) return;
  if (e.detail === 2) return; // dblclick handled separately
  const {x, y} = getXY(e);

  if (currentTool === 'polygon') {
    if (!inDraw) {
      pinPts = [{x, y}]; inDraw = true;
    } else {
      // Snap to first point
      const fp = pinPts[0];
      if (pinPts.length >= 3 && Math.hypot(x - fp.x, y - fp.y) < 12) {
        commitShape(); return;
      }
      pinPts.push({x, y});
    }
    redraw(); return;
  }

  // All other tools: collect pin points
  if (!inDraw) { pinPts = []; inDraw = true; }
  pinPts.push({x, y});

  const needed = TOOL_PINS[currentTool];
  if (pinPts.length >= needed) {
    commitShape();
  } else {
    redraw();
  }
});

canvas.addEventListener('dblclick', e => {
  if (!isDrawTool(currentTool)) return;
  const {x, y} = getXY(e);
  if (currentTool === 'polygon' && pinPts.length >= 2) {
    commitShape();
  }
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  // Simulate click
  const touch = e.changedTouches[0];
  const clickEv = new MouseEvent('click', { clientX: touch.clientX, clientY: touch.clientY, detail: 1 });
  canvas.dispatchEvent(clickEv);
}, {passive:false});

function commitShape() {
  if (!inDraw || pinPts.length < 1) return;
  const p = pinPts;

  let shape = null;
  switch(currentTool) {
    case 'arrow':
      if (p.length < 2) { cancelDraw(); return; }
      shape = { type:'arrow', x1:p[0].x, y1:p[0].y, x2:p[1].x, y2:p[1].y, color:currentColor, size:strokeSize, dash:dashStyle };
      break;
    case 'line':
      if (p.length < 2) { cancelDraw(); return; }
      shape = { type:'line', x1:p[0].x, y1:p[0].y, x2:p[1].x, y2:p[1].y, color:currentColor, size:strokeSize, dash:dashStyle };
      break;
    case 'curve':
      if (p.length < 2) { cancelDraw(); return; }
      // If only 2 pts placed (Enter pressed early), use midpoint as control
      const cx = p[2] ? p[2].x : (p[0].x+p[1].x)/2;
      const cy = p[2] ? p[2].y : (p[0].y+p[1].y)/2 - 40;
      shape = { type:'curve', x1:p[0].x, y1:p[0].y, x2:p[1].x, y2:p[1].y, cx, cy, color:currentColor, size:strokeSize, dash:dashStyle };
      break;
    case 'ellipse':
      if (p.length < 2) { cancelDraw(); return; }
      shape = { type:'ellipse', x1:p[0].x, y1:p[0].y, x2:p[1].x, y2:p[1].y, color:currentColor, size:strokeSize, dash:dashStyle };
      break;
    case 'rect':
      if (p.length < 2) { cancelDraw(); return; }
      shape = { type:'rect', x1:p[0].x, y1:p[0].y, x2:p[1].x, y2:p[1].y, color:currentColor, size:strokeSize, dash:dashStyle };
      break;
    case 'polygon':
      if (p.length < 2) { cancelDraw(); return; }
      shape = { type:'polygon', points:[...p], color:currentColor, size:strokeSize, dash:dashStyle };
      break;
  }

  if (shape) saveAnnotation(shape);
  pinPts = []; inDraw = false;
  redraw();
}

// ── PLAYER CLICK / SELECT ANNOTATION (canvas-level) ──
canvas.addEventListener('click', e => {
  if (e.detail === 2) return; // ignore double-clicks here
  if (currentTool === 'player') {
    const {x, y} = getXY(e);
    const id = addPlayer(x, y, '', '', currentColor);
    selectPlayer(id);
    return;
  }
  if (currentTool === 'select') {
    const {x, y} = getXY(e);
    const idx = getAnnotationAtPoint(x, y);
    if (idx < 0) { deselectPlayer(); closeEditor(); }
  }
});

// ──────────────────────────────────────────────
//  DRAW ENGINE
// ──────────────────────────────────────────────
function applyStyle(s) {
  ctx.strokeStyle = s.color || currentColor;
  ctx.lineWidth   = s.size  || strokeSize;
  ctx.setLineDash(s.dash === 'dash' ? [8, 5] : []);
  ctx.lineCap   = 'round';
  ctx.lineJoin  = 'round';
}

function drawShape(s) {
  ctx.save();
  applyStyle(s);
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur  = 4;
  switch (s.type) {
    case 'arrow':   drawArrow(s.x1, s.y1, s.x2, s.y2);           break;
    case 'line':    drawLine(s.x1, s.y1, s.x2, s.y2);            break;
    case 'ellipse': drawEllipse(s.x1, s.y1, s.x2, s.y2);         break;
    case 'rect':    drawRect(s.x1, s.y1, s.x2, s.y2);            break;
    case 'curve':   drawCurve(s.x1, s.y1, s.x2, s.y2, s.cx, s.cy); break;
    case 'polygon': drawPolygon(s.points || [], true);             break;
  }
  ctx.restore();
}

function drawArrow(x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  if (len < 2) return;

  // Arrowhead size: proportional to stroke, capped
  const hw = Math.min(5 + ctx.lineWidth * 2.5, 18); // half-width of head
  const hl = hw * 1.6; // length of head

  const angle = Math.atan2(dy, dx);

  // Shorten the line so it ends at base of arrowhead (clean look)
  const lx2 = x2 - hl * Math.cos(angle);
  const ly2 = y2 - hl * Math.sin(angle);

  // Shaft
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(lx2, ly2);
  ctx.stroke();

  // Filled arrowhead
  ctx.save();
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
  ctx.fillStyle = ctx.strokeStyle;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(angle - 0.38) , y2 - hl * Math.sin(angle - 0.38));
  ctx.lineTo(x2 - hl * 0.5 * Math.cos(angle)  , y2 - hl * 0.5 * Math.sin(angle)); // concave notch
  ctx.lineTo(x2 - hl * Math.cos(angle + 0.38) , y2 - hl * Math.sin(angle + 0.38));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawLine(x1, y1, x2, y2) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

function drawEllipse(x1, y1, x2, y2) {
  const cx=(x1+x2)/2, cy=(y1+y2)/2;
  const rx=Math.abs(x2-x1)/2, ry=Math.abs(y2-y1)/2;
  ctx.beginPath(); ctx.ellipse(cx, cy, Math.max(rx,1), Math.max(ry,1), 0, 0, Math.PI*2); ctx.stroke();
}

function drawRect(x1, y1, x2, y2) {
  ctx.beginPath(); ctx.rect(x1, y1, x2-x1, y2-y1); ctx.stroke();
}

function drawCurve(x1, y1, x2, y2, cx, cy) {
  // Tangent at endpoint: direction from control point to end
  const angle = Math.atan2(y2 - cy, x2 - cx);
  const hw = Math.min(5 + ctx.lineWidth * 2.5, 18);
  const hl = hw * 1.6;

  // Shorten end point so shaft doesn't poke through arrowhead
  const endX = x2 - hl * 0.6 * Math.cos(angle);
  const endY = y2 - hl * 0.6 * Math.sin(angle);

  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.quadraticCurveTo(cx, cy, endX, endY); ctx.stroke();

  ctx.save();
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
  ctx.fillStyle = ctx.strokeStyle;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hl * Math.cos(angle - 0.38), y2 - hl * Math.sin(angle - 0.38));
  ctx.lineTo(x2 - hl * 0.5 * Math.cos(angle),  y2 - hl * 0.5 * Math.sin(angle));
  ctx.lineTo(x2 - hl * Math.cos(angle + 0.38), y2 - hl * Math.sin(angle + 0.38));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPolygon(pts, closed) {
  if (pts.length < 2) return;
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  if (closed) {
    ctx.closePath();
    ctx.save();
    ctx.globalAlpha *= .15;
    ctx.fillStyle = ctx.strokeStyle; ctx.fill();
    ctx.restore();
  }
  ctx.stroke();
}

// ── Draw a single anchor dot ──
function drawDot(x, y, highlight, label) {
  const r = highlight ? 7 : 4;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = highlight ? '#ffffff' : currentColor; ctx.fill();
  ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5; ctx.stroke();
  if (label) {
    ctx.fillStyle = '#ffffff'; ctx.font = '9px Segoe UI, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
    ctx.fillText(label, x, y - r - 2);
  }
}

function redraw() {
  ctx.clearRect(0, 0, PITCH_W, PITCH_H);
  annotations.forEach((s, i) => {
    if (i === hoveredAnnIdx || i === draggingAnnIdx) {
      // Draw glow highlight
      ctx.save();
      applyStyle(s);
      ctx.shadowColor = 'rgba(255,255,255,0.5)';
      ctx.shadowBlur = 12;
      ctx.globalAlpha = 0.4;
      drawShape(s);
      ctx.restore();
    }
    drawShape(s);
  });

  if (!inDraw || !isDrawTool(currentTool)) return;

  // ── Preview for each tool ──
  ctx.save();
  ctx.strokeStyle = currentColor;
  ctx.lineWidth   = strokeSize;
  ctx.setLineDash(dashStyle === 'dash' ? [8,5] : []);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.globalAlpha = .75;
  ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 4;

  const p = pinPts;
  const mx = mouseX, my = mouseY;

  if (currentTool === 'arrow') {
    if (p.length === 0) {
      // nothing yet
    } else if (p.length === 1) {
      // rubber-band from p0 to mouse
      drawArrow(p[0].x, p[0].y, mx, my);
      ctx.setLineDash([]); drawDot(p[0].x, p[0].y, false, '1');
    }
  }

  if (currentTool === 'line') {
    if (p.length === 1) {
      drawLine(p[0].x, p[0].y, mx, my);
      ctx.setLineDash([]); drawDot(p[0].x, p[0].y, false, '1');
    }
  }

  if (currentTool === 'ellipse') {
    if (p.length === 1) {
      drawEllipse(p[0].x, p[0].y, mx, my);
      ctx.setLineDash([]); drawDot(p[0].x, p[0].y, false, '');
    }
  }

  if (currentTool === 'rect') {
    if (p.length === 1) {
      drawRect(p[0].x, p[0].y, mx, my);
      ctx.setLineDash([]); drawDot(p[0].x, p[0].y, false, '');
    }
  }

  if (currentTool === 'curve') {
    ctx.setLineDash(dashStyle === 'dash' ? [8,5] : []);
    if (p.length === 1) {
      // rubber-band line to second point
      drawLine(p[0].x, p[0].y, mx, my);
      ctx.setLineDash([]); drawDot(p[0].x, p[0].y, false, '1');
    } else if (p.length === 2) {
      // show arc with mouse as control point
      drawCurve(p[0].x, p[0].y, p[1].x, p[1].y, mx, my);
      ctx.setLineDash([]);
      drawDot(p[0].x, p[0].y, false, '1');
      drawDot(p[1].x, p[1].y, false, '2');
      // Control point handle
      ctx.globalAlpha = .5;
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
      ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(p[0].x, p[0].y); ctx.lineTo(mx, my); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p[1].x, p[1].y); ctx.lineTo(mx, my); ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = .75;
      drawDot(mx, my, true, 'ctrl');
    }
  }

  if (currentTool === 'polygon') {
    if (p.length >= 1) {
      // Draw placed segments
      drawPolygon(p, false);
      // Rubber-band
      const last = p[p.length-1];
      ctx.setLineDash([4,4]); ctx.globalAlpha = .5;
      ctx.beginPath(); ctx.moveTo(last.x, last.y); ctx.lineTo(mx, my); ctx.stroke();
      // Anchor dots
      ctx.setLineDash([]); ctx.globalAlpha = 1;
      p.forEach((pt, i) => {
        const nearFirst = i===0 && p.length >= 3 && Math.hypot(mx-pt.x, my-pt.y) < 12;
        drawDot(pt.x, pt.y, nearFirst, '');
      });
    }
  }

  ctx.restore();
}

// ──────────────────────────────────────────────
//  ANNOTATION HIT-TESTING & MOVING
// ──────────────────────────────────────────────
function distPtSeg(px, py, x1, y1, x2, y2) {
  const dx = x2-x1, dy = y2-y1;
  const lenSq = dx*dx + dy*dy;
  if (lenSq === 0) return Math.hypot(px-x1, py-y1);
  const t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / lenSq));
  return Math.hypot(px - (x1+t*dx), py - (y1+t*dy));
}

function hitTestAnnotation(s, px, py) {
  const T = Math.max(s.size || 2, 2) + 7; // hit tolerance
  switch (s.type) {
    case 'arrow':
    case 'line':
      return distPtSeg(px, py, s.x1, s.y1, s.x2, s.y2) < T;
    case 'curve': {
      // Sample along quadratic bezier
      for (let t=0; t<=1; t+=0.05) {
        const bx = (1-t)*(1-t)*s.x1 + 2*(1-t)*t*s.cx + t*t*s.x2;
        const by = (1-t)*(1-t)*s.y1 + 2*(1-t)*t*s.cy + t*t*s.y2;
        if (Math.hypot(px-bx, py-by) < T) return true;
      }
      return false;
    }
    case 'ellipse': {
      const cx=(s.x1+s.x2)/2, cy=(s.y1+s.y2)/2;
      const rx=Math.abs(s.x2-s.x1)/2, ry=Math.abs(s.y2-s.y1)/2;
      if (rx<1||ry<1) return false;
      const norm = ((px-cx)/rx)**2 + ((py-cy)/ry)**2;
      const normT = ((px-cx)/(rx+T))**2 + ((py-cy)/(ry+T))**2;
      return normT <= 1 && norm >= ((rx-T)/rx)**2 * 0.5;
    }
    case 'rect': {
      const x1=Math.min(s.x1,s.x2), x2=Math.max(s.x1,s.x2);
      const y1=Math.min(s.y1,s.y2), y2=Math.max(s.y1,s.y2);
      const inside = px>x1-T && px<x2+T && py>y1-T && py<y2+T;
      const border = px<x1+T || px>x2-T || py<y1+T || py>y2-T;
      return inside && border;
    }
    case 'polygon': {
      const pts = s.points || [];
      for (let i=0; i<pts.length; i++) {
        const j = (i+1) % pts.length;
        if (distPtSeg(px, py, pts[i].x, pts[i].y, pts[j].x, pts[j].y) < T) return true;
      }
      return false;
    }
  }
  return false;
}

function getAnnotationAtPoint(px, py) {
  // Search from top (last drawn) to bottom
  for (let i = annotations.length - 1; i >= 0; i--) {
    if (hitTestAnnotation(annotations[i], px, py)) return i;
  }
  return -1;
}

function moveAnnotation(s, dx, dy) {
  switch (s.type) {
    case 'arrow': case 'line':
      s.x1+=dx; s.y1+=dy; s.x2+=dx; s.y2+=dy; break;
    case 'curve':
      s.x1+=dx; s.y1+=dy; s.x2+=dx; s.y2+=dy; s.cx+=dx; s.cy+=dy; break;
    case 'ellipse': case 'rect':
      s.x1+=dx; s.y1+=dy; s.x2+=dx; s.y2+=dy; break;
    case 'polygon':
      s.points = s.points.map(p => ({x: p.x+dx, y: p.y+dy})); break;
  }
}

// Canvas mouse events for annotation dragging in select mode
canvas.addEventListener('mousemove', e => {
  const {x, y} = getXY(e);
  if (isDrawTool(currentTool)) {
    mouseX = x; mouseY = y;
    if (inDraw) redraw();
    return;
  }
  if (currentTool === 'select') {
    if (draggingAnnIdx >= 0) {
      const dx = x - (annDragOffX + annotations[draggingAnnIdx]._dragStartX || x);
      // Use stored last mouse position for delta
      const s = annotations[draggingAnnIdx];
      moveAnnotation(s, x - s._mx, y - s._my);
      s._mx = x; s._my = y;
      redraw();
    } else {
      const idx = getAnnotationAtPoint(x, y);
      const wasHovered = hoveredAnnIdx;
      hoveredAnnIdx = idx;
      if (wasHovered !== idx) {
        canvas.classList.toggle('hovering', idx >= 0);
        redraw();
      }
    }
  }
});

canvas.addEventListener('mousedown', e => {
  if (currentTool !== 'select') return;
  const {x, y} = getXY(e);
  const idx = getAnnotationAtPoint(x, y);
  if (idx >= 0) {
    e.stopPropagation();
    draggingAnnIdx = idx;
    const s = annotations[idx];
    s._mx = x; s._my = y;
    canvas.classList.add('drawing'); // grab pointer events
    canvas.style.cursor = 'grabbing';

    const onMove = ev => {
      const r = canvas.getBoundingClientRect();
      const nx = ev.clientX - r.left, ny = ev.clientY - r.top;
      moveAnnotation(s, nx - s._mx, ny - s._my);
      s._mx = nx; s._my = ny;
      redraw();
    };
    const onUp = () => {
      draggingAnnIdx = -1;
      canvas.classList.remove('drawing');
      canvas.style.cursor = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      redraw();
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }
});

canvas.addEventListener('mouseleave', e => {
  if (!isDrawTool(currentTool)) {
    hoveredAnnIdx = -1;
    canvas.classList.remove('hovering');
  }
});


function saveAnnotation(s) {
  undoStack.push([...annotations]);
  annotations.push(s);
}

function undo() {
  if (inDraw) { cancelDraw(); return; }
  if (undoStack.length === 0) return;
  annotations = undoStack.pop();
  redraw();
}

function clearAnnotations() {
  if (!annotations.length) return;
  undoStack.push([...annotations]);
  annotations = [];
  redraw();
}

// ──────────────────────────────────────────────
//  PLAYERS
// ──────────────────────────────────────────────
function addPlayer(x, y, number='', name='', color='#1f6feb') {
  const id = nextPlayerId++;
  players.push({id, x, y, number, name, color});
  renderPlayers();
  return id;
}

function renderPlayers() {
  playerLayer.innerHTML = '';
  players.forEach(p => {
    const el = document.createElement('div');
    el.className = 'player-token';
    el.dataset.id = p.id;
    el.style.left = p.x + 'px';
    el.style.top  = p.y + 'px';

    const circle = document.createElement('div');
    circle.className = 'player-circle' + (p.id === selectedPlayerId ? ' selected' : '');
    circle.style.background = p.color;
    // Number: show only if not empty — no fallback "?"
    circle.textContent = p.number || '';

    const lbl = document.createElement('div');
    lbl.className = 'player-label';
    lbl.textContent = p.name;

    el.appendChild(circle);
    el.appendChild(lbl);

    el.addEventListener('mousedown', onPlayerMouseDown);
    el.addEventListener('touchstart', onPlayerTouchStart, {passive:false});
    el.addEventListener('contextmenu', onPlayerCtxMenu);
    el.addEventListener('click', onPlayerClick);

    playerLayer.appendChild(el);
  });
}

function onPlayerClick(e) {
  e.stopPropagation();
  const id = +e.currentTarget.dataset.id;
  if (currentTool === 'select' || currentTool === 'player') selectPlayer(id);
}

function selectPlayer(id) {
  selectedPlayerId = id;
  const p = players.find(p => p.id === id);
  if (!p) return;
  document.getElementById('pe-number').value = p.number;
  document.getElementById('pe-name').value   = p.name;
  document.getElementById('player-editor').classList.add('visible');
  renderPlayers();
}

function deselectPlayer() { selectedPlayerId = null; renderPlayers(); }
function closeEditor()    { document.getElementById('player-editor').classList.remove('visible'); }

function updateSelectedPlayer() {
  if (selectedPlayerId === null) return;
  const p = players.find(p => p.id === selectedPlayerId);
  if (!p) return;
  p.number = document.getElementById('pe-number').value;
  p.name   = document.getElementById('pe-name').value;
  renderPlayers();
}

function updateSelectedPlayerColor(color) {
  if (selectedPlayerId === null) return;
  const p = players.find(p => p.id === selectedPlayerId);
  if (!p) return;
  p.color = color; renderPlayers();
}

function deleteSelectedPlayer() {
  if (selectedPlayerId === null) return;
  players = players.filter(p => p.id !== selectedPlayerId);
  selectedPlayerId = null; closeEditor(); renderPlayers();
}

// ── DRAG ──
function onPlayerMouseDown(e) {
  if (currentTool !== 'select') return;
  e.stopPropagation();
  startPlayerDrag(e.currentTarget, e.clientX, e.clientY);
}
function onPlayerTouchStart(e) {
  if (currentTool !== 'select') return;
  e.stopPropagation(); e.preventDefault();
  startPlayerDrag(e.currentTarget, e.touches[0].clientX, e.touches[0].clientY);
}

function startPlayerDrag(el, cx, cy) {
  const id = +el.dataset.id;
  const p = players.find(p => p.id === id);
  if (!p) return;
  const rect = canvas.getBoundingClientRect();
  dragOffX = cx - rect.left - p.x;
  dragOffY = cy - rect.top  - p.y;
  el.classList.add('dragging');

  const onMove = ev => {
    const c = ev.touches ? ev.touches[0] : ev;
    const r = canvas.getBoundingClientRect();
    p.x = Math.max(10, Math.min(PITCH_W-10, c.clientX - r.left - dragOffX));
    p.y = Math.max(10, Math.min(PITCH_H-10, c.clientY - r.top  - dragOffY));
    el.style.left = p.x + 'px';
    el.style.top  = p.y + 'px';
  };
  const onUp = () => {
    el.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onUp);
    renderPlayers();
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend',  onUp);
}

// ── CONTEXT MENU ──
function onPlayerCtxMenu(e) {
  e.preventDefault(); e.stopPropagation();
  ctxTargetId = +e.currentTarget.dataset.id;
  const menu = document.getElementById('ctx-menu');
  menu.style.left = e.clientX + 'px';
  menu.style.top  = e.clientY + 'px';
  menu.classList.add('visible');
}
function hideCtxMenu() { document.getElementById('ctx-menu').classList.remove('visible'); }
function ctxEdit()      { selectPlayer(ctxTargetId); hideCtxMenu(); }
function ctxDuplicate() {
  const p = players.find(p => p.id === ctxTargetId);
  if (!p) return;
  addPlayer(p.x+20, p.y+20, p.number, p.name, p.color);
  hideCtxMenu();
}
function ctxDelete() {
  players = players.filter(p => p.id !== ctxTargetId);
  if (selectedPlayerId === ctxTargetId) { selectedPlayerId = null; closeEditor(); }
  renderPlayers(); hideCtxMenu();
}

// ── COLOR GRID ──
function buildColorGrid() {
  const grid = document.getElementById('pe-colors');
  PLAYER_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch';
    s.style.background = c;
    s.dataset.color = c;
    s.onclick = () => { currentColor = c; updateSelectedPlayerColor(c); };
    grid.appendChild(s);
  });
}

// ──────────────────────────────────────────────
//  BALL
// ──────────────────────────────────────────────
function initBall() {
  const ballEl = document.getElementById('ball-token');
  ballEl.style.left = ball.x + 'px';
  ballEl.style.top  = ball.y + 'px';
  ballEl.style.display = 'block';

  let bdx = 0, bdy = 0;

  const onBallDown = (cx, cy) => {
    const r = document.getElementById('pitch-container').getBoundingClientRect();
    bdx = cx - r.left - ball.x;
    bdy = cy - r.top  - ball.y;
    ballEl.classList.add('dragging');

    const onMove = ev => {
      const c = ev.touches ? ev.touches[0] : ev;
      const rc = document.getElementById('pitch-container').getBoundingClientRect();
      ball.x = Math.max(13, Math.min(PITCH_W-13, c.clientX - rc.left - bdx));
      ball.y = Math.max(13, Math.min(PITCH_H-13, c.clientY - rc.top  - bdy));
      ballEl.style.left = ball.x + 'px';
      ballEl.style.top  = ball.y + 'px';
    };
    const onUp = () => {
      ballEl.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend',  onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend',  onUp);
  };

  ballEl.addEventListener('mousedown', e => {
    e.stopPropagation();
    onBallDown(e.clientX, e.clientY);
  });
  ballEl.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    onBallDown(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});
}

function loadFormation(key) {
  if (!key) return;
  const f = FORMATIONS[key];
  if (!f) return;
  players = []; nextPlayerId = 1;
  f.positions.forEach((pos, i) => {
    players.push({
      id: nextPlayerId++,
      x: Math.round(pos.x * PITCH_W),
      y: Math.round(pos.y * PITCH_H),
      number: pos.n, name: pos.nm,
      color: f.colors[i] || '#1f6feb'
    });
  });
  renderPlayers();
  document.getElementById('formation-select').value = '';
  setTool('select');
}

// ──────────────────────────────────────────────
//  TEMPLATES (localStorage)
// ──────────────────────────────────────────────
const TPL_KEY = 'thefootys_templates_v1';

function getTemplates() {
  try { return JSON.parse(localStorage.getItem(TPL_KEY) || '[]'); } catch { return []; }
}
function setTemplates(list) {
  localStorage.setItem(TPL_KEY, JSON.stringify(list));
}

function openTemplateModal() {
  renderTemplateList();
  document.getElementById('tpl-modal').classList.add('visible');
  document.getElementById('tpl-name-input').focus();
}
function closeTemplateModal() {
  document.getElementById('tpl-modal').classList.remove('visible');
}

document.getElementById('tpl-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('tpl-modal')) closeTemplateModal();
});

function saveTemplate() {
  const name = document.getElementById('tpl-name-input').value.trim();
  if (!name) {
    document.getElementById('tpl-name-input').focus();
    document.getElementById('tpl-name-input').style.borderColor = '#f85149';
    setTimeout(() => document.getElementById('tpl-name-input').style.borderColor = '', 800);
    return;
  }
  const list = getTemplates();
  const now = new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'2-digit'});
  list.unshift({
    id: Date.now(),
    name,
    date: now,
    players: JSON.parse(JSON.stringify(players)),
    annotations: JSON.parse(JSON.stringify(annotations)),
    nextPlayerId,
  });
  setTemplates(list);
  document.getElementById('tpl-name-input').value = '';
  renderTemplateList();
}

function loadTemplate(id) {
  const list = getTemplates();
  const tpl = list.find(t => t.id === id);
  if (!tpl) return;
  players       = JSON.parse(JSON.stringify(tpl.players));
  annotations   = JSON.parse(JSON.stringify(tpl.annotations));
  nextPlayerId  = tpl.nextPlayerId || (players.length + 1);
  undoStack     = [];
  cancelDraw();
  renderPlayers();
  redraw();
  setTool('select');
  closeTemplateModal();
}

function deleteTemplate(id) {
  let list = getTemplates();
  list = list.filter(t => t.id !== id);
  setTemplates(list);
  renderTemplateList();
}

function renderTemplateList() {
  const list = getTemplates();
  const el   = document.getElementById('tpl-list');
  if (list.length === 0) {
    el.innerHTML = '<div class="tpl-empty">No saved templates yet</div>';
    return;
  }
  el.innerHTML = '';
  list.forEach(tpl => {
    const item = document.createElement('div');
    item.className = 'tpl-item';
    item.innerHTML = `
      <div style="flex:1">
        <div class="tpl-item-name">${tpl.name}</div>
        <div class="tpl-item-meta">${tpl.date} · ${tpl.players.length} players · ${tpl.annotations.length} shapes</div>
      </div>
      <button class="btn" style="font-size:11px;padding:4px 8px" onclick="loadTemplate(${tpl.id})">Load</button>
      <button class="tpl-item-del" onclick="deleteTemplate(${tpl.id})" title="Delete">✕</button>
    `;
    el.appendChild(item);
  });
}

// ──────────────────────────────────────────────
//  EXPORT
// ──────────────────────────────────────────────
async function exportPNG() {
  const scale = 2;
  const exp = document.createElement('canvas');
  exp.width = PITCH_W * scale; exp.height = PITCH_H * scale;
  const ec = exp.getContext('2d');
  ec.scale(scale, scale);

  // Pitch
  const svgBlob = new Blob([`<svg xmlns="http://www.w3.org/2000/svg" width="${PITCH_W}" height="${PITCH_H}">${pitchSVG.innerHTML}</svg>`], {type:'image/svg+xml'});
  const url = URL.createObjectURL(svgBlob);
  const img = await new Promise(r => { const i = new Image(); i.onload=()=>r(i); i.src=url; });
  ec.drawImage(img, 0, 0);
  URL.revokeObjectURL(url);

  // Annotations
  ec.drawImage(canvas, 0, 0);

  // Players
  players.forEach(p => {
    const r = 17;
    ec.beginPath(); ec.arc(p.x, p.y, r, 0, Math.PI*2);
    ec.fillStyle = p.color; ec.fill();
    ec.strokeStyle = 'rgba(255,255,255,0.9)'; ec.lineWidth = 2; ec.stroke();
    // Number — only if set
    if (p.number) {
      ec.fillStyle = '#fff'; ec.font = 'bold 11px Segoe UI, sans-serif';
      ec.textAlign = 'center'; ec.textBaseline = 'middle';
      ec.fillText(p.number, p.x, p.y);
    }
    if (p.name) {
      ec.fillStyle = 'rgba(0,0,0,0.8)';
      const tw = ec.measureText(p.name.toUpperCase()).width + 8;
      ec.fillRect(p.x - tw/2, p.y + r + 2, tw, 14);
      ec.fillStyle = '#fff'; ec.font = 'bold 8px Segoe UI, sans-serif';
      ec.textAlign = 'center'; ec.textBaseline = 'middle';
      ec.fillText(p.name.toUpperCase(), p.x, p.y + r + 9);
    }
  });

  // Ball
  if (ball.visible) {
    const br = 13;
    const bx = ball.x, by = ball.y;
    // White sphere
    ec.beginPath(); ec.arc(bx, by, br, 0, Math.PI*2);
    ec.fillStyle = '#ffffff'; ec.fill();
    ec.strokeStyle = '#222'; ec.lineWidth = 1.5; ec.stroke();
    // Black patches (simplified for canvas export)
    const patches = [
      [[0,-1],[0.7,-0.5],[-0.7,-0.5]],       // top
      [[0.95,0.3],[0.3,0.95],[-0.3,0.5]],     // right
      [[-0.95,0.3],[-0.3,0.95],[0.3,0.5]],    // left
    ];
    patches.forEach(pts => {
      ec.beginPath();
      ec.moveTo(bx + pts[0][0]*br*0.75, by + pts[0][1]*br*0.75);
      pts.forEach(([dx,dy]) => ec.lineTo(bx + dx*br*0.75, by + dy*br*0.75));
      ec.closePath();
      ec.fillStyle = '#111'; ec.fill();
    });
    // Shine
    ec.beginPath();
    ec.ellipse(bx - br*0.25, by - br*0.3, br*0.2, br*0.12, -0.5, 0, Math.PI*2);
    ec.fillStyle = 'rgba(255,255,255,0.5)'; ec.fill();
  }

  // Watermark
  const wmY = PITCH_H - 6, wmX = PITCH_W / 2;
  ec.strokeStyle = 'rgba(255,255,255,0.12)'; ec.lineWidth = 1;
  ec.setLineDash([]); ec.beginPath();
  ec.moveTo(PITCH_W*.25, wmY-18); ec.lineTo(PITCH_W*.75, wmY-18); ec.stroke();
  ec.fillStyle = 'rgba(255,255,255,0.55)';
  ec.font = '700 11px "Barlow Condensed", "Segoe UI", sans-serif';
  ec.textAlign = 'center'; ec.textBaseline = 'bottom';
  ec.fillText('THE  FOOTYS', wmX, wmY);

  const a = document.createElement('a');
  a.download = 'tactical-board.png';
  a.href = exp.toDataURL('image/png');
  a.click();
}
