<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tactical Board — The Footys</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d1117;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ── */
  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  #header .brand {
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 2px;
    color: #58a6ff;
    text-transform: uppercase;
  }
  .sep { width: 1px; height: 24px; background: #30363d; }

  /* ── TOOLGROUPS ── */
  .toolgroup {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .tool-label {
    font-size: 10px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding-right: 4px;
  }

  /* ── BUTTONS ── */
  .btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .btn:hover { background: #30363d; border-color: #58a6ff; }
  .btn.active { background: #1f6feb; border-color: #58a6ff; color: #fff; }
  .btn svg { width: 14px; height: 14px; }

  /* ── COLOR PICKER ── */
  .color-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid #30363d;
    cursor: pointer;
    transition: transform .15s, border-color .15s;
  }
  .color-swatch:hover, .color-swatch.active { transform: scale(1.2); border-color: #fff; }

  input[type=color] {
    width: 28px; height: 28px;
    border: 1px solid #30363d;
    border-radius: 6px;
    background: #21262d;
    cursor: pointer;
    padding: 2px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 70px;
    height: 4px;
    border-radius: 2px;
    background: #30363d;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #58a6ff;
  }

  /* ── PITCH WRAPPER ── */
  #pitch-wrap {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    padding: 16px;
  }

  #pitch-container {
    position: relative;
    touch-action: none;
  }

  /* ── PITCH SVG BACKGROUND ── */
  #pitch-svg {
    display: block;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,.6);
  }

  /* ── ANNOTATION CANVAS ── */
  #annotation-canvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }
  #annotation-canvas.drawing { pointer-events: all; cursor: crosshair; }

  /* ── PLAYER LAYER ── */
  #player-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #player-layer.editable { pointer-events: all; }

  /* ── PLAYER TOKEN ── */
  .player-token {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    pointer-events: all;
  }
  .player-token.dragging { opacity: .85; z-index: 999; cursor: grabbing; }

  .player-circle {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,.9);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.5);
    position: relative;
    z-index: 1;
  }
  .player-circle.selected {
    box-shadow: 0 0 0 3px #fff, 0 2px 8px rgba(0,0,0,.5);
  }

  .player-name {
    margin-top: 3px;
    background: rgba(0,0,0,.75);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .5px;
    padding: 1px 5px;
    border-radius: 3px;
    white-space: nowrap;
    text-transform: uppercase;
    pointer-events: none;
  }
  .player-name:empty { display: none; }

  /* ── PLAYER EDITOR PANEL ── */
  #player-editor {
    position: fixed;
    right: 16px;
    top: 60px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 14px;
    width: 200px;
    z-index: 500;
    display: none;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  #player-editor.visible { display: flex; }
  #player-editor h3 { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
  #player-editor input[type=text] {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    padding: 6px 8px;
    font-size: 12px;
  }
  #player-editor input[type=text]:focus { outline: none; border-color: #58a6ff; }
  .color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
  }
  .color-grid .color-swatch { width: 24px; height: 24px; }

  /* ── CONTEXT MENU ── */
  #ctx-menu {
    position: fixed;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 4px;
    z-index: 1000;
    display: none;
    flex-direction: column;
    gap: 2px;
    box-shadow: 0 8px 24px rgba(0,0,0,.6);
    min-width: 140px;
  }
  #ctx-menu.visible { display: flex; }
  #ctx-menu button {
    background: none;
    border: none;
    color: #c9d1d9;
    padding: 7px 12px;
    font-size: 12px;
    border-radius: 5px;
    cursor: pointer;
    text-align: left;
  }
  #ctx-menu button:hover { background: #30363d; }
  #ctx-menu button.danger { color: #f85149; }

  /* ── STATUS BAR ── */
  #status {
    font-size: 11px;
    color: #8b949e;
    padding: 4px 16px;
    background: #161b22;
    border-top: 1px solid #30363d;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- ── HEADER TOOLBAR ── -->
<div id="header">
  <span class="brand">The Footys</span>
  <div class="sep"></div>

  <!-- SELECT / PLAYER TOOLS -->
  <div class="toolgroup">
    <span class="tool-label">Mode</span>
    <button class="btn active" id="tool-select" onclick="setTool('select')" title="Select & Move">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 2l10 6-5 1-2 5z"/></svg>
      Select
    </button>
    <button class="btn" id="tool-player" onclick="setTool('player')" title="Add Player">
      <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>
      Player
    </button>
  </div>

  <div class="sep"></div>

  <!-- ANNOTATION TOOLS -->
  <div class="toolgroup">
    <span class="tool-label">Draw</span>
    <button class="btn" id="tool-arrow" onclick="setTool('arrow')" title="Dashed Arrow">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><line x1="2" y1="14" x2="12" y2="4"/><polyline points="7,4 12,4 12,9"/></svg>
      Arrow
    </button>
    <button class="btn" id="tool-line" onclick="setTool('line')" title="Straight Line">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><line x1="2" y1="14" x2="14" y2="2"/></svg>
      Line
    </button>
    <button class="btn" id="tool-curve" onclick="setTool('curve')" title="Curved Arrow">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><path d="M2 14 Q8 2 14 8"/><polyline points="10,5 14,8 11,11"/></svg>
      Curve
    </button>
    <button class="btn" id="tool-ellipse" onclick="setTool('ellipse')" title="Ellipse">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><ellipse cx="8" cy="8" rx="6" ry="4"/></svg>
      Ellipse
    </button>
    <button class="btn" id="tool-rect" onclick="setTool('rect')" title="Rectangle">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.5" fill="none"><rect x="2" y="4" width="12" height="8" rx="1"/></svg>
      Rect
    </button>
    <button class="btn" id="tool-free" onclick="setTool('free')" title="Freehand">
      <svg viewBox="0 0 16 16" stroke="currentColor" stroke-width="2" fill="none"><path d="M2 12 Q5 4 8 8 Q11 12 14 4"/></svg>
      Free
    </button>
  </div>

  <div class="sep"></div>

  <!-- STYLE -->
  <div class="toolgroup">
    <span class="tool-label">Color</span>
    <!-- Swatches -->
    <div class="color-swatch active" style="background:#ffffff" data-color="#ffffff" onclick="setColor(this)" title="White"></div>
    <div class="color-swatch" style="background:#f85149" data-color="#f85149" onclick="setColor(this)" title="Red"></div>
    <div class="color-swatch" style="background:#ffa657" data-color="#ffa657" onclick="setColor(this)" title="Orange"></div>
    <div class="color-swatch" style="background:#3fb950" data-color="#3fb950" onclick="setColor(this)" title="Green"></div>
    <div class="color-swatch" style="background:#58a6ff" data-color="#58a6ff" onclick="setColor(this)" title="Blue"></div>
    <div class="color-swatch" style="background:#d2a8ff" data-color="#d2a8ff" onclick="setColor(this)" title="Purple"></div>
    <div class="color-swatch" style="background:#f9e157" data-color="#f9e157" onclick="setColor(this)" title="Yellow"></div>
    <input type="color" id="custom-color" value="#ffffff" onchange="setColorFromPicker(this.value)" title="Custom color">
  </div>

  <div class="toolgroup">
    <span class="tool-label">Size</span>
    <input type="range" id="stroke-size" min="1" max="8" value="2" oninput="strokeSize=+this.value">
  </div>

  <div class="toolgroup">
    <span class="tool-label">Style</span>
    <button class="btn active" id="stroke-solid" onclick="setDash('solid')" title="Solid">—</button>
    <button class="btn" id="stroke-dash" onclick="setDash('dash')" title="Dashed">- -</button>
  </div>

  <div class="sep"></div>

  <!-- ACTIONS -->
  <div class="toolgroup">
    <button class="btn" onclick="undo()" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4H10a4 4 0 010 8H4"/><polyline points="7,1 4,4 7,7"/></svg>
      Undo
    </button>
    <button class="btn" onclick="clearAnnotations()" title="Clear drawings">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="3" x2="13" y2="13"/><line x1="13" y1="3" x2="3" y2="13"/></svg>
      Clear
    </button>
    <button class="btn" onclick="exportPNG()" title="Export PNG">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 11v3h10v-3M8 2v8M5 7l3 3 3-3"/></svg>
      Export
    </button>
  </div>

  <!-- FORMATION -->
  <div class="toolgroup">
    <span class="tool-label">Formation</span>
    <select id="formation-select" onchange="loadFormation(this.value)" style="background:#21262d;border:1px solid #30363d;color:#c9d1d9;border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer">
      <option value="">— Load —</option>
      <option value="433">4-3-3</option>
      <option value="442">4-4-2</option>
      <option value="352">3-5-2</option>
      <option value="4231">4-2-3-1</option>
      <option value="325">3-2-5 (Box3)</option>
    </select>
  </div>
</div>

<!-- ── PITCH ── -->
<div id="pitch-wrap">
  <div id="pitch-container">
    <!-- Pitch background drawn as SVG -->
    <svg id="pitch-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <!-- Annotation canvas -->
    <canvas id="annotation-canvas"></canvas>
    <!-- Player layer -->
    <div id="player-layer"></div>
  </div>
</div>

<!-- ── STATUS ── -->
<div id="status" id="status">Select tool active — click pitch to add players, or choose a drawing tool</div>

<!-- ── PLAYER EDITOR PANEL ── -->
<div id="player-editor">
  <h3>Player</h3>
  <input type="text" id="pe-number" placeholder="Number" maxlength="2" oninput="updateSelectedPlayer()">
  <input type="text" id="pe-name" placeholder="Name" oninput="updateSelectedPlayer()">
  <div class="color-grid" id="pe-colors"></div>
  <button class="btn" style="font-size:11px;color:#f85149" onclick="deleteSelectedPlayer()">🗑 Remove Player</button>
</div>

<!-- ── CONTEXT MENU ── -->
<div id="ctx-menu">
  <button onclick="ctxEdit()">✏️ Edit Player</button>
  <button onclick="ctxDuplicate()">⧉ Duplicate</button>
  <button class="danger" onclick="ctxDelete()">🗑 Delete</button>
</div>

<script>
// ──────────────────────────────────────────────
//  CONSTANTS & STATE
// ──────────────────────────────────────────────
const PITCH_W = 800, PITCH_H = 520;

const PLAYER_COLORS = [
  '#1f6feb','#238636','#da3633','#f0883e',
  '#8957e5','#db61a2','#2ea043','#58a6ff',
  '#ffffff','#0d1117','#f9e157','#ffa657',
];

let currentTool = 'select';
let currentColor = '#ffffff';
let strokeSize = 2;
let dashStyle = 'solid'; // 'solid' | 'dash'

// Annotations
let annotations = [];    // saved shapes
let undoStack = [];
let drawing = false;
let startX, startY, curX, curY;
let freePoints = [];
let curvePhase = 0;      // 0=first point, 1=endpoint, 2=control
let curveStart = null;
let curveEnd = null;

// Players
let players = [];        // {id, x, y, number, name, color}
let nextPlayerId = 1;
let selectedPlayerId = null;
let draggingPlayer = null;
let dragOffX = 0, dragOffY = 0;

// Context menu
let ctxTargetId = null;

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
const pitchSVG = document.getElementById('pitch-svg');
const canvas = document.getElementById('annotation-canvas');
const ctx = canvas.getContext('2d');
const playerLayer = document.getElementById('player-layer');

function init() {
  pitchSVG.setAttribute('width', PITCH_W);
  pitchSVG.setAttribute('height', PITCH_H);
  pitchSVG.innerHTML = buildPitchSVG();

  canvas.width = PITCH_W;
  canvas.height = PITCH_H;

  buildColorGrid();
  updateStatus();

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.key === 'Escape') { closeEditor(); hideCtxMenu(); deselectPlayer(); }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (selectedPlayerId !== null) deleteSelectedPlayer();
    }
  });

  document.addEventListener('click', () => hideCtxMenu(), true);
}

// ──────────────────────────────────────────────
//  PITCH SVG
// ──────────────────────────────────────────────
function buildPitchSVG() {
  const G = '#3a7a3a', L = 'rgba(255,255,255,0.7)', sw = 1.5;
  const stripW = PITCH_W / 8;
  let strips = '';
  for (let i = 0; i < 8; i++) {
    const shade = i % 2 === 0 ? '#2d6a2d' : '#336e33';
    strips += `<rect x="${i * stripW}" y="0" width="${stripW}" height="${PITCH_H}" fill="${shade}"/>`;
  }

  const p = (s) => `stroke="${L}" stroke-width="${sw}" fill="none" ${s}`;

  return `
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
    </defs>
    ${strips}
    <!-- Border -->
    <rect x="20" y="16" width="${PITCH_W-40}" height="${PITCH_H-32}" ${p('')} rx="1"/>
    <!-- Halfway line -->
    <line x1="${PITCH_W/2}" y1="16" x2="${PITCH_W/2}" y2="${PITCH_H-16}" ${p('')}/>
    <!-- Centre circle -->
    <circle cx="${PITCH_W/2}" cy="${PITCH_H/2}" r="70" ${p('')}/>
    <circle cx="${PITCH_W/2}" cy="${PITCH_H/2}" r="3" fill="${L}"/>
    <!-- Penalty spots -->
    <circle cx="131" cy="${PITCH_H/2}" r="3" fill="${L}"/>
    <circle cx="${PITCH_W-131}" cy="${PITCH_H/2}" r="3" fill="${L}"/>
    <!-- Left penalty area -->
    <rect x="20" y="${PITCH_H/2-98}" width="132" height="196" ${p('')}/>
    <!-- Left 6yd box -->
    <rect x="20" y="${PITCH_H/2-42}" width="46" height="84" ${p('')}/>
    <!-- Left penalty arc -->
    <path d="M 152 ${PITCH_H/2-53} A 70 70 0 0 1 152 ${PITCH_H/2+53}" ${p('')}/>
    <!-- Right penalty area -->
    <rect x="${PITCH_W-152}" y="${PITCH_H/2-98}" width="132" height="196" ${p('')}/>
    <!-- Right 6yd box -->
    <rect x="${PITCH_W-66}" y="${PITCH_H/2-42}" width="46" height="84" ${p('')}/>
    <!-- Right penalty arc -->
    <path d="M ${PITCH_W-152} ${PITCH_H/2-53} A 70 70 0 0 0 ${PITCH_W-152} ${PITCH_H/2+53}" ${p('')}/>
    <!-- Goals -->
    <rect x="2" y="${PITCH_H/2-30}" width="18" height="60" ${p('')}/>
    <rect x="${PITCH_W-20}" y="${PITCH_H/2-30}" width="18" height="60" ${p('')}/>
    <!-- Corner arcs -->
    <path d="M 20 28 A 12 12 0 0 1 32 16" ${p('')}/>
    <path d="M ${PITCH_W-32} 16 A 12 12 0 0 1 ${PITCH_W-20} 28" ${p('')}/>
    <path d="M 20 ${PITCH_H-28} A 12 12 0 0 0 32 ${PITCH_H-16}" ${p('')}/>
    <path d="M ${PITCH_W-32} ${PITCH_H-16} A 12 12 0 0 0 ${PITCH_W-20} ${PITCH_H-28}" ${p('')}/>
  `;
}

// ──────────────────────────────────────────────
//  TOOL MANAGEMENT
// ──────────────────────────────────────────────
function setTool(t) {
  currentTool = t;
  document.querySelectorAll('.btn[id^="tool-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool-' + t);
  if (btn) btn.classList.add('active');

  canvas.classList.toggle('drawing', t !== 'select' && t !== 'player');
  playerLayer.classList.toggle('editable', t === 'select' || t === 'player');

  if (t !== 'curve') curvePhase = 0;
  deselectPlayer();
  closeEditor();
  updateStatus();
}

function setColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  currentColor = el.dataset.color;
  document.getElementById('custom-color').value = currentColor;
  updateSelectedPlayerColor(currentColor);
}

function setColorFromPicker(val) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  currentColor = val;
  updateSelectedPlayerColor(currentColor);
}

function setDash(d) {
  dashStyle = d;
  document.getElementById('stroke-solid').classList.toggle('active', d === 'solid');
  document.getElementById('stroke-dash').classList.toggle('active', d === 'dash');
}

// ──────────────────────────────────────────────
//  CANVAS EVENTS
// ──────────────────────────────────────────────
canvas.addEventListener('mousedown', onCanvasDown);
canvas.addEventListener('mousemove', onCanvasMove);
canvas.addEventListener('mouseup', onCanvasUp);

function getXY(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function onCanvasDown(e) {
  if (currentTool === 'select' || currentTool === 'player') return;
  const {x, y} = getXY(e);

  if (currentTool === 'curve') {
    if (curvePhase === 0) {
      curveStart = {x, y};
      curvePhase = 1;
    } else if (curvePhase === 1) {
      curveEnd = {x, y};
      curvePhase = 2;
      drawing = true;
    } else if (curvePhase === 2) {
      saveShape({
        type: 'curve', x1: curveStart.x, y1: curveStart.y,
        x2: curveEnd.x, y2: curveEnd.y, cx: x, cy: y,
        color: currentColor, size: strokeSize, dash: dashStyle
      });
      curvePhase = 0; drawing = false;
      curveStart = null; curveEnd = null;
      redraw();
    }
    return;
  }

  drawing = true;
  startX = curX = x;
  startY = curY = y;
  if (currentTool === 'free') freePoints = [{x, y}];
}

function onCanvasMove(e) {
  if (!drawing) return;
  const {x, y} = getXY(e);
  curX = x; curY = y;
  if (currentTool === 'free') freePoints.push({x, y});
  redraw();
}

function onCanvasUp(e) {
  if (!drawing) return;
  const {x, y} = getXY(e);
  const dx = x - startX, dy = y - startY;
  if (Math.abs(dx) < 3 && Math.abs(dy) < 3 && currentTool !== 'free') { drawing = false; return; }

  const shape = {
    type: currentTool, x1: startX, y1: startY, x2: x, y2: y,
    color: currentColor, size: strokeSize, dash: dashStyle
  };
  if (currentTool === 'free') shape.points = [...freePoints];

  saveShape(shape);
  drawing = false;
  freePoints = [];
  redraw();
}

// Touch support
canvas.addEventListener('touchstart', e => { e.preventDefault(); onCanvasDown(e.touches[0]); }, {passive:false});
canvas.addEventListener('touchmove',  e => { e.preventDefault(); onCanvasMove(e.touches[0]); }, {passive:false});
canvas.addEventListener('touchend',   e => { e.preventDefault(); onCanvasUp(e.changedTouches[0]); }, {passive:false});

// ──────────────────────────────────────────────
//  DRAW ENGINE
// ──────────────────────────────────────────────
function applyStyle(s) {
  ctx.strokeStyle = s.color || currentColor;
  ctx.lineWidth = s.size || strokeSize;
  ctx.setLineDash(s.dash === 'dash' ? [8, 5] : []);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function drawShape(s, preview) {
  ctx.save();
  applyStyle(s);
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;

  switch (s.type) {
    case 'arrow': drawArrow(s.x1, s.y1, s.x2, s.y2, false); break;
    case 'line':  drawLine(s.x1, s.y1, s.x2, s.y2); break;
    case 'ellipse': drawEllipse(s.x1, s.y1, s.x2, s.y2); break;
    case 'rect':  drawRect(s.x1, s.y1, s.x2, s.y2); break;
    case 'free':  drawFree(s.points || []); break;
    case 'curve': drawCurvedArrow(s.x1, s.y1, s.x2, s.y2, s.cx, s.cy); break;
  }
  ctx.restore();
}

function drawArrow(x1, y1, x2, y2) {
  const angle = Math.atan2(y2-y1, x2-x1);
  const len = Math.hypot(x2-x1, y2-y1);
  const hs = Math.min(14, len * .35);
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hs * Math.cos(angle - 0.4), y2 - hs * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - hs * Math.cos(angle + 0.4), y2 - hs * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fillStyle = ctx.strokeStyle; ctx.fill();
}

function drawLine(x1, y1, x2, y2) {
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
}

function drawEllipse(x1, y1, x2, y2) {
  const cx = (x1+x2)/2, cy = (y1+y2)/2;
  const rx = Math.abs(x2-x1)/2, ry = Math.abs(y2-y1)/2;
  ctx.beginPath(); ctx.ellipse(cx, cy, Math.max(rx,1), Math.max(ry,1), 0, 0, Math.PI*2); ctx.stroke();
}

function drawRect(x1, y1, x2, y2) {
  ctx.beginPath(); ctx.rect(x1, y1, x2-x1, y2-y1); ctx.stroke();
}

function drawFree(pts) {
  if (pts.length < 2) return;
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();
}

function drawCurvedArrow(x1, y1, x2, y2, cx, cy) {
  const angle = Math.atan2(y2 - cy, x2 - cx);
  const hs = 14;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.quadraticCurveTo(cx, cy, x2, y2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - hs * Math.cos(angle - 0.4), y2 - hs * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - hs * Math.cos(angle + 0.4), y2 - hs * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fillStyle = ctx.strokeStyle; ctx.fill();
}

function redraw() {
  ctx.clearRect(0, 0, PITCH_W, PITCH_H);
  annotations.forEach(s => drawShape(s));

  // Preview shape
  if (drawing && currentTool !== 'curve') {
    ctx.save();
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = strokeSize;
    ctx.setLineDash(dashStyle === 'dash' ? [8,5] : []);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.globalAlpha = .7;
    switch (currentTool) {
      case 'arrow':   drawArrow(startX, startY, curX, curY); break;
      case 'line':    drawLine(startX, startY, curX, curY); break;
      case 'ellipse': drawEllipse(startX, startY, curX, curY); break;
      case 'rect':    drawRect(startX, startY, curX, curY); break;
      case 'free':    drawFree(freePoints); break;
    }
    ctx.restore();
  }

  // Curve preview
  if (currentTool === 'curve') {
    ctx.save();
    ctx.strokeStyle = currentColor;
    ctx.lineWidth = strokeSize;
    ctx.setLineDash([4,4]);
    ctx.globalAlpha = .6;
    if (curvePhase === 1 && curveStart) {
      ctx.beginPath(); ctx.arc(curveStart.x, curveStart.y, 5, 0, Math.PI*2);
      ctx.fillStyle = currentColor; ctx.fill();
      const {x, y} = {x: curX||curveStart.x, y: curY||curveStart.y};
      ctx.beginPath(); ctx.moveTo(curveStart.x, curveStart.y); ctx.lineTo(x, y); ctx.stroke();
    }
    if (curvePhase === 2 && curveStart && curveEnd) {
      ctx.beginPath(); ctx.moveTo(curveStart.x, curveStart.y);
      ctx.quadraticCurveTo(curX||curveEnd.x, curY||curveEnd.y, curveEnd.x, curveEnd.y); ctx.stroke();
    }
    ctx.restore();
  }
}

// ──────────────────────────────────────────────
//  UNDO / CLEAR
// ──────────────────────────────────────────────
function saveShape(s) {
  undoStack.push([...annotations]);
  annotations.push(s);
}

function undo() {
  if (undoStack.length === 0) return;
  annotations = undoStack.pop();
  drawing = false; curvePhase = 0;
  redraw();
}

function clearAnnotations() {
  if (!annotations.length) return;
  undoStack.push([...annotations]);
  annotations = [];
  redraw();
}

// ──────────────────────────────────────────────
//  PLAYERS
// ──────────────────────────────────────────────
function addPlayer(x, y, number='', name='', color='#1f6feb') {
  const id = nextPlayerId++;
  players.push({id, x, y, number, name, color});
  renderPlayers();
  return id;
}

function renderPlayers() {
  playerLayer.innerHTML = '';
  players.forEach(p => {
    const el = document.createElement('div');
    el.className = 'player-token';
    el.dataset.id = p.id;
    el.style.left = p.x + 'px';
    el.style.top  = p.y + 'px';

    const circle = document.createElement('div');
    circle.className = 'player-circle' + (p.id === selectedPlayerId ? ' selected' : '');
    circle.style.background = p.color;
    circle.textContent = p.number || '?';

    const name = document.createElement('div');
    name.className = 'player-name';
    name.textContent = p.name;

    el.appendChild(circle);
    el.appendChild(name);

    // Drag
    el.addEventListener('mousedown', onPlayerMouseDown);
    el.addEventListener('touchstart', onPlayerTouchStart, {passive:false});
    // Context menu
    el.addEventListener('contextmenu', onPlayerCtxMenu);
    // Click select
    el.addEventListener('click', onPlayerClick);

    playerLayer.appendChild(el);
  });
}

function onPlayerClick(e) {
  e.stopPropagation();
  const id = +e.currentTarget.dataset.id;
  if (currentTool === 'select' || currentTool === 'player') selectPlayer(id);
}

function selectPlayer(id) {
  selectedPlayerId = id;
  const p = players.find(p => p.id === id);
  if (!p) return;
  document.getElementById('pe-number').value = p.number;
  document.getElementById('pe-name').value = p.name;
  document.getElementById('player-editor').classList.add('visible');
  renderPlayers();
}

function deselectPlayer() {
  selectedPlayerId = null;
  renderPlayers();
}

function closeEditor() {
  document.getElementById('player-editor').classList.remove('visible');
}

function updateSelectedPlayer() {
  if (selectedPlayerId === null) return;
  const p = players.find(p => p.id === selectedPlayerId);
  if (!p) return;
  p.number = document.getElementById('pe-number').value;
  p.name   = document.getElementById('pe-name').value;
  renderPlayers();
}

function updateSelectedPlayerColor(color) {
  if (selectedPlayerId === null) return;
  const p = players.find(p => p.id === selectedPlayerId);
  if (!p) return;
  p.color = color;
  renderPlayers();
}

function deleteSelectedPlayer() {
  if (selectedPlayerId === null) return;
  players = players.filter(p => p.id !== selectedPlayerId);
  selectedPlayerId = null;
  closeEditor();
  renderPlayers();
}

// ── DRAG ──
function onPlayerMouseDown(e) {
  if (currentTool !== 'select') return;
  e.stopPropagation();
  startPlayerDrag(e.currentTarget, e.clientX, e.clientY);
}
function onPlayerTouchStart(e) {
  if (currentTool !== 'select') return;
  e.stopPropagation(); e.preventDefault();
  startPlayerDrag(e.currentTarget, e.touches[0].clientX, e.touches[0].clientY);
}

function startPlayerDrag(el, cx, cy) {
  const id = +el.dataset.id;
  const p = players.find(p => p.id === id);
  if (!p) return;
  draggingPlayer = p;
  const rect = canvas.getBoundingClientRect();
  dragOffX = cx - rect.left - p.x;
  dragOffY = cy - rect.top  - p.y;
  el.classList.add('dragging');

  const onMove = ev => {
    const c = ev.touches ? ev.touches[0] : ev;
    const r = canvas.getBoundingClientRect();
    p.x = Math.max(10, Math.min(PITCH_W-10, c.clientX - r.left - dragOffX));
    p.y = Math.max(10, Math.min(PITCH_H-10, c.clientY - r.top  - dragOffY));
    el.style.left = p.x + 'px';
    el.style.top  = p.y + 'px';
  };
  const onUp = () => {
    el.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onUp);
    draggingPlayer = null;
    renderPlayers();
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend',  onUp);
}

// Pitch click → add player
canvas.addEventListener('click', e => {
  if (currentTool !== 'player') return;
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  const id = addPlayer(x, y, '', '', currentColor);
  selectPlayer(id);
});

// Deselect on pitch click in select mode
canvas.addEventListener('click', e => {
  if (currentTool === 'select') { deselectPlayer(); closeEditor(); }
});

// ── CONTEXT MENU ──
function onPlayerCtxMenu(e) {
  e.preventDefault(); e.stopPropagation();
  ctxTargetId = +e.currentTarget.dataset.id;
  const menu = document.getElementById('ctx-menu');
  menu.style.left = e.clientX + 'px';
  menu.style.top  = e.clientY + 'px';
  menu.classList.add('visible');
}

function hideCtxMenu() { document.getElementById('ctx-menu').classList.remove('visible'); }
function ctxEdit()      { selectPlayer(ctxTargetId); hideCtxMenu(); }
function ctxDuplicate() {
  const p = players.find(p => p.id === ctxTargetId);
  if (!p) return;
  addPlayer(p.x + 20, p.y + 20, p.number, p.name, p.color);
  hideCtxMenu();
}
function ctxDelete() {
  players = players.filter(p => p.id !== ctxTargetId);
  if (selectedPlayerId === ctxTargetId) { selectedPlayerId = null; closeEditor(); }
  renderPlayers(); hideCtxMenu();
}

// ── COLOR GRID IN PLAYER EDITOR ──
function buildColorGrid() {
  const grid = document.getElementById('pe-colors');
  PLAYER_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch';
    s.style.background = c;
    s.dataset.color = c;
    s.onclick = () => { currentColor = c; updateSelectedPlayerColor(c); };
    grid.appendChild(s);
  });
}

function loadFormation(key) {
  if (!key) return;
  const f = FORMATIONS[key];
  if (!f) return;
  players = [];
  nextPlayerId = 1;
  f.positions.forEach((pos, i) => {
    players.push({
      id: nextPlayerId++,
      x: Math.round(pos.x * PITCH_W),
      y: Math.round(pos.y * PITCH_H),
      number: pos.n,
      name: pos.nm,
      color: f.colors[i] || '#1f6feb'
    });
  });
  renderPlayers();
  document.getElementById('formation-select').value = '';
  setTool('select');
}

// ──────────────────────────────────────────────
//  EXPORT
// ──────────────────────────────────────────────
async function exportPNG() {
  const scale = 2;
  const exp = document.createElement('canvas');
  exp.width = PITCH_W * scale; exp.height = PITCH_H * scale;
  const ec = exp.getContext('2d');
  ec.scale(scale, scale);

  // Draw pitch SVG
  const svgBlob = new Blob([`<svg xmlns="http://www.w3.org/2000/svg" width="${PITCH_W}" height="${PITCH_H}">${pitchSVG.innerHTML}</svg>`], {type:'image/svg+xml'});
  const url = URL.createObjectURL(svgBlob);
  const img = await new Promise(r => { const i = new Image(); i.onload=()=>r(i); i.src=url; });
  ec.drawImage(img, 0, 0);
  URL.revokeObjectURL(url);

  // Draw annotations
  ec.drawImage(canvas, 0, 0);

  // Draw players
  const tokens = document.querySelectorAll('.player-token');
  tokens.forEach(t => {
    const p = players.find(p => p.id === +t.dataset.id);
    if (!p) return;
    const r = 17;
    // Circle
    ec.beginPath(); ec.arc(p.x, p.y, r, 0, Math.PI*2);
    ec.fillStyle = p.color; ec.fill();
    ec.strokeStyle = 'rgba(255,255,255,0.9)'; ec.lineWidth = 2; ec.stroke();
    // Number
    ec.fillStyle = '#fff'; ec.font = 'bold 11px Segoe UI, sans-serif';
    ec.textAlign = 'center'; ec.textBaseline = 'middle';
    ec.fillText(p.number || '?', p.x, p.y);
    // Name
    if (p.name) {
      ec.fillStyle = 'rgba(0,0,0,0.8)';
      const tw = ec.measureText(p.name.toUpperCase()).width + 8;
      ec.fillRect(p.x - tw/2, p.y + r + 2, tw, 14);
      ec.fillStyle = '#fff'; ec.font = 'bold 8px Segoe UI, sans-serif';
      ec.fillText(p.name.toUpperCase(), p.x, p.y + r + 9);
    }
  });

  // Watermark
  ec.fillStyle = 'rgba(255,255,255,0.25)'; ec.font = 'bold 13px Segoe UI, sans-serif';
  ec.textAlign = 'right'; ec.textBaseline = 'bottom';
  ec.fillText('THE FOOTYS', PITCH_W - 10, PITCH_H - 8);

  const a = document.createElement('a');
  a.download = 'tactical-board.png';
  a.href = exp.toDataURL('image/png');
  a.click();
}
