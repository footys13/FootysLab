<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #222; color: white; padding: 10px; margin: 0; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-bottom: 15px;
            border: 2px solid #444;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; 
            pointer-events: none;
        }
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        button {
            padding: 8px 12px;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        button.active {
            background: #007bff;
            border-color: #0056b3;
            font-weight: bold;
        }
        .color-palette {
            display: none;
            gap: 5px;
            margin-top: 5px;
            padding: 5px;
            background: #333;
            border-radius: 5px;
        }
        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .color-btn.active-color { border-color: white; }
        #clearBtn { background: #dc3545; border-color: #a71d2a; }
        #status { font-weight: bold; color: #ffeb3b; padding: 5px; background: #333; border-radius: 5px; display: inline-block; font-size: 14px; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="myVideo" controls>
        <source src="video-pertandingan.mp4" type="video/mp4">
    </video>
    <canvas id="drawCanvas"></canvas>
</div>

<div class="controls">
    <button id="playBtn" class="active">Nonton</button>
    <button id="triangleBtn">Segitiga</button>
    <button id="quadBtn">Segiempat</button>
    <button id="arrowBtn">Panah</button>
    <button id="nameBtn">Nama</button>
    <button id="clearBtn">Hapus Semua</button>
    
    <div id="colorPalette" class="color-palette">
        <div class="color-btn active-color" style="background: rgb(255, 0, 0);" data-color="rgb(255, 0, 0)"></div>
        <div class="color-btn" style="background: rgb(0, 0, 255);" data-color="rgb(0, 0, 255)"></div>
        <div class="color-btn" style="background: rgb(255, 255, 255);" data-color="rgb(255, 255, 255)"></div>
        <div class="color-btn" style="background: rgb(255, 235, 59);" data-color="rgb(255, 235, 59)"></div>
    </div>
</div>

<div id="status">Status: Memutar Video</div>

<script>
    const video = document.getElementById('myVideo');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const btnPlay = document.getElementById('playBtn');
    const btnSegitiga = document.getElementById('triangleBtn');
    const btnQuad = document.getElementById('quadBtn');
    const btnArrow = document.getElementById('arrowBtn');
    const btnName = document.getElementById('nameBtn');
    const btnClear = document.getElementById('clearBtn');
    const statusText = document.getElementById('status');
    const colorPalette = document.getElementById('colorPalette');

    let currentMode = 'nonton'; 
    let selectedColor = 'rgb(255, 0, 0)'; 
    
    // Data Penyimpanan
    let currentPoints = []; 
    let savedTriangles = []; 
    let savedQuads = [];
    let savedArrows = [];
    let savedNames = []; 

    function resizeCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        redraw();
    }
    video.addEventListener('loadeddata', resizeCanvas);
    window.addEventListener('resize', resizeCanvas);

    function setMode(mode) {
        currentMode = mode;
        
        // Reset UI
        [btnPlay, btnSegitiga, btnQuad, btnArrow, btnName].forEach(btn => btn.classList.remove('active'));
        colorPalette.style.display = 'none'; 

        if (mode === 'nonton') {
            btnPlay.classList.add('active');
            canvas.style.pointerEvents = 'none'; 
            statusText.innerText = "Status: Memutar Video";
            currentPoints = []; 
            redraw();
            video.play().catch(e => console.log("Play tertahan"));
        } else {
            video.pause();
            canvas.style.pointerEvents = 'auto'; 
            resizeCanvas();
            
            if (mode === 'segitiga') {
                btnSegitiga.classList.add('active');
                statusText.innerText = "Status: Mode Segitiga. Sentuh 3 titik!";
            } else if (mode === 'segiempat') {
                btnQuad.classList.add('active');
                statusText.innerText = "Status: Mode Segiempat. Sentuh 4 titik!";
            } else if (mode === 'panah') {
                btnArrow.classList.add('active');
                statusText.innerText = "Status: Mode Panah. Sentuh 2 titik (Awal ke Akhir)!";
            } else if (mode === 'nama') {
                btnName.classList.add('active');
                colorPalette.style.display = 'flex'; 
                statusText.innerText = "Status: Mode Nama. Pilih warna, lalu sentuh pemain!";
            }
            currentPoints = []; 
            redraw();
        }
    }

    // Tombol Mode
    btnPlay.addEventListener('click', () => setMode('nonton'));
    btnSegitiga.addEventListener('click', () => setMode('segitiga'));
    btnQuad.addEventListener('click', () => setMode('segiempat'));
    btnArrow.addEventListener('click', () => setMode('panah'));
    btnName.addEventListener('click', () => setMode('nama'));
    
    btnClear.addEventListener('click', () => {
        savedTriangles = [];
        savedQuads = [];
        savedArrows = [];
        savedNames = [];
        currentPoints = [];
        redraw();
    });

    colorPalette.addEventListener('click', (e) => {
        if (e.target.classList.contains('color-btn')) {
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active-color'));
            e.target.classList.add('active-color');
            selectedColor = e.target.getAttribute('data-color');
        }
    });

    // Menangkap sentuhan di layar
    canvas.addEventListener('pointerdown', (e) => {
        if (currentMode === 'nonton') return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        if (currentMode === 'segitiga') {
            currentPoints.push({ x: x, y: y });
            if (currentPoints.length === 3) {
                savedTriangles.push([...currentPoints]);
                currentPoints = []; 
            }
            redraw();
        } 
        else if (currentMode === 'segiempat') {
            currentPoints.push({ x: x, y: y });
            if (currentPoints.length === 4) {
                savedQuads.push([...currentPoints]);
                currentPoints = []; 
            }
            redraw();
        }
        else if (currentMode === 'panah') {
            currentPoints.push({ x: x, y: y });
            if (currentPoints.length === 2) {
                savedArrows.push([...currentPoints]);
                currentPoints = []; 
            }
            redraw();
        }
        else if (currentMode === 'nama') {
            setTimeout(() => {
                const playerName = prompt("Masukkan Nama Pemain:");
                if (playerName && playerName.trim() !== "") {
                    savedNames.push({ text: playerName.trim(), x: x, y: y, color: selectedColor });
                }
                redraw();
            }, 50);
        }
    });

    // MASTER DRAWING FUNCTION
    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Gambar semua grafis yang sudah selesai
        savedTriangles.forEach(tri => drawPolygon(tri, true));
        savedQuads.forEach(quad => drawPolygon(quad, true));
        savedArrows.forEach(arrow => drawArrow(arrow));
        savedNames.forEach(nameObj => drawNameTag(nameObj));

        // Gambar titik-titik yang sedang diproses
        if (currentPoints.length > 0) {
            if (currentMode === 'segitiga' || currentMode === 'segiempat') {
                drawPolygon(currentPoints, false);
            } else if (currentMode === 'panah') {
                drawArrow(currentPoints);
            }
        }
    }

    // Fungsi pintar: Bisa buat segitiga (3 titik) atau segiempat (4 titik)
    function drawPolygon(points, isComplete) {
        if (points.length === 0) return;
        ctx.beginPath();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        
        ctx.moveTo(points[0].x, points[0].y);
        ctx.arc(points[0].x, points[0].y, 4, 0, Math.PI*2); 

        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
            ctx.arc(points[i].x, points[i].y, 4, 0, Math.PI*2);
        }

        if (isComplete) {
            ctx.closePath(); 
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; 
            ctx.fill();
        }
        ctx.stroke(); 
    }

    // Fungsi Menggambar Panah
    function drawArrow(points) {
        if (points.length === 0) return;
        
        ctx.beginPath();
        ctx.strokeStyle = "#ffeb3b"; // Warna Kuning agar menonjol
        ctx.lineWidth = 3;
        
        // Titik awal
        ctx.moveTo(points[0].x, points[0].y);
        ctx.arc(points[0].x, points[0].y, 4, 0, Math.PI*2);

        // Jika titik akhir sudah disentuh
        if (points.length > 1) {
            ctx.lineTo(points[1].x, points[1].y);
            
            // Rumus Matematika untuk Kepala Panah
            const angle = Math.atan2(points[1].y - points[0].y, points[1].x - points[0].x);
            const headLength = 15; // Panjang ujung panah
            
            // Sayap panah kanan
            ctx.lineTo(points[1].x - headLength * Math.cos(angle - Math.PI / 6), 
                       points[1].y - headLength * Math.sin(angle - Math.PI / 6));
            
            // Kembali ke ujung
            ctx.moveTo(points[1].x, points[1].y);
            
            // Sayap panah kiri
            ctx.lineTo(points[1].x - headLength * Math.cos(angle + Math.PI / 6), 
                       points[1].y - headLength * Math.sin(angle + Math.PI / 6));
        }
        ctx.stroke();
    }

    // Fungsi Label Nama Solid
    function drawNameTag(nameObj) {
        ctx.font = "bold 14px sans-serif";
        const textWidth = ctx.measureText(nameObj.text).width;
        const paddingX = 10;
        const boxWidth = textWidth + (paddingX * 2);
        const boxHeight = 26;
        
        const boxX = nameObj.x - (boxWidth / 2);
        const boxY = nameObj.y - boxHeight - 15; 

        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 4;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;

        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 6); 
        ctx.fillStyle = nameObj.color; 
        ctx.fill();
        
        ctx.shadowColor = "transparent";

        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(nameObj.text, nameObj.x, boxY + (boxHeight / 2));
    }
</script>

</body>
</html>
