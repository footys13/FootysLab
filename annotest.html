<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Football Annotation Tool</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: white;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
        }

        /* ── Video / Pitch container ── */
        .stage {
            position: relative;
            width: 100%;
            max-width: 720px;
            margin: 0 auto 12px;
            border-radius: 16px;
            border: 2px solid #1e3a4a;
            overflow: hidden;
            background: #0f2d1f;
            /* Aspect ratio keeps pitch visible even without video */
            aspect-ratio: 16 / 9;
        }

        /* Pitch SVG background */
        .pitch-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0.25;
        }

        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        video::-webkit-media-controls-overlay-play-button { display: none !important; }
        video::-webkit-media-controls-play-button { display: none !important; }

        #drawCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            touch-action: none;     /* ← crucial: prevents browser scroll hijack */
            cursor: crosshair;
            display: block;
        }

        /* Drawing-mode cursor cue */
        body.draw-mode #drawCanvas { cursor: crosshair; }
        body.watch-mode #drawCanvas { cursor: default; pointer-events: none; }

        /* ── Controls ── */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 8px auto;
            max-width: 720px;
        }
        .btn {
            background: #1e2d3d;
            border: 1.5px solid #2c4054;
            color: #cdd9e5;
            font-weight: 600;
            font-size: 12px;
            padding: 8px 13px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, transform 0.08s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.94); }
        .btn.active {
            background: #166534;
            border-color: #4ade80;
            color: #bbf7d0;
        }
        .btn.danger {
            background: #7f1d1d;
            border-color: #ef4444;
            color: #fecaca;
        }
        .btn.danger:active { background: #991b1b; }
        .btn.media {
            background: #1e3a5f;
            border-color: #3b82f6;
            color: #93c5fd;
            position: relative;
            overflow: hidden;
        }
        .btn.media:active { background: #1e40af; }

        /* ── Color palette ── */
        .palette {
            display: none;          /* toggled by JS */
            justify-content: center;
            gap: 10px;
            margin: 6px auto;
            max-width: 720px;
        }
        .palette.visible { display: flex; }
        .swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
        }
        .swatch.active {
            border-color: #facc15;
            transform: scale(1.25);
        }

        /* ── Status bar ── */
        .status {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            background: #111827;
            border-radius: 999px;
            padding: 6px 16px;
            margin: 6px auto;
            max-width: 720px;
        }
        .status span { color: #e2e8f0; font-weight: 600; }

        /* ── Touch feedback dot ── */
        .tap-dot {
            position: fixed;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(250,204,21,0.7);
            pointer-events: none;
            transform: translate(-50%, -50%) scale(1);
            animation: tapFade 0.4s ease-out forwards;
            z-index: 9999;
        }
        @keyframes tapFade {
            to { transform: translate(-50%,-50%) scale(2); opacity: 0; }
        }

        /* ── Step indicator (for multi-tap modes) ── */
        .step-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 4px 0;
        }
        .step-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #334155;
            transition: background 0.15s;
        }
        .step-dot.filled { background: #4ade80; }
        .step-dot.current {
            background: #facc15;
            box-shadow: 0 0 6px #facc15;
        }
    </style>
</head>
<body class="watch-mode">

<!-- ── Stage ── -->
<div class="stage" id="stage">

    <!-- Minimal pitch background drawn with SVG -->
    <svg class="pitch-bg" viewBox="0 0 160 90" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <rect width="160" height="90" fill="#14532d"/>
        <!-- Halfway line -->
        <line x1="80" y1="0" x2="80" y2="90" stroke="white" stroke-width="0.8"/>
        <!-- Centre circle -->
        <circle cx="80" cy="45" r="12" fill="none" stroke="white" stroke-width="0.8"/>
        <circle cx="80" cy="45" r="0.8" fill="white"/>
        <!-- Outer boundary -->
        <rect x="4" y="4" width="152" height="82" fill="none" stroke="white" stroke-width="0.8"/>
        <!-- Penalty areas -->
        <rect x="4" y="22" width="22" height="46" fill="none" stroke="white" stroke-width="0.8"/>
        <rect x="134" y="22" width="22" height="46" fill="none" stroke="white" stroke-width="0.8"/>
        <!-- 6-yard boxes -->
        <rect x="4" y="34" width="8" height="22" fill="none" stroke="white" stroke-width="0.8"/>
        <rect x="148" y="34" width="8" height="22" fill="none" stroke="white" stroke-width="0.8"/>
        <!-- Goals -->
        <rect x="0" y="37" width="4" height="16" fill="none" stroke="white" stroke-width="0.8"/>
        <rect x="156" y="37" width="4" height="16" fill="none" stroke="white" stroke-width="0.8"/>
        <!-- Penalty spots -->
        <circle cx="18" cy="45" r="0.8" fill="white"/>
        <circle cx="142" cy="45" r="0.8" fill="white"/>
    </svg>

    <video id="myVideo" playsinline disablePictureInPicture></video>

    <!-- Empty state overlay -->
    <div id="emptyState" style="
        position:absolute; inset:0; z-index:10;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center;
        gap:10px; pointer-events:none;
    ">
        <div style="font-size:36px">🎬</div>
        <div style="font-size:13px; color:#94a3b8; text-align:center; line-height:1.5">
            Tap <strong style="color:#4ade80">📁 Add Media</strong><br>untuk pilih video dari galeri
        </div>
    </div>

    <canvas id="drawCanvas"></canvas>
</div>

<!-- ── Toolbar ── -->
<div class="toolbar">
    <label class="btn media" id="btnMedia">
        📁 Add Media
        <input type="file" id="fileInput" accept="video/*" style="position:absolute;opacity:0;width:0;height:0">
    </label>
    <button class="btn active" id="btnWatch">📺 Nonton</button>
    <button class="btn" id="btnTriangle">🔺 Segitiga</button>
    <button class="btn" id="btnQuad">⬛ Segiempat</button>
    <button class="btn" id="btnArrow">➡️ Panah</button>
    <button class="btn" id="btnName">🏷️ Nama</button>
    <button class="btn danger" id="btnClear">🗑️ Hapus</button>
</div>

<!-- ── Custom video controls ── -->
<div id="videoControls" style="display:none; max-width:720px; margin: -8px auto 8px; padding: 0 4px;">
    <div style="display:flex; align-items:center; gap:8px; background:#111827; border-radius:999px; padding:6px 12px;">
        <button class="btn" id="btnPlayPause" style="padding:6px 12px; font-size:14px; min-width:36px;">▶️</button>
        <span id="timeDisplay" style="font-size:11px; color:#94a3b8; white-space:nowrap; min-width:72px;">0:00 / 0:00</span>
        <input type="range" id="seekBar" value="0" min="0" max="100" step="0.1"
            style="flex:1; accent-color:#4ade80; height:4px; cursor:pointer;">
        <button class="btn" id="btnMute" style="padding:6px 10px; font-size:14px; min-width:36px;">🔊</button>
    </div>
</div>
<div class="palette" id="palette">
    <div class="swatch active" style="background:#ef4444" data-color="#ef4444"></div>
    <div class="swatch" style="background:#3b82f6" data-color="#3b82f6"></div>
    <div class="swatch" style="background:#facc15" data-color="#facc15"></div>
    <div class="swatch" style="background:#10b981" data-color="#10b981"></div>
    <div class="swatch" style="background:#f97316" data-color="#f97316"></div>
    <div class="swatch" style="background:#ffffff" data-color="#ffffff"></div>
</div>

<!-- ── Step indicator ── -->
<div class="step-dots" id="stepDots"></div>

<!-- ── Status ── -->
<div class="status" id="status">Mode: <span>Nonton</span></div>

<script>
(function () {
    'use strict';

    // ── Elements ──
    const stage       = document.getElementById('stage');
    const video       = document.getElementById('myVideo');
    const canvas      = document.getElementById('drawCanvas');
    const ctx         = canvas.getContext('2d');
    const statusEl    = document.getElementById('status');
    const stepDotsEl  = document.getElementById('stepDots');
    const palette     = document.getElementById('palette');

    const btnWatch    = document.getElementById('btnWatch');
    const btnTriangle = document.getElementById('btnTriangle');
    const btnQuad     = document.getElementById('btnQuad');
    const btnArrow    = document.getElementById('btnArrow');
    const btnName     = document.getElementById('btnName');
    const btnClear    = document.getElementById('btnClear');

    // ── State ──
    let mode          = 'watch';   // watch | triangle | quad | arrow | name
    let color         = '#ef4444';
    let pts           = [];         // live points for current shape
    let triangles     = [];
    let quads         = [];
    let arrows        = [];
    let names         = [];

    // ── Canvas sizing ──
    // We sync canvas pixel dimensions to the stage element's rendered size.
    // This must happen after layout, hence the RAF + fallback.
    function syncCanvas() {
        const w = stage.offsetWidth;
        const h = stage.offsetHeight;
        if (w === 0 || h === 0) { requestAnimationFrame(syncCanvas); return; }
        if (canvas.width !== w || canvas.height !== h) {
            canvas.width  = w;
            canvas.height = h;
        }
        redraw();
    }

    new ResizeObserver(syncCanvas).observe(stage);
    // Also call on next frame after DOM paint
    requestAnimationFrame(syncCanvas);

    // ── Coordinate helper ──
    function eventPoint(e) {
        const r = canvas.getBoundingClientRect();
        // Scale from CSS pixels → canvas pixels (usually 1:1 here, but safe)
        const scaleX = canvas.width  / r.width;
        const scaleY = canvas.height / r.height;
        let cx, cy;
        if (e.touches && e.touches.length > 0) {
            cx = e.touches[0].clientX;
            cy = e.touches[0].clientY;
        } else {
            cx = e.clientX;
            cy = e.clientY;
        }
        return {
            x: (cx - r.left) * scaleX,
            y: (cy - r.top)  * scaleY
        };
    }

    // ── Touch/click handler ──
    function onTap(e) {
        if (mode === 'watch') return;
        e.preventDefault();
        e.stopPropagation();

        // Visual tap feedback
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const dot = document.createElement('div');
        dot.className = 'tap-dot';
        dot.style.left = cx + 'px';
        dot.style.top  = cy + 'px';
        document.body.appendChild(dot);
        dot.addEventListener('animationend', () => dot.remove());

        const p = eventPoint(e);

        if (mode === 'triangle') {
            pts.push(p);
            if (pts.length === 3) { triangles.push([...pts]); pts = []; }
        } else if (mode === 'quad') {
            pts.push(p);
            if (pts.length === 4) { quads.push([...pts]); pts = []; }
        } else if (mode === 'arrow') {
            pts.push(p);
            if (pts.length === 3) { arrows.push([...pts]); pts = []; }
        } else if (mode === 'name') {
            const x = p.x, y = p.y;
            // Slight delay so prompt doesn't swallow the touchend
            setTimeout(() => {
                const text = prompt('Nama pemain / taktik:');
                if (text && text.trim()) {
                    names.push({ text: text.trim(), x, y, color });
                    setStatus(`🏷️ "${text.trim()}" ditambahkan`);
                    redraw();
                }
            }, 50);
            return; // redraw happens in the timeout
        }

        updateStepDots();
        redraw();
    }

    canvas.addEventListener('touchstart', onTap, { passive: false });
    canvas.addEventListener('mousedown',  onTap);
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    // ── Drawing ──
    function drawPolygon(points, closed) {
        if (points.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        if (closed) {
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,200,100,0.18)';
            ctx.fill();
        }
        ctx.strokeStyle = '#67e8f9';
        ctx.lineWidth   = 2.5;
        ctx.lineJoin    = 'round';
        ctx.stroke();
        // Vertex dots
        for (const p of points) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#38bdf8';
            ctx.fill();
        }
    }

    function drawArrow(points) {
        if (points.length === 0) return;
        // Single start point
        if (points.length === 1) {
            ctx.beginPath();
            ctx.arc(points[0].x, points[0].y, 7, 0, Math.PI * 2);
            ctx.fillStyle = '#fbbf24';
            ctx.fill();
            return;
        }
        // Two points: dashed preview
        if (points.length === 2) {
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            ctx.lineTo(points[1].x, points[1].y);
            ctx.strokeStyle = 'rgba(251,191,36,0.5)';
            ctx.lineWidth   = 2;
            ctx.setLineDash([5, 7]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.arc(points[0].x, points[0].y, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#fbbf24'; ctx.fill();
            ctx.beginPath();
            ctx.arc(points[1].x, points[1].y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#f97316'; ctx.fill();
            return;
        }
        // Full 3-point curved arrow
        const [s, c, e] = points;
        // Glow shadow
        ctx.save();
        ctx.shadowColor  = '#fbbf24';
        ctx.shadowBlur   = 8;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.quadraticCurveTo(c.x, c.y, e.x, e.y);
        ctx.strokeStyle = '#fde68a';
        ctx.lineWidth   = 4;
        ctx.lineCap     = 'round';
        ctx.stroke();
        ctx.restore();

        // White dashed overlay
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.quadraticCurveTo(c.x, c.y, e.x, e.y);
        ctx.strokeStyle = 'rgba(255,255,255,0.35)';
        ctx.lineWidth   = 1.5;
        ctx.setLineDash([4, 6]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Arrowhead
        const dx = e.x - c.x, dy = e.y - c.y;
        if (Math.hypot(dx, dy) > 0.01) {
            const angle = Math.atan2(dy, dx);
            const L = 16, W = Math.PI / 6;
            ctx.beginPath();
            ctx.moveTo(e.x, e.y);
            ctx.lineTo(e.x - L * Math.cos(angle - W), e.y - L * Math.sin(angle - W));
            ctx.lineTo(e.x - L * Math.cos(angle + W), e.y - L * Math.sin(angle + W));
            ctx.closePath();
            ctx.fillStyle = '#fbbf24';
            ctx.fill();
        }

        // Vertex dots
        for (const p of [s, e]) {
            ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fbbf24'; ctx.fill();
        }
        ctx.beginPath(); ctx.arc(c.x, c.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#facc15'; ctx.fill();
    }

    // CanvasRenderingContext2D.roundRect polyfill
    if (!ctx.roundRect) {
        ctx.roundRect = function(x, y, w, h, r) {
            r = Math.min(r, w / 2, h / 2);
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y,   x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
        };
    }

    function drawNameTag(item) {
        ctx.save();
        ctx.font = 'bold 13px system-ui';
        const tw = ctx.measureText(item.text).width;
        const bw = tw + 18, bh = 24;
        const bx = item.x - bw / 2, by = item.y - bh - 10;
        ctx.beginPath();
        ctx.roundRect(bx, by, bw, bh, 8);
        ctx.fillStyle = item.color;
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.globalAlpha = 0.25;
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = 'white';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(item.text, item.x, by + bh / 2);
        // Leader dot
        ctx.beginPath(); ctx.arc(item.x, item.y, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#fff8'; ctx.fill();
        ctx.restore();
    }

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        triangles.forEach(t => drawPolygon(t, true));
        quads.forEach(q => drawPolygon(q, true));
        arrows.forEach(a => drawArrow(a));
        names.forEach(n => drawNameTag(n));

        // Live preview
        if (pts.length > 0) {
            if (mode === 'triangle' || mode === 'quad') drawPolygon(pts, false);
            else if (mode === 'arrow') drawArrow(pts);
        }

        // Hint text on canvas
        const hints = {
            triangle: ['Tap titik 1', 'Tap titik 2', 'Tap titik 3 ✓'],
            quad:     ['Tap titik 1', 'Tap titik 2', 'Tap titik 3', 'Tap titik 4 ✓'],
            arrow:    ['Tap titik awal', 'Tap titik kontrol (lengkungan)', 'Tap titik akhir ✓'],
        };
        if (hints[mode]) {
            const hint = hints[mode][pts.length] || '';
            if (hint) {
                ctx.save();
                ctx.font = 'bold 12px system-ui';
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillText(hint, 13, 25);
                ctx.fillStyle = '#facc15';
                ctx.fillText(hint, 12, 24);
                ctx.restore();
            }
        }
    }

    // ── Step dots ──
    const stepsNeeded = { triangle: 3, quad: 4, arrow: 3, name: 1, watch: 0 };
    function updateStepDots() {
        const n = stepsNeeded[mode] || 0;
        stepDotsEl.innerHTML = '';
        for (let i = 0; i < n; i++) {
            const d = document.createElement('div');
            d.className = 'step-dot' +
                (i < pts.length  ? ' filled'  : '') +
                (i === pts.length && i < n ? ' current' : '');
            stepDotsEl.appendChild(d);
        }
    }

    // ── Mode switching ──
    const modeButtons = {
        watch:    btnWatch,
        triangle: btnTriangle,
        quad:     btnQuad,
        arrow:    btnArrow,
        name:     btnName,
    };
    const modeLabels = {
        watch:    'Nonton',
        triangle: 'Segitiga – tap 3 titik',
        quad:     'Segiempat – tap 4 titik',
        arrow:    'Panah – awal → kontrol → akhir',
        name:     'Nama – tap posisi pemain',
    };

    function setMode(m) {
        mode = m;
        pts  = [];
        document.body.className = m === 'watch' ? 'watch-mode' : 'draw-mode';

        // Button highlights
        Object.entries(modeButtons).forEach(([key, btn]) => {
            btn.classList.toggle('active', key === m);
        });

        palette.classList.toggle('visible', m === 'name');
        setStatus('Mode: <span>' + modeLabels[m] + '</span>');
        updateStepDots();

        if (m === 'watch') {
            video.play().catch(() => {});
        } else {
            video.pause();
            syncCanvas();
        }

        redraw();
    }

    // ── Status helper ──
    function setStatus(html) { statusEl.innerHTML = html; }

    // ── Toolbar events ──
    btnWatch.addEventListener('click',    () => setMode('watch'));
    btnTriangle.addEventListener('click', () => setMode('triangle'));
    btnQuad.addEventListener('click',     () => setMode('quad'));
    btnArrow.addEventListener('click',    () => setMode('arrow'));
    btnName.addEventListener('click',     () => setMode('name'));

    btnClear.addEventListener('click', () => {
        triangles = []; quads = []; arrows = []; names = []; pts = [];
        updateStepDots();
        redraw();
        setStatus('🗑️ Semua anotasi dihapus');
    });

    // ── Color palette ──
    palette.addEventListener('click', e => {
        const sw = e.target.closest('.swatch');
        if (!sw) return;
        color = sw.dataset.color;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
        sw.classList.add('active');
    });

    // ── Custom video controls ──
    const videoControls = document.getElementById('videoControls');
    const btnPlayPause  = document.getElementById('btnPlayPause');
    const btnMute       = document.getElementById('btnMute');
    const seekBar       = document.getElementById('seekBar');
    const timeDisplay   = document.getElementById('timeDisplay');

    function formatTime(s) {
        const m = Math.floor(s / 60);
        return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
    }

    btnPlayPause.addEventListener('click', () => {
        if (video.paused) video.play().catch(() => {});
        else video.pause();
    });

    btnMute.addEventListener('click', () => {
        video.muted = !video.muted;
        btnMute.textContent = video.muted ? '🔇' : '🔊';
    });

    video.addEventListener('play',  () => { btnPlayPause.textContent = '⏸️'; });
    video.addEventListener('pause', () => { btnPlayPause.textContent = '▶️'; });

    video.addEventListener('timeupdate', () => {
        if (!video.duration) return;
        seekBar.value = (video.currentTime / video.duration) * 100;
        timeDisplay.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
    });

    seekBar.addEventListener('input', () => {
        if (!video.duration) return;
        video.currentTime = (seekBar.value / 100) * video.duration;
    });

    // Show controls once video loaded
    video.addEventListener('loadedmetadata', () => {
        videoControls.style.display = 'block';
        timeDisplay.textContent = '0:00 / ' + formatTime(video.duration);
    });
    const fileInput  = document.getElementById('fileInput');
    const emptyState = document.getElementById('emptyState');

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
        video.src = URL.createObjectURL(file);
        video.style.display = 'block';
        emptyState.style.display = 'none';
        video.load();
        video.play().catch(() => {});
        setStatus(`📹 <span>${file.name}</span>`);
        setMode('watch');
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        // Revoke previous object URL to free memory
        if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
        video.src = URL.createObjectURL(file);
        video.load();
        video.play().catch(() => {});
        emptyState.style.display = 'none';
        setStatus(`📹 <span>${file.name}</span>`);
        setMode('watch');
    });

    // ── Video: show when loaded ──
    video.addEventListener('loadeddata', () => {
        video.style.display = 'block';
        emptyState.style.display = 'none';
    });
    video.addEventListener('error', () => { video.style.display = 'none'; });

    // ── Init ──
    setMode('watch');

})();
</script>
