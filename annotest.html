<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Taktik Bola - Panah 3 Titik + Anotasi</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: #0a0c12;
            color: #f0f0f0;
            padding: 12px;
            margin: 0;
            min-height: 100vh;
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto 16px auto;
            border-radius: 20px;
            border: 2px solid #2c3e4e;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            display: block;
            pointer-events: none;
        }

        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 25;
            touch-action: none;
            background: transparent;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 12px 0 10px;
            background: #151b24dd;
            backdrop-filter: blur(10px);
            padding: 10px 12px;
            border-radius: 60px;
        }

        button {
            background: #242c38;
            border: none;
            color: white;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s ease;
            touch-action: manipulation;
        }

        button:active { transform: scale(0.96); }
        button.active {
            background: #2b7e3a;
            box-shadow: 0 0 0 2px #86efac;
        }
        #clearBtn { background: #9e2a2a; }

        .color-palette {
            display: none;
            justify-content: center;
            gap: 12px;
            background: #10161ecc;
            backdrop-filter: blur(8px);
            padding: 8px 14px;
            border-radius: 50px;
            margin-top: 5px;
        }

        .color-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.7);
            box-shadow: 0 2px 5px black;
        }
        .color-btn.active-color {
            transform: scale(1.1);
            border: 3px solid white;
        }
        #status {
            background: #1e2933;
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            display: inline-block;
            margin: 8px auto 0;
        }
        .bottom-bar { text-align: center; }
        .instruction-badge {
            font-size: 11px;
            background: #2d3e4b;
            display: inline-block;
            border-radius: 30px;
            padding: 4px 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video id="myVideo" controls disablePictureInPicture playsinline>
        <source src="video-pertandingan.mp4" type="video/mp4">
    </video>
    <canvas id="drawCanvas"></canvas>
</div>

<div class="controls">
    <button id="playBtn" class="active">📺 Nonton</button>
    <button id="triangleBtn">🔺 Segitiga</button>
    <button id="quadBtn">⬛ Segiempat</button>
    <button id="arrowBtn">➡️ Panah 3 Titik</button>
    <button id="nameBtn">🏷️ Nama</button>
    <button id="clearBtn">🗑️ Hapus Semua</button>
</div>

<div id="colorPalette" class="color-palette">
    <div class="color-btn active-color" style="background: #ef4444;" data-color="#ef4444"></div>
    <div class="color-btn" style="background: #3b82f6;" data-color="#3b82f6"></div>
    <div class="color-btn" style="background: #facc15;" data-color="#facc15"></div>
    <div class="color-btn" style="background: #10b981;" data-color="#10b981"></div>
    <div class="color-btn" style="background: #ffffff;" data-color="#ffffff"></div>
</div>

<div class="bottom-bar">
    <div id="status">⚽ Mode: Nonton (sentuh layar untuk anotasi)</div>
    <div class="instruction-badge" id="modeHint"></div>
</div>

<script>
    (function(){
        const video = document.getElementById('myVideo');
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const btnPlay = document.getElementById('playBtn');
        const btnTriangle = document.getElementById('triangleBtn');
        const btnQuad = document.getElementById('quadBtn');
        const btnArrow = document.getElementById('arrowBtn');
        const btnName = document.getElementById('nameBtn');
        const btnClear = document.getElementById('clearBtn');
        const statusDiv = document.getElementById('status');
        const modeHint = document.getElementById('modeHint');
        const colorPalette = document.getElementById('colorPalette');

        // State
        let currentMode = 'nonton';   // nonton, segitiga, segiempat, panah, nama
        let selectedColor = '#ef4444';
        let currentPoints = [];        // temporary points for active drawing
        let savedTriangles = [];        // array of 3-point arrays
        let savedQuads = [];            // array of 4-point arrays
        let savedArrows = [];           // array of [start, control, end] (3 points)
        let savedNames = [];            // array of {text, x, y, color}

        // ----- Helper: Canvas resize & coordinate sync (CRITICAL for touch) -----
        function resizeCanvasAndRedraw() {
            const container = document.querySelector('.video-container');
            if (!container) return;
            const rect = container.getBoundingClientRect();
            let w = rect.width;
            let h = rect.height;
            if (w === 0 || h === 0) {
                w = container.clientWidth;
                h = container.clientHeight;
            }
            if (w === 0) w = window.innerWidth - 24;
            if (h === 0) h = 300;
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = `${w}px`;
            canvas.style.height = `${h}px`;
            redrawAll();
        }

        window.addEventListener('load', () => setTimeout(resizeCanvasAndRedraw, 50));
        video.addEventListener('loadedmetadata', resizeCanvasAndRedraw);
        video.addEventListener('canplay', resizeCanvasAndRedraw);
        window.addEventListener('resize', () => setTimeout(resizeCanvasAndRedraw, 30));
        new ResizeObserver(() => resizeCanvasAndRedraw()).observe(document.querySelector('.video-container'));

        // ----- roundRect polyfill -----
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2*r) r = w/2;
                if (h < 2*r) r = h/2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }

        // ---------- DRAWING PRIMITIVES ----------
        // Draw polygon (triangle or quad)
        function drawPolygon(points, isComplete = true) {
            if (!points.length) return;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x, points[i].y);
            if(isComplete && (points.length===3||points.length===4)) {
                ctx.closePath();
                ctx.fillStyle = "rgba(255,200,100,0.2)";
                ctx.fill();
            }
            ctx.strokeStyle = "#44ccff";
            ctx.lineWidth = 3;
            ctx.stroke();
            for(let p of points) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
                ctx.fillStyle = "#3b82f6";
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 10px monospace";
                ctx.shadowBlur = 0;
            }
        }

        // Draw curved arrow using 3 points: start, control, end (quadratic bezier)
        function draw3PointArrow(points, isPreview = false) {
            if (!points || points.length === 0) return;
            if (points.length === 1) {
                ctx.beginPath();
                ctx.arc(points[0].x, points[0].y, 7, 0, Math.PI*2);
                ctx.fillStyle = "#FFC107";
                ctx.shadowBlur = 3;
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.font = "bold 11px system-ui";
                ctx.fillText("⦿", points[0].x-3, points[0].y-5);
                return;
            }
            if (points.length === 2) {
                // preview: draw dotted line from start to control, and control point
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                ctx.lineTo(points[1].x, points[1].y);
                ctx.strokeStyle = "#FFD966aa";
                ctx.lineWidth = 2.5;
                ctx.setLineDash([6, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
                // draw control point hint
                ctx.beginPath();
                ctx.arc(points[1].x, points[1].y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#FFB347aa";
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.font = "bold 10px sans-serif";
                ctx.fillText("ctrl", points[1].x-10, points[1].y-6);
                return;
            }
            if (points.length >= 3) {
                const start = points[0];
                const control = points[1];
                const end = points[2];
                ctx.save();
                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                // main curve
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.quadraticCurveTo(control.x, control.y, end.x, end.y);
                ctx.strokeStyle = "#FFD966";
                ctx.lineWidth = 5;
                ctx.lineCap = "round";
                ctx.stroke();
                // draw start & end markers
                ctx.beginPath();
                ctx.arc(start.x, start.y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#FFA559";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(end.x, end.y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#FF6F3C";
                ctx.fill();
                // draw control point small indicator
                ctx.beginPath();
                ctx.arc(control.x, control.y, 5, 0, Math.PI*2);
                ctx.fillStyle = "#F4D03F";
                ctx.fill();
                // arrowhead at end (tangent to quadratic curve at t=1)
                // derivative at endpoint: B'(1) = 2*(end - control)
                const tangentX = end.x - control.x;
                const tangentY = end.y - control.y;
                const len = Math.hypot(tangentX, tangentY);
                if (len > 0.01) {
                    const angle = Math.atan2(tangentY, tangentX);
                    const headSize = 16;
                    const wing = Math.PI / 6;
                    const tipX = end.x, tipY = end.y;
                    const leftX = tipX - headSize * Math.cos(angle - wing);
                    const leftY = tipY - headSize * Math.sin(angle - wing);
                    const rightX = tipX - headSize * Math.cos(angle + wing);
                    const rightY = tipY - headSize * Math.sin(angle + wing);
                    ctx.beginPath();
                    ctx.moveTo(tipX, tipY);
                    ctx.lineTo(leftX, leftY);
                    ctx.lineTo(rightX, rightY);
                    ctx.closePath();
                    ctx.fillStyle = "#FFBF69";
                    ctx.fill();
                    ctx.strokeStyle = "#AA6F20";
                    ctx.lineWidth = 1.8;
                    ctx.stroke();
                }
                ctx.restore();
                // extra white dashed outline for visibility
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.quadraticCurveTo(control.x, control.y, end.x, end.y);
                ctx.strokeStyle = "#ffffffb3";
                ctx.lineWidth = 1.8;
                ctx.setLineDash([4, 6]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function drawNameTag(item) {
            ctx.save();
            ctx.shadowBlur = 4;
            ctx.font = "bold 15px system-ui";
            const metrics = ctx.measureText(item.text);
            const w = metrics.width + 20;
            const h = 32;
            const xBox = item.x - w/2;
            const yBox = item.y - h - 8;
            ctx.beginPath();
            ctx.roundRect(xBox, yBox, w, h, 12);
            ctx.fillStyle = item.color;
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 14px system-ui";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(item.text, item.x, yBox + h/2);
            ctx.beginPath();
            ctx.arc(item.x, item.y, 7, 0, Math.PI*2);
            ctx.fillStyle = "#FFE0A3";
            ctx.fill();
            ctx.fillStyle = "#000";
            ctx.font = "bold 10px sans-serif";
            ctx.fillText("⚽", item.x-3, item.y+2);
            ctx.restore();
        }

        function redrawAll() {
            if (!ctx || canvas.width === 0 || canvas.height === 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            savedTriangles.forEach(t => drawPolygon(t, true));
            savedQuads.forEach(q => drawPolygon(q, true));
            savedArrows.forEach(arr => draw3PointArrow(arr));
            savedNames.forEach(n => drawNameTag(n));
            // draw current in-progress points
            if (currentPoints.length > 0) {
                if (currentMode === 'segitiga' || currentMode === 'segiempat')
                    drawPolygon(currentPoints, false);
                else if (currentMode === 'panah')
                    draw3PointArrow(currentPoints, true);
            }
            // extra hint on canvas
            if (currentMode === 'panah' && currentPoints.length === 1) {
                ctx.font = "bold 12px monospace";
                ctx.fillStyle = "#FFE484";
                ctx.fillText("📍 Titik awal → tap titik lengkung (kontrol)", 12, 35);
            } else if (currentMode === 'panah' && currentPoints.length === 2) {
                ctx.fillStyle = "#FFE484";
                ctx.fillText("🎯 Tap titik akhir (ujung panah)", 12, 35);
            }
            if (currentMode === 'segitiga' && currentPoints.length>0 && currentPoints.length<3) {
                ctx.fillStyle = "#aaaaff";
                ctx.fillText(`${currentPoints.length}/3 titik`, 12, 30);
            }
            if (currentMode === 'segiempat' && currentPoints.length>0 && currentPoints.length<4) {
                ctx.fillStyle = "#aaaaff";
                ctx.fillText(`${currentPoints.length}/4 titik`, 12, 30);
            }
        }

        // ----- MODE MANAGEMENT -----
        function setMode(mode) {
            currentMode = mode;
            currentPoints = [];
            [btnPlay, btnTriangle, btnQuad, btnArrow, btnName].forEach(b => b.classList.remove('active'));
            colorPalette.style.display = 'none';
            modeHint.innerText = '';
            
            if (mode === 'nonton') {
                btnPlay.classList.add('active');
                canvas.style.pointerEvents = 'none';
                statusDiv.innerText = "🎥 Mode Nonton | Video berjalan";
                video.play().catch(e=>console.log);
                redrawAll();
            } else {
                video.pause();
                canvas.style.pointerEvents = 'auto';
                if (mode === 'segitiga') {
                    btnTriangle.classList.add('active');
                    statusDiv.innerText = "🔺 Mode Segitiga: tap 3 titik";
                    modeHint.innerText = "Tap 3 titik → bentuk segitiga";
                } else if (mode === 'segiempat') {
                    btnQuad.classList.add('active');
                    statusDiv.innerText = "⬛ Mode Segiempat: tap 4 titik";
                    modeHint.innerText = "Tap 4 titik → bentuk segiempat";
                } else if (mode === 'panah') {
                    btnArrow.classList.add('active');
                    statusDiv.innerText = "✨ Panah 3 Titik: Tentukan arah & lengkungan";
                    modeHint.innerText = "1. Titik awal → 2. Titik lengkung (kontrol) → 3. Ujung panah";
                } else if (mode === 'nama') {
                    btnName.classList.add('active');
                    colorPalette.style.display = 'flex';
                    statusDiv.innerText = `🏷️ Mode Label (warna aktif) → tap pemain & isi nama`;
                    modeHint.innerText = "Tap pemain, masukkan nama, warna bisa diganti";
                }
                redrawAll();
            }
        }

        // ----- HANDLE CANVAS TOUCH/CLICK -----
        function onCanvasTap(e) {
            if (currentMode === 'nonton') return;
            e.preventDefault();
            e.stopPropagation();
            if (canvas.width === 0 || canvas.height === 0) resizeCanvasAndRedraw();
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = canvas.getBoundingClientRect();
            let x = clientX - rect.left;
            let y = clientY - rect.top;
            x = Math.min(Math.max(x, 0), canvas.width);
            y = Math.min(Math.max(y, 0), canvas.height);
            const point = { x, y };

            if (currentMode === 'segitiga') {
                currentPoints.push(point);
                if (currentPoints.length === 3) {
                    savedTriangles.push([...currentPoints]);
                    currentPoints = [];
                    statusDiv.innerText = "✅ Segitiga tersimpan!";
                } else statusDiv.innerText = `🔺 ${currentPoints.length}/3 titik`;
                redrawAll();
            }
            else if (currentMode === 'segiempat') {
                currentPoints.push(point);
                if (currentPoints.length === 4) {
                    savedQuads.push([...currentPoints]);
                    currentPoints = [];
                    statusDiv.innerText = "✅ Segiempat tersimpan!";
                } else statusDiv.innerText = `⬛ ${currentPoints.length}/4 titik`;
                redrawAll();
            }
            else if (currentMode === 'panah') {
                currentPoints.push(point);
                if (currentPoints.length === 3) {
                    // save arrow as 3 points
                    savedArrows.push([{...currentPoints[0]}, {...currentPoints[1]}, {...currentPoints[2]}]);
                    currentPoints = [];
