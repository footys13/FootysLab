<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FIXED - Football Annotation (Touch Working)</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
        }
        body {
            font-family: system-ui, sans-serif;
            background: #0a0c12;
            color: white;
            padding: 12px;
            margin: 0;
        }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: 0 auto 16px;
            border-radius: 20px;
            border: 2px solid #2c3e4e;
            overflow: hidden;
            background: #111;
            min-height: 240px;
        }
        video {
            width: 100%;
            display: block;
            pointer-events: none;
        }
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            touch-action: none;
            background: rgba(0,0,0,0.05); /* slightly visible for debugging */
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 12px 0;
            background: #1e2a36;
            padding: 10px;
            border-radius: 50px;
        }
        button {
            background: #2c3e4e;
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
        }
        button.active {
            background: #2b7e3a;
            box-shadow: 0 0 0 2px #86efac;
        }
        #clearBtn { background: #b91c1c; }
        .color-palette {
            display: none;
            justify-content: center;
            gap: 12px;
            background: #000000aa;
            padding: 8px;
            border-radius: 50px;
            margin-top: 5px;
        }
        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid white;
        }
        .color-btn.active-color {
            border: 3px solid yellow;
            transform: scale(1.1);
        }
        .debug-log {
            background: #000000aa;
            font-family: monospace;
            font-size: 11px;
            padding: 6px;
            border-radius: 12px;
            margin-top: 12px;
            max-height: 100px;
            overflow-y: auto;
            color: #0f0;
        }
        .status {
            background: #1e2933;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 6px;
        }
        .test-btn {
            background: #3b82f6;
            font-size: 11px;
            padding: 4px 10px;
            margin-left: 8px;
        }
    </style>
</head>
<body>

<div class="video-container">
    <video id="myVideo" controls disablePictureInPicture playsinline>
        <source src="video-pertandingan.mp4" type="video/mp4">
        Your browser doesn't support video.
    </video>
    <canvas id="drawCanvas"></canvas>
</div>

<div class="controls">
    <button id="playBtn" class="active">📺 Nonton</button>
    <button id="triangleBtn">🔺 Segitiga</button>
    <button id="quadBtn">⬛ Segiempat</button>
    <button id="arrowBtn">➡️ Panah 3Titik</button>
    <button id="nameBtn">🏷️ Nama</button>
    <button id="clearBtn">🗑️ Hapus</button>
</div>

<div id="colorPalette" class="color-palette">
    <div class="color-btn active-color" style="background: #ef4444;" data-color="#ef4444"></div>
    <div class="color-btn" style="background: #3b82f6;" data-color="#3b82f6"></div>
    <div class="color-btn" style="background: #facc15;" data-color="#facc15"></div>
    <div class="color-btn" style="background: #10b981;" data-color="#10b981"></div>
    <div class="color-btn" style="background: #ffffff;" data-color="#ffffff"></div>
</div>

<div class="status" id="statusMsg">⚽ Mode: Nonton (pilih mode gambar dulu)</div>
<div class="debug-log" id="debugLog">[System] Siap. Klik "Test Gambar" untuk cek canvas.<br></div>
<button id="forceTestBtn" style="margin-top: 6px; background: #ff9800;">🎨 Test Gambar (Buat panah contoh)</button>

<script>
    (function(){
        // ---------- DOM elements ----------
        const video = document.getElementById('myVideo');
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const debugDiv = document.getElementById('debugLog');
        const statusSpan = document.getElementById('statusMsg');

        function addLog(msg) {
            const p = document.createElement('div');
            p.innerText = msg;
            debugDiv.appendChild(p);
            debugDiv.scrollTop = debugDiv.scrollHeight;
            console.log(msg);
        }

        // UI buttons
        const btnPlay = document.getElementById('playBtn');
        const btnTriangle = document.getElementById('triangleBtn');
        const btnQuad = document.getElementById('quadBtn');
        const btnArrow = document.getElementById('arrowBtn');
        const btnName = document.getElementById('nameBtn');
        const btnClear = document.getElementById('clearBtn');
        const colorPalette = document.getElementById('colorPalette');

        // ---------- DATA ----------
        let currentMode = 'nonton';   // nonton, segitiga, segiempat, panah, nama
        let selectedColor = '#ef4444';
        let currentPoints = [];        // points being collected
        let savedTriangles = [];
        let savedQuads = [];
        let savedArrows = [];           // each arrow: [start, control, end]
        let savedNames = [];

        // ---------- FORCE CANVAS SIZE (critical) ----------
        function updateCanvasSize() {
            const container = document.querySelector('.video-container');
            if (!container) return;
            const rect = container.getBoundingClientRect();
            let w = rect.width;
            let h = rect.height;
            if (w === 0 || h === 0) {
                w = container.clientWidth;
                h = container.clientHeight;
            }
            if (w === 0) w = window.innerWidth - 24;
            if (h === 0) h = 280;
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = `${w}px`;
            canvas.style.height = `${h}px`;
            addLog(`Canvas size: ${w} x ${h}`);
            redrawAll();
            return true;
        }

        // run resize often
        updateCanvasSize();
        window.addEventListener('resize', () => setTimeout(updateCanvasSize, 100));
        video.addEventListener('loadedmetadata', updateCanvasSize);
        new ResizeObserver(() => updateCanvasSize()).observe(document.querySelector('.video-container'));

        // ---------- DRAWING FUNCTIONS ----------
        function drawPolygon(points, isComplete) {
            if (points.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            if (isComplete && (points.length===3||points.length===4)) {
                ctx.closePath();
                ctx.fillStyle = "rgba(255,200,100,0.25)";
                ctx.fill();
            }
            ctx.strokeStyle = "#66ccff";
            ctx.lineWidth = 3;
            ctx.stroke();
            for (let p of points) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
                ctx.fillStyle = "#3b82f6";
                ctx.fill();
            }
        }

        function draw3PointArrow(points) {
            if (points.length === 0) return;
            if (points.length === 1) {
                ctx.beginPath();
                ctx.arc(points[0].x, points[0].y, 7, 0, Math.PI*2);
                ctx.fillStyle = "#FFC107";
                ctx.fill();
                return;
            }
            if (points.length === 2) {
                // preview line
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                ctx.lineTo(points[1].x, points[1].y);
                ctx.strokeStyle = "#FFD966aa";
                ctx.lineWidth = 2;
                ctx.setLineDash([6,8]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(points[1].x, points[1].y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#FFB347";
                ctx.fill();
                return;
            }
            if (points.length >= 3) {
                const start = points[0];
                const control = points[1];
                const end = points[2];
                ctx.save();
                ctx.shadowBlur = 3;
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.quadraticCurveTo(control.x, control.y, end.x, end.y);
                ctx.strokeStyle = "#FFD966";
                ctx.lineWidth = 5;
                ctx.stroke();
                // markers
                ctx.beginPath();
                ctx.arc(start.x, start.y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#FFA559";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(end.x, end.y, 6, 0, Math.PI*2);
                ctx.fillStyle = "#FF6F3C";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(control.x, control.y, 5, 0, Math.PI*2);
                ctx.fillStyle = "#F4D03F";
                ctx.fill();
                // arrowhead
                const dx = end.x - control.x;
                const dy = end.y - control.y;
                const len = Math.hypot(dx, dy);
                if (len > 0.01) {
                    const angle = Math.atan2(dy, dx);
                    const head = 16;
                    const wing = Math.PI/6;
                    const lx = end.x - head * Math.cos(angle - wing);
                    const ly = end.y - head * Math.sin(angle - wing);
                    const rx = end.x - head * Math.cos(angle + wing);
                    const ry = end.y - head * Math.sin(angle + wing);
                    ctx.beginPath();
                    ctx.moveTo(end.x, end.y);
                    ctx.lineTo(lx, ly);
                    ctx.lineTo(rx, ry);
                    ctx.fillStyle = "#FFBF69";
                    ctx.fill();
                }
                ctx.restore();
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.quadraticCurveTo(control.x, control.y, end.x, end.y);
                ctx.strokeStyle = "#ffffffaa";
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4,6]);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function drawNameTag(item) {
            ctx.save();
            ctx.font = "bold 14px system-ui";
            const w = ctx.measureText(item.text).width + 20;
            const h = 28;
            const xBox = item.x - w/2;
            const yBox = item.y - h - 8;
            ctx.roundRect(xBox, yBox, w, h, 12);
            ctx.fillStyle = item.color;
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(item.text, item.x, yBox + h/2);
            ctx.beginPath();
            ctx.arc(item.x, item.y, 6, 0, Math.PI*2);
            ctx.fillStyle = "#FFE0A3";
            ctx.fill();
            ctx.restore();
        }

        function redrawAll() {
            if (!ctx || canvas.width === 0) {
                updateCanvasSize();
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            savedTriangles.forEach(t => drawPolygon(t, true));
            savedQuads.forEach(q => drawPolygon(q, true));
            savedArrows.forEach(arr => draw3PointArrow(arr));
            savedNames.forEach(n => drawNameTag(n));
            if (currentPoints.length > 0) {
                if (currentMode === 'segitiga' || currentMode === 'segiempat')
                    drawPolygon(currentPoints, false);
                else if (currentMode === 'panah')
                    draw3PointArrow(currentPoints);
            }
            // hints
            if (currentMode === 'panah' && currentPoints.length === 1) {
                ctx.fillStyle = "yellow";
                ctx.font = "bold 12px monospace";
                ctx.fillText("📍 Tap titik lengkung (kontrol)", 12, 30);
            } else if (currentMode === 'panah' && currentPoints.length === 2) {
                ctx.fillStyle = "yellow";
                ctx.fillText("🎯 Tap titik akhir", 12, 30);
            }
        }

        // ---------- HANDLE TOUCH/CLICK ----------
        function onCanvasInteraction(e) {
            if (currentMode === 'nonton') {
                addLog("Mode Nonton: sentuhan diabaikan. Pilih Segitiga/Panah.");
                return;
            }
            e.preventDefault();
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const rect = canvas.getBoundingClientRect();
            let x = clientX - rect.left;
            let y = clientY - rect.top;
            if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) {
                addLog(`Tap di luar canvas (${Math.round(x)},${Math.round(y)})`);
                return;
            }
            // visual flash
            ctx.fillStyle = "rgba(0,255,0,0.3)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            setTimeout(() => redrawAll(), 100);
            
            const point = { x, y };
            addLog(`Tap di (${Math.round(x)},${Math.round(y)}) | Mode: ${currentMode}`);
            
            if (currentMode === 'segitiga') {
                currentPoints.push(point);
                if (currentPoints.length === 3) {
                    savedTriangles.push([...currentPoints]);
                    currentPoints = [];
                    statusSpan.innerText = "✅ Segitiga tersimpan!";
                } else statusSpan.innerText = `🔺 ${currentPoints.length}/3 titik`;
                redrawAll();
            }
            else if (currentMode === 'segiempat') {
                currentPoints.push(point);
                if (currentPoints.length === 4) {
                    savedQuads.push([...currentPoints]);
                    currentPoints = [];
                    statusSpan.innerText = "✅ Segiempat tersimpan!";
                } else statusSpan.innerText = `⬛ ${currentPoints.length}/4 titik`;
                redrawAll();
            }
            else if (currentMode === 'panah') {
                currentPoints.push(point);
                if (currentPoints.length === 3) {
                    savedArrows.push([{...currentPoints[0]}, {...currentPoints[1]}, {...currentPoints[2]}]);
                    currentPoints = [];
                    statusSpan.innerText = "🏹 Panah tersimpan!";
                } else if (currentPoints.length === 1) {
                    statusSpan.innerText = "↪️ Sekarang tap titik kontrol (lengkungan)";
                } else if (currentPoints.length === 2) {
                    statusSpan.innerText = "🔽 Tap titik akhir (ujung panah)";
                }
                redrawAll();
            }
            else if (currentMode === 'nama') {
                setTimeout(() => {
                    let name = prompt("Nama pemain:", "Pemain");
                    if (name && name.trim()) {
                        savedNames.push({ text: name.trim(), x, y, color: selectedColor });
                        statusSpan.innerText = `🏷️ "${name.trim()}" ditambahkan`;
                        redrawAll();
                    } else statusSpan.innerText = "Batal";
                }, 20);
            }
        }

        // ----- attach events (both touch and mouse) -----
        canvas.addEventListener('touchstart', onCanvasInteraction, { passive: false });
        canvas.addEventListener('mousedown', onCanvasInteraction);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        // ----- MODE SWITCH (ensure canvas active) -----
        function setMode(mode) {
            currentMode = mode;
            currentPoints = [];
            [btnPlay, btnTriangle, btnQuad, btnArrow, btnName].forEach(b => b.classList.remove('active'));
            colorPalette.style.display = 'none';
            if (mode === 'nonton') {
                btnPlay.classList.add('active');
                canvas.style.pointerEvents = 'none';
                video.play().catch(e=>console.log);
                statusSpan.innerText = "🎥 Mode Nonton (video jalan)";
                addLog("Mode Nonton: canvas tidak aktif.");
            } else {
                video.pause();
                canvas.style.pointerEvents = 'auto';
                updateCanvasSize(); // refresh
                if (mode === 'segitiga') {
                    btnTriangle.classList.add('active');
                    statusSpan.innerText = "🔺 Mode Segitiga: tap 3 titik";
                } else if (mode === 'segiempat') {
                    btnQuad.classList.add('active');
                    statusSpan.innerText = "⬛ Mode Segiempat: tap 4 titik";
                } else if (mode === 'panah') {
                    btnArrow.classList.add('active');
                    statusSpan.innerText = "✨ Panah 3 titik: tap awal → kontrol → akhir";
                } else if (mode === 'nama') {
                    btnName.classList.add('active');
                    colorPalette.style.display = 'flex';
                    statusSpan.innerText = `🏷️ Mode Nama: tap pemain, masukkan nama`;
                }
                addLog(`Mode ${mode} AKTIF. Canvas siap menerima sentuhan.`);
                redrawAll();
            }
        }

        // ----- BUTTONS -----
        btnPlay.addEventListener('click', () => setMode('nonton'));
        btnTriangle.addEventListener('click', () => setMode('segitiga'));
        btnQuad.addEventListener('click', () => setMode('segiempat'));
        btnArrow.addEventListener('click', () => setMode('panah'));
        btnName.addEventListener('click', () => setMode('nama'));
        btnClear.addEventListener('click', () => {
            savedTriangles = [];
            savedQuads = [];
            savedArrows = [];
            savedNames = [];
            currentPoints = [];
            redrawAll();
            statusSpan.innerText = "Semua anotasi dihapus";
            addLog("Semua anotasi dihapus");
        });
        
        // color picker
        colorPalette.addEventListener('click', (e) => {
            const btn = e.target.closest('.color-btn');
            if (btn) {
                selectedColor = btn.getAttribute('data-color');
                document.querySelectorAll('.color-btn').forEach(c => c.classList.remove('active-color'));
                btn.classList.add('active-color');
                addLog(`Warna label: ${selectedColor}`);
            }
        });

        // Force test button: draw a demo curved arrow at center
        document.getElementById('forceTestBtn').addEventListener('click', () => {
            if (canvas.width === 0 || canvas.height === 0) updateCanvasSize();
            const w = canvas.width, h = canvas.height;
            if (w > 50 && h > 50) {
