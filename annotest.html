<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #222; color: white; padding: 10px; margin: 0; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-bottom: 15px;
            border: 2px solid #444;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        #drawCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; 
            pointer-events: none;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 15px;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        button.active {
            background: #007bff;
            border-color: #0056b3;
            font-weight: bold;
        }
        #clearBtn { background: #dc3545; border-color: #a71d2a; }
        #status { font-weight: bold; color: #ffeb3b; padding: 5px; background: #333; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="video-container">
    <video id="myVideo" controls>
        <source src="video-pertandingan.mp4" type="video/mp4">
    </video>
    <canvas id="drawCanvas"></canvas>
</div>

<div class="controls">
    <button id="playBtn" class="active">Mode Nonton</button>
    <button id="triangleBtn">Mode Segitiga</button>
    <button id="nameBtn">Mode Nama Pemain</button>
    <button id="clearBtn">Hapus Coretan</button>
</div>

<div id="status">Status: Memutar Video</div>

<script>
    const video = document.getElementById('myVideo');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const btnPlay = document.getElementById('playBtn');
    const btnSegitiga = document.getElementById('triangleBtn');
    const btnName = document.getElementById('nameBtn');
    const btnClear = document.getElementById('clearBtn');
    const statusText = document.getElementById('status');

    // State Management
    let currentMode = 'nonton'; // Pilihan: 'nonton', 'segitiga', 'nama'
    
    // Data Penyimpanan
    let currentPoints = []; 
    let savedTriangles = []; 
    let savedNames = []; // Menyimpan data { text, x, y }

    // Mengatur ukuran canvas agar pas dengan video
    function resizeCanvas() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        redraw();
    }
    video.addEventListener('loadeddata', resizeCanvas);
    window.addEventListener('resize', resizeCanvas);

    // Fungsi untuk ganti mode dan warna tombol
    function setMode(mode) {
        currentMode = mode;
        
        // Reset warna tombol
        btnPlay.classList.remove('active');
        btnSegitiga.classList.remove('active');
        btnName.classList.remove('active');

        if (mode === 'nonton') {
            btnPlay.classList.add('active');
            canvas.style.pointerEvents = 'none';
            statusText.innerText = "Status: Memutar Video (Canvas Nonaktif)";
            currentPoints = []; // Batalkan titik segitiga yang belum selesai
            redraw();
        } else {
            video.pause();
            canvas.style.pointerEvents = 'auto'; // Aktifkan sentuhan
            resizeCanvas();
            
            if (mode === 'segitiga') {
                btnSegitiga.classList.add('active');
                statusText.innerText = "Status: Mode Segitiga. Sentuh 3 titik!";
            } else if (mode === 'nama') {
                btnName.classList.add('active');
                statusText.innerText = "Status: Mode Nama. Sentuh pemain untuk beri label!";
                currentPoints = []; 
                redraw();
            }
        }
    }

    // Event Listener Tombol
    btnPlay.addEventListener('click', () => setMode('nonton'));
    btnSegitiga.addEventListener('click', () => setMode('segitiga'));
    btnName.addEventListener('click', () => setMode('nama'));
    
    btnClear.addEventListener('click', () => {
        savedTriangles = [];
        savedNames = [];
        currentPoints = [];
        redraw();
    });

    // Menangkap sentuhan di layar
    canvas.addEventListener('pointerdown', (e) => {
        if (currentMode === 'nonton') return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        if (currentMode === 'segitiga') {
            currentPoints.push({ x: x, y: y });
            if (currentPoints.length === 3) {
                savedTriangles.push([...currentPoints]);
                currentPoints = []; 
            }
            redraw();
        } 
        
        else if (currentMode === 'nama') {
            // Meminta input nama saat layar disentuh
            // setTimeout digunakan agar sistem fokus merender titik terlebih dahulu
            setTimeout(() => {
                const playerName = prompt("Masukkan Nama Pemain:");
                if (playerName && playerName.trim() !== "") {
                    savedNames.push({ text: playerName.trim(), x: x, y: y });
                    redraw();
                }
            }, 10);
        }
    });

    // MASTER DRAWING FUNCTION
    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Gambar Segitiga
        savedTriangles.forEach(tri => drawTriangle(tri, true));
        if (currentPoints.length > 0) {
            drawTriangle(currentPoints, false);
        }

        // 2. Gambar Label Nama
        savedNames.forEach(nameObj => drawNameTag(nameObj));
    }

    // Fungsi menggambar segitiga
    function drawTriangle(points, isComplete) {
        ctx.beginPath();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        
        ctx.moveTo(points[0].x, points[0].y);
        ctx.arc(points[0].x, points[0].y, 4, 0, Math.PI*2); 

        if (points.length > 1) {
            ctx.lineTo(points[1].x, points[1].y);
            ctx.arc(points[1].x, points[1].y, 4, 0, Math.PI*2);
        }
        if (points.length > 2) {
            ctx.lineTo(points[2].x, points[2].y);
            ctx.closePath(); 
            if (isComplete) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; 
                ctx.fill();
            }
        }
        ctx.stroke(); 
    }

    // Fungsi menggambar label nama bergaya tombol
    function drawNameTag(nameObj) {
        ctx.font = "bold 14px sans-serif";
        const textWidth = ctx.measureText(nameObj.text).width;
        const paddingX = 10;
        const boxWidth = textWidth + (paddingX * 2);
        const boxHeight = 26;
        
        // Posisi kotak: di tengah X, dan sedikit di atas titik Y yang disentuh
        const boxX = nameObj.x - (boxWidth / 2);
        const boxY = nameObj.y - boxHeight - 15; 

        // Gambar titik kuning kecil di pemainnya
        ctx.beginPath();
        ctx.arc(nameObj.x, nameObj.y, 4, 0, Math.PI*2);
        ctx.fillStyle = "#ffeb3b"; // Kuning
        ctx.fill();
        ctx.stroke();

        // Tarik garis tipis dari titik ke kotak nama
        ctx.beginPath();
        ctx.moveTo(nameObj.x, nameObj.y);
        ctx.lineTo(nameObj.x, boxY + boxHeight);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Gambar kotak background (Rounded Rectangle)
        ctx.beginPath();
        ctx.roundRect(boxX, boxY, boxWidth, boxHeight, 6); // Radius lengkungan 6px
        ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; // Latar hitam transparan
        ctx.fill();
        ctx.strokeStyle = "#444";
        ctx.lineWidth = 1;
        ctx.stroke();

        // Tulis teks nama pemain
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        // Koordinat teks ada di tengah-tengah kotak
        ctx.fillText(nameObj.text, nameObj.x, boxY + (boxHeight / 2));
    }
</script>

</body>
</html>
