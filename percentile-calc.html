<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Percentile Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0f0a;
      color: white;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .topbar {
      width: 100%;
      max-width: 560px;
      border-left: 3px solid #4ade80;
      padding: 12px 20px;
      background: #0f1a0f;
      letter-spacing: 2px;
      font-size: 10px;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .card {
      background: #0f1a0f;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 9px;
      letter-spacing: 2px;
      color: #4b5563;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 14px;
    }
    select {
      width: 100%;
      background: #161f16;
      color: white;
      border: 1px solid #2d4a2d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-family: 'Barlow', sans-serif;
      margin-bottom: 10px;
    }
    .btn {
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 100%;
    }
    .btn-green { background: #4ade80; color: #0a0f0a; }
    .btn-outline {
      background: #161f16;
      color: #4ade80;
      border: 1px solid #4ade80;
      margin-top: 12px;
    }

    /* Result */
    .result-card {
      background: #0f1a0f;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 560px;
      display: none;
    }
    .result-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 36px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .result-meta {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1a2e1a;
    }
    .result-meta span { color: #e5e7eb; font-weight: 600; }
    .percentile-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .pct-item {
      background: #161f16;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pct-bar-wrap { flex: 1; }
    .pct-label {
      font-size: 9px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .pct-raw {
      font-size: 9px;
      color: #374151;
      margin-top: 2px;
    }
    .pct-bar-bg {
      background: #0a0f0a;
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    .pct-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease;
    }
    .pct-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 800;
      flex-shrink: 0;
      width: 36px;
      text-align: right;
    }
    .high { color: #4ade80; background: #4ade80; }
    .mid  { color: #facc15; background: #facc15; }
    .low  { color: #f87171; background: #f87171; }

    .watermark {
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #ffffff;
      text-transform: uppercase;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #1a2e1a;
    }
  </style>
</head>
<body>

  <div class="topbar">THE FOOTYS · PERCENTILE CALCULATOR</div>

  <div class="card">
    <div class="card-title">Upload CSV Raw Stats</div>
    <input type="file" id="inputCSV" accept=".csv">
    <p id="csvStatus" style="color:#4b5563; font-size:11px; margin-top:8px;"></p>
  </div>

  <div class="card" id="controlsCard" style="display:none;">
    <div class="card-title">Pilih Posisi</div>
    <select id="selectPosisi" onchange="gantiPosisi()">
      <option value="striker">Striker / CF</option>
      <option value="winger">Winger / LW / RW</option>
      <option value="midfielder">Midfielder / CM</option>
      <option value="defender">Defender / CB</option>
    </select>

    <div class="card-title">Pilih Pemain</div>
    <select id="selectPemain"></select>

    <button class="btn btn-green" onclick="hitungPercentile()">
      📊 Hitung Percentile
    </button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="card-title">Hasil Percentile</div>
    <div class="result-name" id="resultNama">-</div>
    <div class="result-meta">
      Club: <span id="resultKlub">-</span> ·
      Pos: <span id="resultPosisi">-</span> ·
      Age: <span id="resultUmur">-</span>
    </div>

    <div class="card-title">Percentile vs Liga</div>
    <div class="percentile-grid" id="percentileGrid"></div>

    <div class="card-title" style="margin-top:8px;">Pizza Chart</div>
    <svg id="pizzaSVG" viewBox="0 0 400 400" width="100%" height="100%"></svg>

    <div class="watermark">THE FOOTYS</div>

    <button class="btn btn-outline" onclick="exportGambar()">
      💾 Save Image
    </button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>

    const STATS_MAP = {
      striker: [
        { key: "Goals",              label: "Goals"     },
        { key: "Shots on Target",    label: "SoT"       },
        { key: "Key Passes",         label: "Key Pass"  },
        { key: "Assists",            label: "Assists"   },
        { key: "Duels Won",          label: "Duels Won" },
        { key: "Big Chances Missed", label: "BCM"       }
      ],
      winger: [
        { key: "Goals",        label: "Goals"     },
        { key: "Key Passes",   label: "Key Pass"  },
        { key: "Assists",      label: "Assists"   },
        { key: "Crosses",      label: "Crosses"   },
        { key: "Duels Won",    label: "Duels Won" },
        { key: "Long Balls",   label: "Long Balls"}
      ],
      midfielder: [
        { key: "Passes",        label: "Passes"    },
        { key: "Acc. Passes",   label: "Acc Pass"  },
        { key: "Key Passes",    label: "Key Pass"  },
        { key: "Assists",       label: "Assists"   },
        { key: "Duels Won",     label: "Duels Won" },
        { key: "Interceptions", label: "Intercept" }
      ],
      defender: [
        { key: "Duels Won",        label: "Duels Won"  },
        { key: "Aerial Duels Won", label: "Aerial Won" },
        { key: "Interceptions",    label: "Intercept"  },
        { key: "Clearances",       label: "Clearances" },
        { key: "Acc. Long Balls",  label: "Long Ball"  },
        { key: "Tackles Won",      label: "Tkl Won"    }
      ]
    };

    let data = [];
    let statsAktif = STATS_MAP["striker"];

    function parseBaris(str) {
      const hasil = [];
      let current = "";
      let dalamKutip = false;
      for (let i = 0; i < str.length; i++) {
        const char = str[i];
        if (char === '"') {
          dalamKutip = !dalamKutip;
        } else if (char === ',' && !dalamKutip) {
          hasil.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }
      hasil.push(current.trim());
      return hasil;
    }

    function prosesCSV(teks) {
      const baris = teks.trim().split("\n");
      const header = parseBaris(baris[0].replace(/^\uFEFF/, ""));
      const result = [];
      for (let i = 1; i < baris.length; i++) {
        const kolom = parseBaris(baris[i]);
        if (kolom.length < 2) continue;
        const p = {};
        for (let j = 0; j < header.length; j++) {
          p[header[j]] = kolom[j] || "";
        }
        result.push(p);
      }
      return result;
    }

    // Load CSV
    document.getElementById("inputCSV").onchange = function() {
      const file = this.files[0];
      if (!file) return;
      fetch(URL.createObjectURL(file))
        .then(function(r) {
          r.text().then(function(teks) {
            data = prosesCSV(teks);
            isiDropdown();
            document.getElementById("csvStatus").textContent =
              "✅ " + data.length + " pemain dimuat";
            document.getElementById("controlsCard").style.display = "block";
          });
        });
    };

    function isiDropdown() {
      const sel = document.getElementById("selectPemain");
      sel.innerHTML = "";
      data.forEach(function(p, i) {
        sel.appendChild(new Option(p["Player"] + " — " + p["Team"], i));
      });
    }

    function gantiPosisi() {
      statsAktif = STATS_MAP[document.getElementById("selectPosisi").value];
    }

    function hitungPercentile() {
      const i = document.getElementById("selectPemain").value;
      const pemain = data[i];
      if (!pemain) return;

      const hasil = statsAktif.map(function(stat) {
        const nilaiPemain = parseFloat(pemain[stat.key]) || 0;

        // Ambil semua nilai stat dari seluruh pemain
        const semuaNilai = data
          .map(function(p) { return parseFloat(p[stat.key]); })
          .filter(function(v) { return !isNaN(v); })
          .sort(function(a, b) { return a - b; });

        // Hitung percentile
        const dibawah = semuaNilai.filter(function(v) { return v <= nilaiPemain; }).length;
        const pct = Math.round((dibawah / semuaNilai.length) * 100);

        return { stat: stat, raw: nilaiPemain, pct: pct };
      });

      tampilkanHasil(pemain, hasil);
    }

    function tampilkanHasil(pemain, hasil) {
      document.getElementById("resultNama").textContent = pemain["Player"];
      document.getElementById("resultKlub").textContent = pemain["Team"];
      document.getElementById("resultPosisi").textContent = pemain["Pos"] || "-";
      document.getElementById("resultUmur").textContent = pemain["Age"] || "-";

      // Grid percentile
      const grid = document.getElementById("percentileGrid");
      grid.innerHTML = "";
      hasil.forEach(function(h) {
        const kelas = h.pct >= 70 ? "high" : h.pct >= 40 ? "mid" : "low";
        const item = document.createElement("div");
        item.className = "pct-item";
        item.innerHTML = `
          <div class="pct-bar-wrap">
            <div class="pct-label">${h.stat.label}</div>
            <div class="pct-bar-bg">
              <div class="pct-bar-fill ${kelas}" id="pf_${h.stat.label.replace(/ /g,'_')}" style="width:0%"></div>
            </div>
            <div class="pct-raw">${h.raw.toFixed(2)} per 90</div>
          </div>
          <div class="pct-num ${kelas}">${h.pct}</div>
        `;
        grid.appendChild(item);
      });

      setTimeout(function() {
        hasil.forEach(function(h) {
          const bar = document.getElementById("pf_" + h.stat.label.replace(/ /g,'_'));
          if (bar) bar.style.width = h.pct + "%";
        });
      }, 100);

      gambarPizza(hasil);

      document.getElementById("resultCard").style.display = "block";
      document.getElementById("resultCard").scrollIntoView({ behavior: "smooth" });
    }

    function gambarPizza(hasil) {
      const svg = document.getElementById("pizzaSVG");
      svg.innerHTML = "";
      const cx = 200, cy = 200;
      const rMax = 150, rMin = 40;
      const n = hasil.length;
      const slice = (2 * Math.PI) / n;

      [0.25, 0.5, 0.75, 1.0].forEach(function(pct) {
        const r = rMin + (rMax - rMin) * pct;
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", cx); c.setAttribute("cy", cy);
        c.setAttribute("r", r); c.setAttribute("fill", "none");
        c.setAttribute("stroke", "#1a2e1a"); c.setAttribute("stroke-width", "1");
        svg.appendChild(c);
        const l = document.createElementNS("http://www.w3.org/2000/svg", "text");
        l.setAttribute("x", cx + 4); l.setAttribute("y", cy - r + 12);
        l.setAttribute("fill", "#374151"); l.setAttribute("font-size", "9");
        l.textContent = Math.round(pct * 100);
        svg.appendChild(l);
      });

      for (let i = 0; i < n; i++) {
        const angle = slice * i - Math.PI / 2;
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", cx); line.setAttribute("y1", cy);
        line.setAttribute("x2", cx + rMax * Math.cos(angle));
        line.setAttribute("y2", cy + rMax * Math.sin(angle));
        line.setAttribute("stroke", "#0a0f0a"); line.setAttribute("stroke-width", "1.5");
        svg.appendChild(line);
      }

      hasil.forEach(function(h, i) {
        const val = h.pct / 100;
        const r = rMin + (rMax - rMin) * val;
        const startAngle = slice * i - Math.PI / 2;
        const endAngle   = slice * (i + 1) - Math.PI / 2;

        const x1 = cx + rMin * Math.cos(startAngle); const y1 = cy + rMin * Math.sin(startAngle);
        const x2 = cx + r * Math.cos(startAngle);    const y2 = cy + r * Math.sin(startAngle);
        const x3 = cx + r * Math.cos(endAngle);      const y3 = cy + r * Math.sin(endAngle);
        const x4 = cx + rMin * Math.cos(endAngle);   const y4 = cy + rMin * Math.sin(endAngle);

        const warna = val >= 0.7 ? "#4ade80" : val >= 0.4 ? "#facc15" : "#f87171";

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", ["M",x1,y1,"L",x2,y2,"A",r,r,0,0,1,x3,y3,"L",x4,y4,"A",rMin,rMin,0,0,0,x1,y1,"Z"].join(" "));
        path.setAttribute("fill", warna); path.setAttribute("stroke", "#0a0f0a");
        path.setAttribute("stroke-width", "1.5");
        svg.appendChild(path);

        const labelAngle = slice * i + slice / 2 - Math.PI / 2;
        const lx = cx + (rMax + 26) * Math.cos(labelAngle);
        const ly = cy + (rMax + 26) * Math.sin(labelAngle);
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", lx); text.setAttribute("y", ly);
        text.setAttribute("text-anchor", "middle"); text.setAttribute("dominant-baseline", "middle");
        text.setAttribute("fill", "#9ca3af"); text.setAttribute("font-size", "11");
        text.setAttribute("font-weight", "600"); text.textContent = h.stat.label;
        svg.appendChild(text);

        if (val > 0.1) {
          const nx = cx + (rMin + (r - rMin) * 0.5) * Math.cos(labelAngle);
          const ny = cy + (rMin + (r - rMin) * 0.5) * Math.sin(labelAngle);
          const num = document.createElementNS("http://www.w3.org/2000/svg", "text");
          num.setAttribute("x", nx); num.setAttribute("y", ny);
          num.setAttribute("text-anchor", "middle"); num.setAttribute("dominant-baseline", "middle");
          num.setAttribute("fill", "#0a0f0a"); num.setAttribute("font-size", "11");
          num.setAttribute("font-weight", "800"); num.textContent = h.pct;
          svg.appendChild(num);
        }
      });
    }

    function exportGambar() {
      html2canvas(document.getElementById("resultCard"), {
        backgroundColor: "#0f1a0f",
        scale: 2,
        useCORS: true
      }).then(function(canvas) {
        const link = document.createElement("a");
        link.download = "percentile-result.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }

  </script>
</body>
</html>
