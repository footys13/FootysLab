<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scatter Plot - The Footys</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { background: #0a0f0a; color: white; font-family: 'Barlow', sans-serif; padding: 24px; }
    #mainScreen { max-width: 900px; margin: 0 auto; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    select { width: 100%; background: #161f16; color: white; border: 1px solid #2d4a2d; padding: 10px; border-radius: 8px; }
    .svg-wrap { background: #0f1a0f; border-radius: 20px; padding: 20px; position: relative; }
    svg { width: 100%; height: 500px; cursor: crosshair; }
    .tooltip { position: absolute; background: rgba(0,0,0,0.9); border: 1px solid #4ade80; padding: 10px; border-radius: 5px; pointer-events: none; display: none; font-size: 12px; z-index: 10; }
  </style>
</head>
<body>

  <div id="uploadScreen" style="text-align:center; padding-top:100px;">
    <input type="file" id="inputCSV" accept=".csv">
  </div>

  <div id="mainScreen" style="display:none;">
    <div class="controls">
      <div><label style="font-size:9px; color:#4ade80">X AXIS</label><select id="selectX" onchange="updateChart()"></select></div>
      <div><label style="font-size:9px; color:#60a5fa">Y AXIS</label><select id="selectY" onchange="updateChart()"></select></div>
      <div><label style="font-size:9px; color:#fbbf24">ORIGIN</label><select id="selectCountry" onchange="updateChart()">
        <option value="all">Semua Pemain</option>
        <option value="Indonesia">Indonesia Saja</option>
        <option value="Luar">Luar Negeri Saja</option>
      </select></div>
    </div>
    <div class="svg-wrap" id="cardExport">
      <svg id="scatterSVG" viewBox="0 0 700 500"></svg>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <button onclick="exportGambar()" style="margin-top:20px; width:100%; padding:10px; cursor:pointer;">💾 Save Image</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    let dataPemain = [];

    document.getElementById("inputCSV").onchange = function(e) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const rows = event.target.result.split("\n").map(r => r.trim()).filter(r => r !== "");
        // Regex untuk split CSV agar tanda koma di dalam kutip tidak terpecah
        const headers = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.replace(/["\r]/g, ""));
        
        dataPemain = rows.slice(1).map(row => {
          const vals = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["\r]/g, ""));
          let obj = {};
          headers.forEach((h, i) => obj[h] = vals[i]);
          return obj;
        });

        // Masukkan semua kolom angka ke dropdown
        const numericCols = headers.filter(h => !["Player", "Team", "Position", "League", "Birth country"].includes(h));
        const selX = document.getElementById("selectX");
        const selY = document.getElementById("selectY");
        numericCols.forEach(col => {
          selX.add(new Option(col, col));
          selY.add(new Option(col, col));
        });
        selY.selectedIndex = 1;

        document.getElementById("uploadScreen").style.display = "none";
        document.getElementById("mainScreen").style.display = "block";
        updateChart();
      };
      reader.readAsText(e.target.files[0]);
    };

    function updateChart() {
      const keyX = document.getElementById("selectX").value;
      const keyY = document.getElementById("selectY").value;
      const filter = document.getElementById("selectCountry").value;
      const svg = document.getElementById("scatterSVG");
      svg.innerHTML = "";

      const filtered = dataPemain.filter(p => {
        const country = (p["Birth country"] || "").toLowerCase();
        if (filter === "Indonesia") return country === "indonesia";
        if (filter === "Luar") return country !== "indonesia" && country !== "";
        return true;
      });

      filtered.forEach(p => {
        const valX = parseFloat(p[keyX]) || 0;
        const valY = parseFloat(p[keyY]) || 0;
        const x = 50 + (valX * 500); // Skala bisa disesuaikan
        const y = 450 - (valY * 400);

        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", x); circle.setAttribute("cy", y); circle.setAttribute("r", "5");
        circle.setAttribute("fill", "#4ade80");

        circle.onmouseover = () => {
          const tt = document.getElementById("tooltip");
          tt.style.display = "block";
          tt.style.left = (x + 20) + "px";
          tt.style.top = (y + 20) + "px";
          tt.innerHTML = `<strong>${p.Player}</strong><br>${keyX}: ${valX}<br>${keyY}: ${valY}`;
        };
        circle.onmouseout = () => document.getElementById("tooltip").style.display = "none";

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", x); text.setAttribute("y", y - 10);
        text.setAttribute("text-anchor", "middle"); text.setAttribute("fill", "#6b7280");
        text.setAttribute("font-size", "8px");
        text.textContent = p.Player ? p.Player.split(" ").pop() : "";

        g.appendChild(circle); g.appendChild(text);
        svg.appendChild(g);
      });
    }

    function exportGambar() {
      html2canvas(document.getElementById("cardExport")).then(canvas => {
        const link = document.createElement("a");
        link.download = "scatter.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>
</body>
</html>
