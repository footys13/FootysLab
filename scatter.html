<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE FOOTYS · Scatter Plot</title>
  <style>
    body { background: #0a0f0a; color: white; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    #mainScreen { display: none; width: 100%; max-width: 600px; }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    select { width: 100%; background: #161f16; color: white; padding: 10px; border-radius: 8px; }
    .card { background: #0f1a0f; padding: 20px; border-radius: 20px; }
    svg { width: 100%; height: 400px; background: #0a0f0a; }
    .btn-export { margin-top: 20px; background: #4ade80; color: #0a0f0a; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
  </style>
</head>
<body>

  <div id="uploadScreen">
    <h3>Upload CSV Database</h3>
    <input type="file" id="inputCSV" accept=".csv">
  </div>

  <div id="mainScreen">
    <div class="controls">
      <select id="selectX" onchange="updateChart()"></select>
      <select id="selectY" onchange="updateChart()"></select>
    </div>
    <div class="card" id="cardExport">
      <h3 id="chartTitle" style="text-align:center">Scatter Plot</h3>
      <svg id="scatterSVG" viewBox="0 0 500 400"></svg>
    </div>
    <button class="btn-export" onclick="exportGambar()">💾 Save Image</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    let dataPemain = [];

    document.getElementById("inputCSV").onchange = function(e) {
      const reader = new FileReader();
      reader.onload = function(event) {
        const rows = event.target.result.split('\n');
        const headers = rows[0].split(',').map(h => h.trim());
        dataPemain = rows.slice(1).filter(r => r.trim()).map(r => {
          const vals = r.split(',');
          let obj = {};
          headers.forEach((h, i) => obj[h] = vals[i]);
          return obj;
        });

        const selX = document.getElementById("selectX");
        const selY = document.getElementById("selectY");
        headers.forEach(h => {
          if (h !== "Player" && h !== "Team" && h !== "Pos") {
            selX.appendChild(new Option(h, h));
            selY.appendChild(new Option(h, h));
          }
        });
        document.getElementById("uploadScreen").style.display = "none";
        document.getElementById("mainScreen").style.display = "block";
        updateChart();
      };
      reader.readAsText(e.target.files[0]);
    };

    function updateChart() {
      const keyX = document.getElementById("selectX").value;
      const keyY = document.getElementById("selectY").value;
      const svg = document.getElementById("scatterSVG");
      svg.innerHTML = "";
      
      dataPemain.forEach(p => {
        const x = (parseFloat(p[keyX]) || 0) * 5; // Scale sederhana
        const y = 400 - (parseFloat(p[keyY]) || 0) * 5;
        
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", x); circle.setAttribute("cy", y);
        circle.setAttribute("r", "5"); circle.setAttribute("fill", "#4ade80");
        
        // Menambahkan nama pemain saat diklik
        circle.onclick = () => alert(p["Player"]); 
        svg.appendChild(circle);
      });
      document.getElementById("chartTitle").textContent = keyX + " vs " + keyY;
    }

    function exportGambar() {
      html2canvas(document.getElementById("cardExport")).then(canvas => {
        const link = document.createElement("a");
        link.download = "the-footys-chart.png";
        link.href = canvas.toDataURL();
        link.click();
      });
    }
  </script>
</body>
</html>
