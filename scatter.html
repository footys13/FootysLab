<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scatter Plot - The Footys</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f0a; color: white; font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
    .topbar { width: 100%; max-width: 680px; border-left: 3px solid #4ade80; padding: 12px 20px; background: #0f1a0f; letter-spacing: 2px; font-size: 10px; color: #6b7280; font-weight: 600; margin-bottom: 24px; text-transform: uppercase; }
    #uploadScreen { display: flex; align-items: center; justify-content: center; min-height: 60vh; width: 100%; max-width: 680px; }
    .upload-box { border: 2px dashed #1f2d1f; border-radius: 16px; padding: 48px 32px; text-align: center; max-width: 400px; width: 100%; }
    #mainScreen { display: none; width: 100%; max-width: 680px; }
    .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .control-group { display: flex; flex-direction: column; gap: 5px; }
    .control-label { font-size: 9px; letter-spacing: 2px; color: #4b5563; text-transform: uppercase; font-weight: 700; }
    select { width: 100%; background: #161f16; color: white; border: 1px solid #2d4a2d; border-radius: 8px; padding: 10px 12px; font-size: 11px; font-family: 'Barlow', sans-serif; }
    .card { background: #0f1a0f; border-radius: 20px; padding: 24px; width: 100%; }
    .chart-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: #4b5563; text-transform: uppercase; text-align: center; margin-bottom: 16px; }
    .svg-wrap { position: relative; width: 100%; }
    svg { width: 100%; display: block; }
    .tooltip { position: absolute; padding: 8px 12px; font-size: 12px; pointer-events: none; display: none; z-index: 10; min-width: 140px; background: rgba(15, 26, 15, 0.85); border: 1px solid #2d4a2d; border-radius: 8px; backdrop-filter: blur(4px); }
    .tooltip-name { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; color: #4ade80; text-transform: uppercase; }
    .tooltip-team { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
    .tooltip-stats { font-size: 11px; color: #e5e7eb; line-height: 1.6; }
    .watermark { margin-top: 16px; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 4px; color: #ffffff; text-transform: uppercase; text-align: center; }
    .btn-export { margin-top: 20px; background: #161f16; color: #4ade80; border: 1px solid #4ade80; border-radius: 8px; padding: 10px 24px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; width: 100%; }
  </style>
</head>
<body>

  <div class="topbar">THE FOOTYS · SCATTER PLOT</div>

  <div id="uploadScreen">
    <div class="upload-box">
      <p>Upload CSV database</p>
      <input type="file" id="inputCSV" accept=".csv">
    </div>
  </div>

  <div id="mainScreen">
    <div class="controls">
      <div class="control-group">
        <div class="control-label" style="color:#4ade80">X Axis</div>
        <select id="selectX" onchange="updateChart()"></select>
      </div>
      <div class="control-group">
        <div class="control-label" style="color:#60a5fa">Y Axis</div>
        <select id="selectY" onchange="updateChart()"></select>
      </div>
      <div class="control-group">
        <div class="control-label" style="color:#fbbf24">Origin</div>
        <select id="selectCountry" onchange="updateChart()">
          <option value="all">Semua</option>
          <option value="Indonesia">Indonesia</option>
          <option value="Luar">Luar Negeri</option>
        </select>
      </div>
    </div>

    <div class="card" id="cardExport">
      <div class="chart-title" id="chartTitle">-</div>
      <div class="svg-wrap" id="svgWrap">
        <svg id="scatterSVG" viewBox="0 0 600 500"></svg>
        <div class="tooltip" id="tooltip">
          <div class="tooltip-name" id="ttName">-</div>
          <div class="tooltip-team" id="ttTeam">-</div>
          <div class="tooltip-stats" id="ttStats">-</div>
        </div>
      </div>
      <div class="watermark">THE FOOTYS</div>
    </div>

    <button class="btn-export" onclick="exportGambar()">💾 Save Image</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const AXIS_OPTIONS = [
      { key: "Non-penalty goals per 90", label: "NP Goals" },
      { key: "npxG per 90", label: "npxG" },
      { key: "Goal conversion, %", label: "Conv %" },
      { key: "Shot assists per 90", label: "Shot Assists" },
      { key: "xA per 90", label: "xA" },
      { key: "Assists per 90", label: "Assists" }
    ];

    let dataPemain = [];

    function parseBaris(str) {
      const hasil = []; let current = ""; let dalamKutip = false;
      for (let i = 0; i < str.length; i++) {
        const char = str[i];
        if (char === '"') dalamKutip = !dalamKutip;
        else if (char === ',' && !dalamKutip) { hasil.push(current.trim()); current = ""; }
        else current += char;
      }
      hasil.push(current.trim()); return hasil;
    }

    document.getElementById("inputCSV").onchange = function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const lines = e.target.result.split("\n");
        const header = parseBaris(lines[0]);
        dataPemain = lines.slice(1).filter(l => l.length > 0).map(l => {
          const vals = parseBaris(l);
          let obj = {};
          header.forEach((h, i) => obj[h] = vals[i]);
          return obj;
        });
        
        ["selectX", "selectY"].forEach((id, idx) => {
          const sel = document.getElementById(id);
          AXIS_OPTIONS.forEach(opt => sel.appendChild(new Option(opt.label, opt.key)));
          sel.selectedIndex = idx;
        });
        document.getElementById("uploadScreen").style.display = "none";
        document.getElementById("mainScreen").style.display = "block";
        updateChart();
      };
      reader.readAsText(file);
    };

    function updateChart() {
      const keyX = document.getElementById("selectX").value;
      const keyY = document.getElementById("selectY").value;
      const filter = document.getElementById("selectCountry").value;
      const labelX = AXIS_OPTIONS.find(o => o.key === keyX).label;
      const labelY = AXIS_OPTIONS.find(o => o.key === keyY).label;
      document.getElementById("chartTitle").textContent = labelX + " · " + labelY;
      gambarScatter(keyX, keyY, labelX, labelY, filter);
    }

    function gambarScatter(keyX, keyY, labelX, labelY, filter) {
      const svg = document.getElementById("scatterSVG");
      svg.innerHTML = "";
      
      const filteredData = dataPemain.filter(p => {
        const country = (p["Birth Country"] || "").toLowerCase();
        if (filter === "Indonesia") return country === "indonesia";
        if (filter === "Luar") return country !== "indonesia" && country !== "";
        return true;
      });

      // (Logika rendering SVG tetap sama seperti kodemu, pastikan data dipanggil dari filteredData)
      // ... (Gunakan variabel filteredData di sini untuk looping circle) ...
      
      // Contoh cuplikan:
      filteredData.forEach(pemain => {
         // ... logika menggambar titik ...
      });
    }

    function exportGambar() {
      document.getElementById("tooltip").style.display = "none";
      html2canvas(document.getElementById("cardExport"), { backgroundColor: "#0f1a0f", scale: 2 }).then(canvas => {
        const link = document.createElement("a");
        link.download = "plot.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }
  </script>
</body>
</html>
