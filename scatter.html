<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scatter Plot Interaktif</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- D3.js untuk chart -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0f0a;
      color: white;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    .topbar {
      width: 100%;
      max-width: 680px;
      border-left: 3px solid #4ade80;
      padding: 12px 20px;
      background: #0f1a0f;
      letter-spacing: 2px;
      font-size: 10px;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    #uploadScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      width: 100%;
      max-width: 680px;
    }
    .upload-box {
      border: 2px dashed #1f2d1f;
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .upload-box p {
      color: #4b5563;
      letter-spacing: 1px;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    #mainScreen {
      display: none;
      width: 100%;
      max-width: 680px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .control-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: #4b5563;
      text-transform: uppercase;
      font-weight: 700;
    }
    select {
      width: 100%;
      background: #161f16;
      color: white;
      border: 1px solid #2d4a2d;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      font-family: 'Barlow', sans-serif;
    }
    .card {
      background: #0f1a0f;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
    }
    .chart-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #4b5563;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 16px;
    }
    .svg-wrap {
      position: relative;
      width: 100%;
      overflow-x: auto;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
      background: #0f1a0f;
      border-radius: 12px;
    }
    .tooltip {
      position: absolute;
      background: #1a2a1a;
      color: #e2ffe2;
      padding: 8px 12px;
      font-size: 12px;
      border-radius: 8px;
      border-left: 3px solid #4ade80;
      pointer-events: none;
      font-family: monospace;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    button {
      background: #1f3a1f;
      border: 1px solid #3a6b3a;
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 12px;
      margin-top: 12px;
      cursor: pointer;
    }
    .axis text {
      fill: #9ca3af;
      font-size: 10px;
    }
    .axis line, .axis path {
      stroke: #2d4a2d;
    }
    .grid line {
      stroke: #1f2a1f;
    }
    .label {
      fill: #6b7280;
      font-size: 10px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
<div class="topbar">◊ SCATTER MATRIX ◊ VISUAL ANALYTICS</div>

<div id="uploadScreen">
  <div class="upload-box">
    <p>📁 UPLOAD CSV FILE</p>
    <input type="file" id="csvFile" accept=".csv" style="color:white; background:#0f1a0f; border:1px solid #2d4a2d; border-radius:30px; padding:8px 12px;">
  </div>
</div>

<div id="mainScreen">
  <div class="controls">
    <div class="control-group">
      <div class="control-label">X AXIS (numeric)</div>
      <select id="xSelect"></select>
    </div>
    <div class="control-group">
      <div class="control-label">Y AXIS (numeric)</div>
      <select id="ySelect"></select>
    </div>
  </div>
  <div class="card">
    <div class="chart-title">● SCATTER PLOT</div>
    <div class="svg-wrap" id="scatterContainer">
      <svg id="plotSvg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div style="text-align:center;">
      <button id="resetZoom">↺ Reset View</button>
    </div>
  </div>
</div>

<script>
  let rawData = null;      // menyimpan array objek dari CSV
  let numericCols = [];

  // DOM elements
  const uploadScreen = document.getElementById('uploadScreen');
  const mainScreen = document.getElementById('mainScreen');
  const fileInput = document.getElementById('csvFile');
  const xSelect = document.getElementById('xSelect');
  const ySelect = document.getElementById('ySelect');
  const svg = d3.select('#plotSvg');
  const container = document.getElementById('scatterContainer');

  let width = 600, height = 400;
  let margin = { top: 20, right: 30, bottom: 40, left: 50 };
  let innerWidth = width - margin.left - margin.right;
  let innerHeight = height - margin.top - margin.bottom;

  // kelompok utama untuk plot (akan direset setiap update)
  let plotGroup = null;

  // tooltip div
  const tooltip = d3.select('body').append('div')
    .attr('class', 'tooltip')
    .style('opacity', 0);

  // fungsi untuk parsing CSV (header otomatis)
  function loadCSV(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      const rows = d3.csvParse(text);
      if (!rows.length) {
        alert("File kosong atau tidak valid");
        return;
      }
      rawData = rows;
      // deteksi kolom numerik (setidaknya 80% nilai numerik)
      const allCols = Object.keys(rawData[0]);
      numericCols = allCols.filter(col => {
        let numCount = 0;
        for (let i = 0; i < Math.min(rawData.length, 50); i++) {
          const val = parseFloat(rawData[i][col]);
          if (!isNaN(val)) numCount++;
        }
        return numCount > Math.min(rawData.length, 50) * 0.7;
      });
      if (numericCols.length < 2) {
        alert("Butuh minimal 2 kolom numerik untuk scatter plot.");
        return;
      }
      // populate dropdowns
      xSelect.innerHTML = '';
      ySelect.innerHTML = '';
      numericCols.forEach(col => {
        xSelect.appendChild(new Option(col, col));
        ySelect.appendChild(new Option(col, col));
      });
      // set default pilihan: kolom pertama dan kedua
      if (numericCols.length >= 2) {
        xSelect.value = numericCols[0];
        ySelect.value = numericCols[1];
      }
      // tampilkan main screen
      uploadScreen.style.display = 'none';
      mainScreen.style.display = 'block';
      // gambar plot
      drawPlot();
    };
    reader.readAsText(file);
  }

  function drawPlot() {
    if (!rawData) return;
    const xCol = xSelect.value;
    const yCol = ySelect.value;
    if (!xCol || !yCol) return;

    // filter data yang valid numerik
    const points = rawData.filter(d => {
      const x = parseFloat(d[xCol]);
      const y = parseFloat(d[yCol]);
      return !isNaN(x) && !isNaN(y);
    }).map(d => ({
      x: parseFloat(d[xCol]),
      y: parseFloat(d[yCol]),
      label: Object.values(d).slice(0,3).join(', ') // preview 3 kolom pertama sebagai tooltip
    }));

    if (points.length === 0) return;

    // buat scales
    const xExtent = d3.extent(points, p => p.x);
    const yExtent = d3.extent(points, p => p.y);
    const xScale = d3.scaleLinear()
      .domain([xExtent[0] - (xExtent[1]-xExtent[0])*0.05, xExtent[1] + (xExtent[1]-xExtent[0])*0.05])
      .range([0, innerWidth]);
    const yScale = d3.scaleLinear()
      .domain([yExtent[0] - (yExtent[1]-yExtent[0])*0.05, yExtent[1] + (yExtent[1]-yExtent[0])*0.05])
      .range([innerHeight, 0]);

    // reset SVG
    svg.selectAll('*').remove();

    // main group yang di-zoom/pan? tapi untuk kemudahan, kita tidak implementasikan zoom dulu, cukup reset.
    const group = svg.append('g')
      .attr('transform', `translate(${margin.left},${margin.top})`);

    // grid lines
    group.append('g')
      .attr('class', 'grid')
      .call(d3.axisLeft(yScale).ticks(6).tickSize(-innerWidth).tickFormat(''));
    group.append('g')
      .attr('class', 'grid')
      .attr('transform', `translate(0,${innerHeight})`)
      .call(d3.axisBottom(xScale).ticks(6).tickSize(-innerHeight).tickFormat(''));

    // axes
    group.append('g')
      .attr('class', 'axis')
      .call(d3.axisLeft(yScale).ticks(6))
      .style('color', '#9ca3af');
    group.append('g')
      .attr('class', 'axis')
      .attr('transform', `translate(0,${innerHeight})`)
      .call(d3.axisBottom(xScale).ticks(6))
      .style('color', '#9ca3af');

    // labels axes
    group.append('text')
      .attr('x', innerWidth/2)
      .attr('y', innerHeight + 30)
      .attr('class', 'label')
      .style('text-anchor', 'middle')
      .text(xCol);
    group.append('text')
      .attr('x', -35)
      .attr('y', 12)
      .attr('class', 'label')
      .style('text-anchor', 'middle')
      .attr('transform', 'rotate(-90)')
      .text(yCol);

    // points dengan tooltip
    group.selectAll('circle')
      .data(points)
      .enter()
      .append('circle')
      .attr('cx', d => xScale(d.x))
      .attr('cy', d => yScale(d.y))
      .attr('r', 5)
      .attr('fill', '#4ade80')
      .attr('stroke', '#0a0f0a')
      .attr('stroke-width', 1)
      .attr('opacity', 0.7)
      .on('mouseover', function(event, d) {
        d3.select(this).attr('r', 8).attr('fill', '#facc15');
        tooltip.transition().duration(150).style('opacity', 0.9);
        tooltip.html(`<strong>${xCol}:</strong> ${d.x}<br><strong>${yCol}:</strong> ${d.y}<br>📌 ${d.label}`)
          .style('left', (event.pageX + 12) + 'px')
          .style('top', (event.pageY - 28) + 'px');
      })
      .on('mouseout', function() {
        d3.select(this).attr('r', 5).attr('fill', '#4ade80');
        tooltip.transition().duration(300).style('opacity', 0);
      });
  }

  // event listeners
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) loadCSV(e.target.files[0]);
  });
  xSelect.addEventListener('change', () => drawPlot());
  ySelect.addEventListener('change', () => drawPlot());
  document.getElementById('resetZoom').addEventListener('click', () => drawPlot());

  // jika ingin resize otomatis, bisa tambahkan observer
  window.addEventListener('resize', () => {
    // optional: bisa re-render dengan mempertahankan data, namun svg viewBox fixed 600x400 cukup stabil
  });
</script>
</body>
</html>
