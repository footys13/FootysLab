<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FOOTYS · Universal CSV Scatterplot</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0f0a;
            color: white;
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
        }
        .topbar {
            width: 100%;
            max-width: 900px;
            border-left: 3px solid #4ade80;
            padding: 12px 20px;
            background: #0f1a0f;
            font-size: 11px;
            color: #6b7280;
            font-weight: 600;
            margin-bottom: 24px;
            text-transform: uppercase;
        }
        #uploadScreen {
            width: 100%;
            max-width: 900px;
        }
        .upload-box {
            border: 2px dashed #1f2d1f;
            border-radius: 16px;
            padding: 48px 32px;
            text-align: center;
            background: #0b130b;
        }
        .upload-box button, .demo-btn {
            background: #1e2a1e;
            border: 1px solid #4ade80;
            color: #4ade80;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            margin: 8px 6px;
            font-family: 'Barlow', sans-serif;
        }
        .upload-box button:hover, .demo-btn:hover {
            background: #4ade80;
            color: #0a0f0a;
        }
        #mainScreen {
            display: none;
            width: 100%;
            max-width: 900px;
        }
        .controls-panel {
            background: #0f1a0f;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .axis-dual {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
        }
        .axis-selector {
            flex: 1;
            min-width: 180px;
        }
        .axis-selector label {
            font-size: 10px;
            text-transform: uppercase;
            color: #9ca3af;
            display: block;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        select, .compare-btn {
            width: 100%;
            background: #161f16;
            color: white;
            border: 1px solid #2d4a2d;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            font-family: 'Barlow', sans-serif;
            font-weight: 500;
            cursor: pointer;
        }
        .compare-btn {
            background: #1e331e;
            border-color: #4ade80;
            color: #4ade80;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 8px;
        }
        .compare-btn:hover {
            background: #4ade80;
            color: #0a0f0a;
        }
        .player-compare {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .card {
            background: #0f1a0f;
            border-radius: 24px;
            padding: 24px 20px;
        }
        .card-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 22px;
            padding-bottom: 12px;
            border-bottom: 1px solid #1a2e1a;
        }
        .player-card {
            background: #0c140c;
            border-radius: 18px;
            padding: 12px 14px;
        }
        .player-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 6px;
        }
        .p1-name { color: #4ade80; }
        .p2-name { color: #f87171; }
        .player-meta {
            font-size: 11px;
            color: #6b7280;
        }
        .player-meta span { color: #e5e7eb; font-weight: 600; }
        .position-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.5px;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-top: 6px;
        }
        .badge-p1 { background: #4ade80; color: #0a0f0a; }
        .badge-p2 { background: #f87171; color: #0a0f0a; }
        .legend-players {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-bottom: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #9ca3af;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        svg {
            display: block;
            margin: 0 auto;
            background: #0c130c;
            border-radius: 20px;
            width: 100%;
            height: auto;
        }
        .tooltip-div {
            position: absolute;
            background: #1a261a;
            border-left: 3px solid #4ade80;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }
        .btn-export {
            margin-top: 20px;
            background: #161f16;
            color: #4ade80;
            border: 1px solid #4ade80;
            border-radius: 40px;
            padding: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        .watermark-global {
            text-align: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            letter-spacing: 5px;
            color: #2c4a2c;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid #1a2e1a;
        }
        .watermark-brand { color: #4ade80; }
        .note { font-size: 9px; text-align: center; color: #4b5563; margin-top: 12px; }
        .status-msg { color: #86efac; font-size: 11px; margin-top: 10px; }
        .file-info { font-size: 9px; color: #4b5563; margin-top: 12px; }
    </style>
</head>
<body>
<div class="topbar">⚽ THE FOOTYS · UNIVERSAL CSV SCATTERPLOT | ANY CSV, ANY STATS</div>

<div id="uploadScreen">
    <div class="upload-box">
        <p>📁 UPLOAD ANY CSV FILE</p>
        <input type="file" id="csvUpload" accept=".csv" style="display: none;">
        <button id="triggerUploadBtn">📂 CHOOSE CSV</button>
        <button id="demoBtn" class="demo-btn">⭐ LOAD DEMO</button>
        <div class="file-info">CSV must have a column with player names. Any numeric columns work for X/Y axes.</div>
        <div id="uploadStatus" class="status-msg"></div>
    </div>
</div>

<div id="mainScreen">
    <div class="controls-panel">
        <div class="axis-dual">
            <div class="axis-selector">
                <label>📊 X-AXIS</label>
                <select id="xAxisSelect"></select>
            </div>
            <div class="axis-selector">
                <label>📈 Y-AXIS</label>
                <select id="yAxisSelect"></select>
            </div>
        </div>
    </div>

    <div class="player-compare">
        <select id="player1Select"></select>
        <select id="player2Select"></select>
    </div>

    <button id="compareBtn" class="compare-btn">🔍 COMPARE PLAYERS</button>

    <div class="card" style="margin-top: 20px;">
        <div class="card-header">
            <div class="player-card">
                <div class="player-name p1-name" id="p1Name">—</div>
                <div class="player-meta" id="p1Meta">—</div>
                <div class="position-badge badge-p1" id="p1Pos">—</div>
            </div>
            <div class="player-card">
                <div class="player-name p2-name" id="p2Name">—</div>
                <div class="player-meta" id="p2Meta">—</div>
                <div class="position-badge badge-p2" id="p2Pos">—</div>
            </div>
        </div>

        <div class="legend-players">
            <div class="legend-item"><div class="legend-dot" style="background: #4ade80;"></div> PLAYER 1</div>
            <div class="legend-item"><div class="legend-dot" style="background: #f87171;"></div> PLAYER 2</div>
            <div class="legend-item"><div class="legend-dot" style="background: #6c757d;"></div> OTHER PLAYERS</div>
        </div>

        <div class="viz-container">
            <svg id="scatterplot" viewBox="0 0 720 520" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
        <div class="note">💡 Hover any bubble for details • Click COMPARE to refresh chart</div>
        <button class="btn-export" id="exportChartBtn">📸 SAVE AS PNG</button>
        <div class="watermark-global">THE <span class="watermark-brand">FOOTYS</span> • ANALYTICS</div>
    </div>
</div>

<script>
    let currentData = [];
    let selectedP1 = null, selectedP2 = null;
    let currentX = "", currentY = "";
    let numericCols = [];

    // Smart CSV parser - finds Player column automatically
    function parseCSV(csvText) {
        const lines = csvText.trim().split(/\r?\n/);
        if (lines.length < 2) throw new Error("Not enough rows");
        
        let headers = lines[0].split(",").map(h => h.trim().replace(/^\uFEFF/, '').replace(/^"/, '').replace(/"$/, ''));
        
        // Remove empty first column if exists (row numbers)
        if (headers[0] === "" || headers[0] === " ") {
            headers = headers.slice(1);
        }
        
        // Find Player column - look for column that contains player names (not numeric)
        let playerColIdx = -1;
        let playerColName = "";
        
        // First try exact match
        for (let i = 0; i < headers.length; i++) {
            if (headers[i].toLowerCase() === "player") {
                playerColIdx = i;
                playerColName = headers[i];
                break;
            }
        }
        
        // If not found, try case-insensitive or first text column
        if (playerColIdx === -1) {
            for (let i = 0; i < headers.length; i++) {
                const lower = headers[i].toLowerCase();
                if (lower.includes("player") || lower.includes("name")) {
                    playerColIdx = i;
                    playerColName = headers[i];
                    break;
                }
            }
        }
        
        // Still not found? Look at sample rows to find a column with text names
        if (playerColIdx === -1) {
            const sampleRow = lines[1].split(",");
            for (let i = 0; i < headers.length; i++) {
                const val = sampleRow[i]?.trim();
                if (val && isNaN(parseFloat(val))) {
                    playerColIdx = i;
                    playerColName = headers[i];
                    break;
                }
            }
        }
        
        if (playerColIdx === -1) throw new Error("Could not find a column with player names");
        
        // Find Position column (optional)
        let posColIdx = -1;
        for (let i = 0; i < headers.length; i++) {
            if (headers[i].toLowerCase().includes("position")) {
                posColIdx = i;
                break;
            }
        }
        
        // Parse all rows
        const players = [];
        const numericCandidates = [];
        
        for (let i = 1; i < lines.length; i++) {
            let values = lines[i].split(",");
            if (values[0] === "" && values.length > headers.length) values = values.slice(1);
            if (values.length < headers.length) continue;
            
            const playerName = values[playerColIdx]?.trim();
            if (!playerName || playerName === "") continue;
            
            const player = { Player: playerName };
            if (posColIdx !== -1 && values[posColIdx]) {
                player.Position = values[posColIdx].trim();
            } else {
                player.Position = "Player";
            }
            
            for (let j = 0; j < headers.length; j++) {
                if (j === playerColIdx) continue;
                if (posColIdx !== -1 && j === posColIdx) continue;
                const val = parseFloat(values[j]);
                if (!isNaN(val)) {
                    player[headers[j]] = val;
                    if (!numericCandidates.includes(headers[j])) numericCandidates.push(headers[j]);
                }
            }
            players.push(player);
        }
        
        if (players.length === 0) throw new Error("No valid players found");
        
        return { players, numericCols: numericCandidates };
    }

    // Demo dataset
    function getDemoData() {
        return {
            players: [
                { Player: "Muhammad Hannan", Position: "AMF", "npxG per 90": 0.89, "Goal conversion %": 0.80, "Progressive passes per 90": 6.2, "Progressive runs per 90": 4.7 },
                { Player: "Arkhan Fikri", Position: "LCMF", "npxG per 90": 0.59, "Goal conversion %": 0.69, "Progressive passes per 90": 5.1, "Progressive runs per 90": 3.4 },
                { Player: "J. Villa", Position: "AMF", "npxG per 90": 0.90, "Goal conversion %": 0.93, "Progressive passes per 90": 8.1, "Progressive runs per 90": 5.8 },
                { Player: "T. Yachida", Position: "AMF", "npxG per 90": 0.81, "Goal conversion %": 0.75, "Progressive passes per 90": 7.8, "Progressive runs per 90": 3.9 },
                { Player: "T. Haye", Position: "AMF", "npxG per 90": 0.75, "Goal conversion %": 0.64, "Progressive passes per 90": 6.7, "Progressive runs per 90": 5.3 },
                { Player: "Tyronne", Position: "AMF", "npxG per 90": 0.97, "Goal conversion %": 0.86, "Progressive passes per 90": 8.5, "Progressive runs per 90": 5.0 },
                { Player: "Pablo Ganet", Position: "LCMF", "npxG per 90": 0.80, "Goal conversion %": 0.67, "Progressive passes per 90": 5.9, "Progressive runs per 90": 4.2 }
            ],
            numericCols: ["npxG per 90", "Goal conversion %", "Progressive passes per 90", "Progressive runs per 90"]
        };
    }

    function renderScatter() {
        const svg = d3.select("#scatterplot");
        svg.selectAll("*").remove();
        if (!currentData.length || !currentX || !currentY) return;
        
        const plotData = currentData.filter(p => p[currentX] !== undefined && p[currentY] !== undefined);
        if (plotData.length === 0) return;
        
        const width = 720, height = 520;
        const margin = { top: 28, right: 32, bottom: 48, left: 62 };
        const innerW = width - margin.left - margin.right;
        const innerH = height - margin.top - margin.bottom;
        const chart = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);
        
        const xVals = plotData.map(d => d[currentX]);
        const yVals = plotData.map(d => d[currentY]);
        const xMin = Math.min(0, ...xVals);
        const xMax = Math.max(...xVals) * 1.05;
        const yMin = Math.min(0, ...yVals);
        const yMax = Math.max(...yVals) * 1.05;
        
        const xScale = d3.scaleLinear().domain([xMin, xMax]).range([0, innerW]);
        const yScale = d3.scaleLinear().domain([yMin, yMax]).range([innerH, 0]);
        
        chart.append("g").attr("transform", `translate(0,${innerH})`).call(d3.axisBottom(xScale).ticks(7)).style("color", "#b0c4b0");
        chart.append("g").call(d3.axisLeft(yScale).ticks(7)).style("color", "#b0c4b0");
        
        chart.append("text").attr("x", innerW/2).attr("y", innerH + 38).attr("text-anchor", "middle").style("fill", "#9ca3af").style("font-size", "11px").text(currentX);
        chart.append("text").attr("x", -38).attr("y", 12).attr("text-anchor", "middle").attr("transform", "rotate(-90)").style("fill", "#9ca3af").style("font-size", "11px").text(currentY);
        
        const tooltip = d3.select("body").append("div").attr("class", "tooltip-div").style("opacity", 0);
        
        plotData.forEach(p => {
            let color = "#6c757d";
            if (selectedP1 && p.Player === selectedP1.Player) color = "#4ade80";
            else if (selectedP2 && p.Player === selectedP2.Player) color = "#f87171";
            
            chart.append("circle")
                .attr("cx", xScale(p[currentX]))
                .attr("cy", yScale(p[currentY]))
                .attr("r", 7)
                .attr("fill", color)
                .attr("stroke", "#1a2e1a")
                .attr("stroke-width", 1.5)
                .on("mouseover", function(e) {
                    tooltip.style("opacity", 1).html(`<strong>${p.Player}</strong><br/>📌 ${p.Position}<br/>${currentX}: ${p[currentX]?.toFixed(2) || "?"}<br/>${currentY}: ${p[currentY]?.toFixed(2) || "?"}`)
                        .style("left", (e.pageX + 12) + "px").style("top", (e.pageY - 28) + "px");
                })
                .on("mouseout", () => tooltip.style("opacity", 0));
        });
    }
    
    function updateUI() {
        if (!selectedP1 && !selectedP2) return;
        document.getElementById("p1Name").innerText = selectedP1?.Player || "—";
        document.getElementById("p1Meta").innerHTML = `${currentX}: <span>${selectedP1?.[currentX]?.toFixed(2) || "?"}</span> &nbsp;| ${currentY}: <span>${selectedP1?.[currentY]?.toFixed(2) || "?"}</span>`;
        document.getElementById("p1Pos").innerText = selectedP1?.Position || "—";
        document.getElementById("p2Name").innerText = selectedP2?.Player || "—";
        document.getElementById("p2Meta").innerHTML = `${currentX}: <span>${selectedP2?.[currentX]?.toFixed(2) || "?"}</span> &nbsp;| ${currentY}: <span>${selectedP2?.[currentY]?.toFixed(2) || "?"}</span>`;
        document.getElementById("p2Pos").innerText = selectedP2?.Position || "—";
        renderScatter();
    }
    
    function populateSelectors() {
        const xSel = document.getElementById("xAxisSelect");
        const ySel = document.getElementById("yAxisSelect");
        const p1Sel = document.getElementById("player1Select");
        const p2Sel = document.getElementById("player2Select");
        
        xSel.innerHTML = ""; ySel.innerHTML = ""; p1Sel.innerHTML = ""; p2Sel.innerHTML = "";
        
        numericCols.forEach(col => {
            xSel.appendChild(new Option(col, col));
            ySel.appendChild(new Option(col, col));
        });
        
        currentData.forEach(p => {
            p1Sel.appendChild(new Option(`${p.Player} (${p.Position})`, p.Player));
            p2Sel.appendChild(new Option(`${p.Player} (${p.Position})`, p.Player));
        });
        
        if (numericCols.length) {
            currentX = numericCols[0];
            currentY = numericCols[Math.min(1, numericCols.length-1)];
            xSel.value = currentX;
            ySel.value = currentY;
        }
        
        if (currentData.length) {
            selectedP1 = currentData[0];
            selectedP2 = currentData[Math.min(1, currentData.length-1)];
            p1Sel.value = selectedP1.Player;
            p2Sel.value = selectedP2.Player;
            updateUI();
        }
    }
    
    function onCompare() {
        const p1Name = document.getElementById("player1Select").value;
        const p2Name = document.getElementById("player2Select").value;
        const xVal = document.getElementById("xAxisSelect").value;
        const yVal = document.getElementById("yAxisSelect").value;
        
        if (!p1Name || !p2Name || !xVal || !yVal) return;
        if (p1Name === p2Name) { alert("Choose two different players"); return; }
        
        selectedP1 = currentData.find(p => p.Player === p1Name);
        selectedP2 = currentData.find(p => p.Player === p2Name);
        currentX = xVal;
        currentY = yVal;
        updateUI();
    }
    
    function loadData(players, numCols) {
        currentData = players;
        numericCols = numCols;
        populateSelectors();
        document.getElementById("uploadScreen").style.display = "none";
        document.getElementById("mainScreen").style.display = "block";
    }
    
    document.getElementById("triggerUploadBtn").onclick = () => document.getElementById("csvUpload").click();
    document.getElementById("csvUpload").onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const { players, numericCols } = parseCSV(ev.target.result);
                loadData(players, numericCols);
                document.getElementById("uploadStatus").innerText = `✅ Loaded ${players.length} players`;
            } catch(err) {
                document.getElementById("uploadStatus").innerText = "❌ " + err.message;
                alert(err.message);
            }
        };
        reader.readAsText(file);
    };
    document.getElementById("demoBtn").onclick = () => {
        const demo = getDemoData();
        loadData(demo.players, demo.numericCols);
    };
    document.getElementById("compareBtn").onclick = onCompare;
    document.getElementById("exportChartBtn").onclick = () => {
        html2canvas(document.querySelector(".card"), { scale: 2, backgroundColor: "#0f1a0f" }).then(canvas => {
            const link = document.createElement("a");
            link.download = "footys_scatter.png";
            link.href = canvas.toDataURL();
            link.click();
        });
    };
    document.getElementById("xAxisSelect").onchange = (e) => { currentX = e.target.value; updateUI(); };
    document.getElementById("yAxisSelect").onchange = (e) => { currentY = e.target.value; updateUI(); };
    document.getElementById("player1Select").onchange = (e) => {
        const newP1 = currentData.find(p => p.Player === e.target.value);
        if (newP1 && selectedP2 && newP1.Player === selectedP2.Player) {
            alert("Different players required");
            document.getElementById("player1Select").value = selectedP1.Player;
            return;
        }
        selectedP1 = newP1;
        updateUI();
    };
    document.getElementById("player2Select").onchange = (e) => {
        const newP2 = currentData.find(p => p.Player === e.target.value);
        if (newP2 && selectedP1 && newP2.Player === selectedP1.Player) {
            alert("Different players required");
            document.getElementById("player2Select").value = selectedP2.Player;
            return;
        }
        selectedP2 = newP2;
        updateUI();
    };
</script>
</body>
</html>
