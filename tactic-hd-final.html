<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Footys - HD Tactic Annotator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0f0a; color: white; font-family: system-ui; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
        .topbar { width: 100%; max-width: 680px; border-left: 3px solid #4ade80; padding: 12px 20px; background: #0f1a0f; font-size: 10px; color: #6b7280; font-weight: 600; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 2px; }
        #uploadScreen { display: flex; align-items: center; justify-content: center; min-height: 60vh; width: 100%; max-width: 680px; }
        .upload-box { border: 2px dashed #1f2d1f; border-radius: 16px; padding: 48px 32px; text-align: center; cursor: pointer; }
        #mainScreen { display: none; width: 100%; max-width: 680px; }
        .stage-wrapper { width: 100%; aspect-ratio: 16/9; background: #0f2d1f; border-radius: 16px; overflow: hidden; border: 1px solid #2d4a2d; position: relative; }
        #drawCanvas { width: 100%; height: 100%; touch-action: none; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 16px 0; }
        .btn { background: #1e293b; border: 1px solid #334155; color: #cbd5e1; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; }
        .btn.active { background: #064e3b; border-color: #10b981; color: #34d399; }
        .btn-export { background: #161f16; color: #4ade80; border: 1px solid #4ade80; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; text-align: center; }
        .palette { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
        .swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .swatch.active { border-color: white; }
    </style>
</head>
<body>

<div class="topbar">⚽ THE FOOTYS HD TACTICS</div>

<div id="uploadScreen">
    <div class="upload-box" id="uploadBox"><p>📁 TAP UNTUK PILIH GAMBAR</p></div>
</div>

<div id="mainScreen">
    <div class="stage-wrapper"><canvas id="drawCanvas"></canvas></div>
    <div class="toolbar">
        <button class="btn" id="btnSelect">🖱️ Pilih</button>
        <button class="btn" id="btnLine">📏 Garis</button>
        <button class="btn" id="btnCone">🦺 Cone</button>
        <button class="btn" id="btnArrow">➡️ Panah</button>
        <button class="btn" id="btnClear">🗑️ Clear</button>
    </div>
    <div class="palette" id="palette"></div>
    <button class="btn-export" id="exportVideoBtn">🎥 EXPORT HD VIDEO (1080p)</button>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none;">

<script>
    const canvas = document.getElementById('drawCanvas'), ctx = canvas.getContext('2d');
    const bgImage = new Image();
    let shapes = [], mode = 'select', currentColor = '#f97316', tempPts = [], globalTime = 0;

    function renderShapes(context, w, h) {
        context.clearRect(0, 0, w, h);
        if (bgImage.src) context.drawImage(bgImage, 0, 0, w, h);
        shapes.forEach(s => {
            context.shadowColor = s.color; context.shadowBlur = 10;
            context.strokeStyle = s.color; context.lineWidth = 4;
            context.beginPath();
            if(s.type === 'line') { context.moveTo(s.p1.x, s.p1.y); context.lineTo(s.p2.x, s.p2.y); }
            if(s.type === 'cone') { context.arc(s.x, s.y, 20, 0, Math.PI*2); context.fillStyle = s.color; context.fill(); }
            context.stroke();
        });
    }

    function animate() {
        globalTime++;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        renderShapes(ctx, canvas.width, canvas.height);
        requestAnimationFrame(animate);
    }
    animate();

    document.getElementById('exportVideoBtn').onclick = () => {
        const hdCanvas = document.createElement('canvas');
        hdCanvas.width = 1920; hdCanvas.height = 1080;
        const hdCtx = hdCanvas.getContext('2d');
        const stream = hdCanvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm', videoBitsPerSecond: 8000000 });
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob(chunks));
            a.download = 'Footys_HD.webm'; a.click();
        };
        recorder.start();
        let frame = 0;
        function recordLoop() {
            if (frame > 120) { recorder.stop(); return; }
            renderShapes(hdCtx, 1920, 1080);
            frame++; requestAnimationFrame(recordLoop);
        }
        recordLoop();
    };

    document.getElementById('uploadBox').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => {
        bgImage.src = URL.createObjectURL(e.target.files[0]);
        bgImage.onload = () => { document.getElementById('uploadScreen').style.display = 'none'; document.getElementById('mainScreen').style.display = 'block'; };
    };
</script>
</body>
</html>
