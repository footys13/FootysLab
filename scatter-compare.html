<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scatter Compare</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0f0a;
      color: white;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }
    .topbar {
      width: 100%;
      max-width: 680px;
      border-left: 3px solid #4ade80;
      padding: 12px 20px;
      background: #0f1a0f;
      letter-spacing: 2px;
      font-size: 10px;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    #uploadScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      width: 100%;
      max-width: 680px;
    }
    .upload-box {
      border: 2px dashed #1f2d1f;
      border-radius: 16px;
      padding: 48px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .upload-box p {
      color: #4b5563;
      letter-spacing: 1px;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    #mainScreen {
      display: none;
      width: 100%;
      max-width: 680px;
    }
    .controls-axis {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .controls-players {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .control-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: #4b5563;
      text-transform: uppercase;
      font-weight: 700;
    }
    select {
      width: 100%;
      background: #161f16;
      color: white;
      border: 1px solid #2d4a2d;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      font-family: 'Barlow', sans-serif;
    }
    .card {
      background: #0f1a0f;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
    }
    .chart-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
      color: white;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 16px;
    }
    .chart-title .p1 { color: #4ade80; }
    .chart-title .p2 { color: #f87171; }
    .svg-wrap { position: relative; width: 100%; }
    svg { width: 100%; display: block; }
    .watermark {
      margin-top: 16px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #ffffff;
      text-transform: uppercase;
      text-align: center;
    }
    .btn-export {
      margin-top: 20px;
      background: #161f16;
      color: #4ade80;
      border: 1px solid #4ade80;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="topbar">THE FOOTYS · SCATTER COMPARE</div>

  <div id="uploadScreen">
    <div class="upload-box">
      <p>Upload CSV database</p>
      <input type="file" id="inputCSV" accept=".csv">
    </div>
  </div>

  <div id="mainScreen">

    <!-- Axis -->
    <div class="controls-axis">
      <div class="control-group">
        <div class="control-label" style="color:#6b7280">X Axis</div>
        <select id="selectX" onchange="updateChart()"></select>
      </div>
      <div class="control-group">
        <div class="control-label" style="color:#6b7280">Y Axis</div>
        <select id="selectY" onchange="updateChart()"></select>
      </div>
    </div>

    <!-- Players -->
    <div class="controls-players">
      <div class="control-group">
        <div class="control-label" style="color:#4ade80">Player 1</div>
        <select id="select1" onchange="updateChart()"></select>
      </div>
      <div class="control-group">
        <div class="control-label" style="color:#f87171">Player 2</div>
        <select id="select2" onchange="updateChart()"></select>
      </div>
    </div>

    <div class="card" id="cardExport">
      <div class="chart-title" id="chartTitle">-</div>
      <div class="svg-wrap" id="svgWrap">
        <svg id="scatterSVG" viewBox="0 0 600 500"></svg>
      </div>
      <div class="watermark">THE FOOTYS</div>
    </div>

    <button class="btn-export" onclick="exportGambar()">💾 Save Image</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>

    const AXIS_OPTIONS = [
      { key: "Non-penalty goals per 90", label: "NP Goals per 90"    },
      { key: "npxG per 90",              label: "npxG per 90"         },
      { key: "Goal conversion, %",       label: "Goal Conversion %"   },
      { key: "Shot assists per 90",      label: "Shot Assists per 90" },
      { key: "xA per 90",                label: "xA per 90"           },
      { key: "Assists per 90",           label: "Assists per 90"      },
      { key: "Progressive runs per 90",  label: "Progressive Runs"    },
      { key: "Progressive passes per 90",label: "Progressive Passes"  },
      { key: "Touches in box per 90",    label: "Touches in Box"      },
      { key: "Passes per 90",            label: "Passes per 90"       },
      { key: "Duels won, %",             label: "Duels Won %"         },
      { key: "pAdj Tkl+Int per 90",      label: "Tkl+Int per 90"      },
      { key: "Successful dribbles, %",   label: "Dribbles %"          },
      { key: "Aerial duels won, %",      label: "Aerial Duels Won %"  },
      { key: "Defensive duels won, %",   label: "Defensive Duels %"   }
    ];

    let dataPemain = [];

    function parseBaris(str) {
      const hasil = [];
      let current = "";
      let dalamKutip = false;
      for (let i = 0; i < str.length; i++) {
        const char = str[i];
        if (char === '"') {
          dalamKutip = !dalamKutip;
        } else if (char === ',' && !dalamKutip) {
          hasil.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }
      hasil.push(current.trim());
      return hasil;
    }

    function prosesCSV(teks) {
      const baris = teks.trim().split("\n");
      const header = parseBaris(baris[0].replace(/^\uFEFF/, ""));
      const data = [];
      for (let i = 1; i < baris.length; i++) {
        const kolom = parseBaris(baris[i]);
        if (kolom.length < 2) continue;
        const p = {};
        for (let j = 0; j < header.length; j++) {
          p[header[j]] = kolom[j] || "";
        }
        data.push(p);
      }
      return data;
    }

    document.getElementById("inputCSV").onchange = function() {
      const file = this.files[0];
      if (!file) return;
      fetch(URL.createObjectURL(file))
        .then(function(r) {
          r.text().then(function(teks) {
            dataPemain = prosesCSV(teks);

            // Isi axis dropdown
            ["selectX", "selectY"].forEach(function(id, idx) {
              const sel = document.getElementById(id);
              sel.innerHTML = "";
              AXIS_OPTIONS.forEach(function(opt) {
                sel.appendChild(new Option(opt.label, opt.key));
              });
              sel.selectedIndex = idx;
            });

            // Isi player dropdown
            ["select1", "select2"].forEach(function(id) {
              const sel = document.getElementById(id);
              sel.innerHTML = "";
              dataPemain.forEach(function(p, i) {
                sel.appendChild(new Option(p["Player"] + " — " + p["Team"], i));
              });
            });
            document.getElementById("select2").selectedIndex = 1;

            document.getElementById("uploadScreen").style.display = "none";
            document.getElementById("mainScreen").style.display = "block";
            updateChart();
          });
        });
    };

    function updateChart() {
      const keyX  = document.getElementById("selectX").value;
      const keyY  = document.getElementById("selectY").value;
      const idx1  = document.getElementById("select1").value;
      const idx2  = document.getElementById("select2").value;
      const p1    = dataPemain[idx1];
      const p2    = dataPemain[idx2];
      const labelX = AXIS_OPTIONS.find(function(o) { return o.key === keyX; }).label;
      const labelY = AXIS_OPTIONS.find(function(o) { return o.key === keyY; }).label;

      // Update judul
      const nama1 = p1 ? p1["Player"].split(" ").slice(-1)[0].toUpperCase() : "-";
      const nama2 = p2 ? p2["Player"].split(" ").slice(-1)[0].toUpperCase() : "-";
      document.getElementById("chartTitle").innerHTML =
        '<span class="p1">' + (p1 ? p1["Player"] : "-") + '</span>' +
        ' <span style="color:#4b5563">VS</span> ' +
        '<span class="p2">' + (p2 ? p2["Player"] : "-") + '</span>';

      gambarScatter(keyX, keyY, labelX, labelY, p1, p2);
    }

    function gambarScatter(keyX, keyY, labelX, labelY, p1, p2) {
      const svg = document.getElementById("scatterSVG");
      svg.innerHTML = "";

      const W = 600, H = 500;
      const pad = { top: 20, right: 20, bottom: 50, left: 50 };
      const plotW = W - pad.left - pad.right;
      const plotH = H - pad.top - pad.bottom;

      function scaleX(val) { return pad.left + val * plotW; }
      function scaleY(val) { return pad.top + (1 - val) * plotH; }

      // Grid lines
      [0.25, 0.5, 0.75].forEach(function(pct) {
        const vl = document.createElementNS("http://www.w3.org/2000/svg", "line");
        vl.setAttribute("x1", scaleX(pct)); vl.setAttribute("y1", pad.top);
        vl.setAttribute("x2", scaleX(pct)); vl.setAttribute("y2", pad.top + plotH);
        vl.setAttribute("stroke", pct === 0.5 ? "#2d4a2d" : "#1a2e1a");
        vl.setAttribute("stroke-width", pct === 0.5 ? "1.5" : "1");
        vl.setAttribute("stroke-dasharray", pct === 0.5 ? "4,4" : "2,4");
        svg.appendChild(vl);

        const hl = document.createElementNS("http://www.w3.org/2000/svg", "line");
        hl.setAttribute("x1", pad.left); hl.setAttribute("y1", scaleY(pct));
        hl.setAttribute("x2", pad.left + plotW); hl.setAttribute("y2", scaleY(pct));
        hl.setAttribute("stroke", pct === 0.5 ? "#2d4a2d" : "#1a2e1a");
        hl.setAttribute("stroke-width", pct === 0.5 ? "1.5" : "1");
        hl.setAttribute("stroke-dasharray", pct === 0.5 ? "4,4" : "2,4");
        svg.appendChild(hl);

        const xl = document.createElementNS("http://www.w3.org/2000/svg", "text");
        xl.setAttribute("x", scaleX(pct)); xl.setAttribute("y", pad.top + plotH + 16);
        xl.setAttribute("text-anchor", "middle"); xl.setAttribute("fill", "#4b5563");
        xl.setAttribute("font-size", "10"); xl.textContent = Math.round(pct * 100);
        svg.appendChild(xl);

        const yl = document.createElementNS("http://www.w3.org/2000/svg", "text");
        yl.setAttribute("x", pad.left - 8); yl.setAttribute("y", scaleY(pct) + 4);
        yl.setAttribute("text-anchor", "end"); yl.setAttribute("fill", "#4b5563");
        yl.setAttribute("font-size", "10"); yl.textContent = Math.round(pct * 100);
        svg.appendChild(yl);
      });

      // Border
      const border = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      border.setAttribute("x", pad.left); border.setAttribute("y", pad.top);
      border.setAttribute("width", plotW); border.setAttribute("height", plotH);
      border.setAttribute("fill", "none"); border.setAttribute("stroke", "#1a2e1a");
      border.setAttribute("stroke-width", "1");
      svg.appendChild(border);

      // Axis labels
      const xLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
      xLabel.setAttribute("x", pad.left + plotW / 2); xLabel.setAttribute("y", H - 5);
      xLabel.setAttribute("text-anchor", "middle"); xLabel.setAttribute("fill", "#6b7280");
      xLabel.setAttribute("font-size", "11"); xLabel.setAttribute("font-weight", "700");
      xLabel.textContent = labelX.toUpperCase();
      svg.appendChild(xLabel);

      const yLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
      yLabel.setAttribute("x", 12); yLabel.setAttribute("y", pad.top + plotH / 2);
      yLabel.setAttribute("text-anchor", "middle"); yLabel.setAttribute("fill", "#6b7280");
      yLabel.setAttribute("font-size", "11"); yLabel.setAttribute("font-weight", "700");
      yLabel.setAttribute("transform", "rotate(-90, 12, " + (pad.top + plotH / 2) + ")");
      yLabel.textContent = labelY.toUpperCase();
      svg.appendChild(yLabel);

      // Plot semua pemain — biru kecil
      dataPemain.forEach(function(pemain) {
        const valX = parseFloat(pemain[keyX]) || 0;
        const valY = parseFloat(pemain[keyY]) || 0;
        const cx = scaleX(valX);
        const cy = scaleY(valY);

        const isP1 = p1 && pemain["Player"] === p1["Player"];
        const isP2 = p2 && pemain["Player"] === p2["Player"];

        // Skip highlighted players dulu — gambar terakhir biar di atas
        if (isP1 || isP2) return;

        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", cx); circle.setAttribute("cy", cy);
        circle.setAttribute("r", "4");
        circle.setAttribute("fill", "#60a5fa");
        circle.setAttribute("opacity", "0.4");
        circle.setAttribute("stroke", "none");
        svg.appendChild(circle);
      });

      // Gambar p1 dan p2 di atas semua titik
      [
        { pemain: p1, warna: "#4ade80", label: "P1" },
        { pemain: p2, warna: "#f87171", label: "P2" }
      ].forEach(function(item) {
        if (!item.pemain) return;
        const valX = parseFloat(item.pemain[keyX]) || 0;
        const valY = parseFloat(item.pemain[keyY]) || 0;
        const cx = scaleX(valX);
        const cy = scaleY(valY);

        // Lingkaran outer
        const outer = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        outer.setAttribute("cx", cx); outer.setAttribute("cy", cy);
        outer.setAttribute("r", "10");
        outer.setAttribute("fill", "none");
        outer.setAttribute("stroke", item.warna);
        outer.setAttribute("stroke-width", "2");
        outer.setAttribute("opacity", "0.5");
        svg.appendChild(outer);

        // Titik utama
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", cx); circle.setAttribute("cy", cy);
        circle.setAttribute("r", "6");
        circle.setAttribute("fill", item.warna);
        circle.setAttribute("stroke", "#0a0f0a");
        circle.setAttribute("stroke-width", "1.5");
        svg.appendChild(circle);

        // Nama pakai nama belakang biar tidak terlalu panjang
        const nama = item.pemain["Player"];
        const namaLabel = nama.split(" ").slice(-1)[0];

        // Cek posisi — kalau dekat tepi kanan, label ke kiri
        const labelOffset = cx > pad.left + plotW * 0.75 ? -(namaLabel.length * 8 + 16) : 14;
        const namaX = cx + labelOffset;
        const namaY = cy - 4;

        // Background label
            const bgW = namaLabel.length * 8 + 12;
            const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            bg.setAttribute("x", namaX - 4); bg.setAttribute("y", namaY - 13);
            bg.setAttribute("width", bgW); bg.setAttribute("height", 28);
            bg.setAttribute("fill", "#0a0f0a"); bg.setAttribute("rx", "4");
            bg.setAttribute("opacity", "0.85");
            svg.appendChild(bg);

        // Nama pemain
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", namaX); text.setAttribute("y", namaY);
            text.setAttribute("fill", item.warna);
            text.setAttribute("font-size", "13");
            text.setAttribute("font-weight", "800");
            text.setAttribute("font-family", "Barlow Condensed, sans-serif");
            text.textContent = namaLabel;
            svg.appendChild(text);

        // Stats
            const stats = document.createElementNS("http://www.w3.org/2000/svg", "text");
            stats.setAttribute("x", namaX); stats.setAttribute("y", namaY + 12);
            stats.setAttribute("fill", "#9ca3af");
            stats.setAttribute("font-size", "10");
            stats.setAttribute("font-family", "Barlow, sans-serif");
            stats.textContent = "x:" + Math.round(valX * 100) + " y:" + Math.round(valY * 100);
            svg.appendChild(stats);
    }

    function exportGambar() {
      html2canvas(document.getElementById("cardExport"), {
        backgroundColor: "#0f1a0f",
        scale: 2,
        useCORS: true
      }).then(function(canvas) {
        const link = document.createElement("a");
        link.download = "scatter-compare.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    }

  </script>
</body>
</html>
